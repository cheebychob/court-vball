      <div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border)">
        <span class="small">${esc(p?p.name:'player')}</span>
        <span class="num small">${d?`<span class="faint">${d.before} → ${d.after}</span> &nbsp; <b style="color:${col}">${net>0?'+':''}${net}</b>`:'—'}</span>
      </div>
      <div class="tiny faint" style="margin-top:10px">From events: ${formatLog(g.log[g.teamA[0]])||'none logged'}</div>
      <button class="btn primary block" style="margin-top:12px" onclick="closeRecap()">Done</button>`);
    return;
  }
  const wlabel = g.winner==='A'?'Team A':g.winner==='B'?'Team B':'Nobody';
  let probLine='';
  if(g.winProb!=null && !settings.hideRatings && g.winner){
    const favProb=Math.round((g.winner==='A'?g.winProb:1-g.winProb)*100);
    const tail = g.predCorrect===false?' — upset!':g.predCorrect?' — called it.':'';
    probLine=`Court gave ${wlabel} a ${favProb}% chance${gameKind(g)==='partial'?' (tracked players only)':''}${tail}`;
  }
  const uA=unkCount(g,'A'), uB=unkCount(g,'B');
  let ctxLine='';
  if(g.winner && gameKind(g)==='partial'){
    ctxLine = g.winProb==null
      ? 'Partial tracking — the other side was untracked, so the result counts for the record and ratings moved on each player\'s own logged events.'
      : `Partial tracking — ${uA+uB} untracked slot${uA+uB===1?'':'s'}, so the result's rating impact was scaled to ${Math.round((g.ctx||0)*100)}%.`;
  }
  const rows=(ids)=>ids.map(id=>{ const p=pById(id); const d=g.deltas&&g.deltas[id]; if(!p||!d) return '';
    const net=d.after-d.before; const col=net>0?'var(--good)':net<0?'var(--bad)':'var(--faint)';
    return `<div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border)">
      <span class="small">${esc(p.name)}</span>
      <span class="num small"><span class="faint">${d.before} → ${d.after}</span> &nbsp; <b style="color:${col}">${net>0?'+':''}${net}</b></span>
    </div>`;}).join('');
  openSheet(`<h3>${g.winner?`${wlabel} won ${g.scoreA}–${g.scoreB}`:`Tie · ${g.scoreA}–${g.scoreB}`}</h3>
    ${g.winner?'':`<p class="small muted" style="margin:-8px 0 14px">Saved for reference — tied games don't change ratings, records, or games played.</p>`}
    ${probLine?`<p class="small muted" style="margin:-8px 0 14px">${probLine}</p>`:''}
    ${ctxLine?`<p class="small muted" style="margin:${probLine?'-6px':'-8px'} 0 14px">${ctxLine}</p>`:''}
    <div class="teamhdr A" style="margin-top:0">Team A${uA?` <span class="unktag">· +${uA} untracked</span>`:''}</div>${rows(g.teamA)}
    <div class="teamhdr B">Team B${uB?` <span class="unktag">· +${uB} untracked</span>`:''}</div>${rows(g.teamB)}
    ${scoreOnly(g)?`<p class="tiny faint" style="margin-top:12px">Score only — no events were logged for this game.</p>`:''}
    <p class="tiny faint" style="margin-top:${scoreOnly(g)?'6px':'12px'}">Open a player to see the full breakdown of why their number moved.</p>
    <button class="btn primary block" style="margin-top:8px" onclick="closeRecap()">Done</button>`);
}
window.closeRecap=()=>{ closeSheet(); tab='players'; render(); };

/* ---------- TEAMS ---------- */
function renderTeams(){
  const act = sortPlayers(players.filter(p=>p.active&&!isArchived(p)));
  const activeIds = new Set(act.map(p=>p.id));
  settings.numTeams = positiveInt(settings.numTeams, DEFAULT_SETTINGS.numTeams);
  if(!window._pool) window._pool = new Set(activeIds);
  else window._pool = new Set([...window._pool].filter(id=>activeIds.has(id)));
  const pool = window._pool;
  const teamPresets = [2,3,4,5,6];
  const customTeams = !teamPresets.includes(settings.numTeams) ? settings.numTeams : '';
  const canGenerate = pool.size>=settings.numTeams;
  if(window._teamQuery===undefined) window._teamQuery='';
  function chip(p){
    const on = pool.has(p.id);
    return `<button data-focus-key="pool-${p.id}" class="chip ${on?'on':''}" onclick="togglePool('${p.id}')">${esc(p.name)} <span class="r num">${showRate(p.rating)}</span></button>`;
  }
  let html = `${screenHead('Teams','Make even teams','Balanced by rating, then sanity-checked for setters, passers, and beginners. Running fixed teams instead? Use the Events tab.')}`;
  if(!act.length){
    html += `<div class="empty"><b>No active players</b>Add players or mark some as active to build teams.</div>
      <button class="btn primary block" onclick="openPlayer()">${icons.plus} Add player</button>`;
    main.innerHTML = html; return;
  }
  html += `
    <div class="card">
      <div class="row spread" style="margin-bottom:9px">
        <span class="small muted" style="font-weight:700">Who\u2019s here today? (${pool.size} selected)</span>
        <span class="row" style="gap:6px"><button class="btn sm ghost" data-select-pool onclick="selectPoolAll()">${normalizeSearchText(window._teamQuery)?'Select filtered':'Select all'}</button><button class="btn sm ghost" onclick="clearPool()">Clear all</button></span>
      </div>
      ${selectorSearch('teams','Search attendance',window._teamQuery,filterPlayersForQuery(act,window._teamQuery).length,act.length)}
      <div class="chips" id="teamPool" data-selector="teams" style="margin-top:9px">${act.map(p=>`<span class="team-pool-row" data-scroll-key="player-${p.id}" data-search-text="${esc(p.name)}" ${normalizeSearchText(window._teamQuery)&&!normalizeSearchText(p.name).includes(normalizeSearchText(window._teamQuery))?'hidden':''}>${chip(p)}</span>`).join('')}</div>
      ${!filterPlayersForQuery(act,window._teamQuery).length?`<div class="stat-empty">No active players match “${esc(window._teamQuery)}”.</div>`:''}
    </div>
    <div class="card">
      <div class="small muted" style="font-weight:700;margin-bottom:9px">Number of teams</div>
      <div class="seg">
        ${teamPresets.map(n=>`<button class="${settings.numTeams===n?'on':''}" onclick="setTeams(${n})">${n}</button>`).join('')}
      </div>
      <div class="custom-num">
        <div><label for="teamCustom">Custom</label><input id="teamCustom" type="number" inputmode="numeric" min="1" placeholder="7" value="${esc(customTeams?String(customTeams):'')}" onkeydown="if(event.key==='Enter')setTeamsCustom()"></div>
        <button class="btn sm ghost" onclick="setTeamsCustom()">Use</button>
      </div>
      ${pool.size<settings.numTeams?`<div class="tiny" style="color:var(--gold);margin-top:7px">Pick at least ${settings.numTeams} players to make ${settings.numTeams} non-empty teams.</div>`:''}
    </div>
    <button class="btn primary block" onclick="genTeams()" ${canGenerate?'':'disabled'}>${icons.bolt} Generate balanced teams</button>`;

  if(window._teams){
    html += `<div class="section-head"><h3>Balanced teams</h3><span>move any player to a specific team</span></div><div class="team-results">`;
    window._teams.forEach((t,i)=>{
      const tot = t.reduce((s,p)=>s+p.rating,0);
      const avg = t.length ? tot/t.length : 0;
      const hasSetter = t.some(p=>p.roles.setter);
      const hasPasser = t.some(p=>p.roles.passer);
      const warnings = [];
      if(!hasSetter) warnings.push(`<span class="pill bad">No setter</span>`);
      if(!hasPasser && t.length>2) warnings.push(`<span class="pill warn">No strong passer tagged</span>`);
      if(t.filter(p=>p.roles.beginner).length>1) warnings.push(`<span class="pill warn">Beginner-heavy</span>`);
      html += `<div class="team-card">
        <div class="team-head">
          <div class="team-title"><b>Team ${teamLabel(i)}</b><span>${t.length} player${t.length===1?'':'s'} · total ${settings.hideRatings?'••':Math.round(tot)}</span></div>
          <div class="team-avg num">${showRate(avg)}<span>avg rating</span></div>
        </div>
        ${t.slice().sort((a,b)=>b.rating-a.rating).map(p=>`<div class="member" data-scroll-key="team-player-${p.id}">
          ${playerAvatarHtml(p,{size:'sm'})}
          <span class="nm">${esc(p.name)}</span>
          ${ROLE_DEFS.filter(([k])=>p.roles[k]).slice(0,2).map(([k,l])=>`<span class="pill">${l}</span>`).join('')}
          <span class="mrate num">${showRate(p.rating)}</span>
          <button class="mv" onclick="openMovePlayer('${p.id}',${i})">Move</button>
        </div>`).join('')}
        <div class="warning-row">${warnings.length?warnings.join(''):'<span class="pill good">Roles covered</span>'}</div>
      </div>`;
    });
    html += `</div>`;
    const avgs = window._teams.map(t=> t.length ? t.reduce((s,p)=>s+p.rating,0)/t.length : 0);
    const spread = Math.round(Math.max(...avgs)-Math.min(...avgs));
    if(window._teams.length===2 && !settings.hideRatings){
      const wp = winProbability(window._teams[0].map(p=>p.id), window._teams[1].map(p=>p.id));
      html += `<div class="card row spread" style="margin-top:11px"><span class="small muted">Predicted win chance</span>
        <span class="num small" style="font-weight:800"><span style="color:var(--teamA)">A ${Math.round(wp*100)}%</span> · <span style="color:var(--teamB)">B ${Math.round((1-wp)*100)}%</span></span></div>`;
    }
    html += `<div class="card row spread"><span class="small muted">Avg rating gap between teams</span>
      <span class="num" style="font-weight:850;font-size:17px;color:${spread<=4?'var(--mint)':spread<=9?'var(--gold)':'var(--coral)'}">${settings.hideRatings?'••':spread}</span></div>`;
    if(window._teams.length===2){
      html += `<button class="match-action" onclick="trackTheseTeams()">Track this matchup ▸</button>`;
    }
    html += `<button class="btn ghost block" style="margin-top:9px" onclick="genTeams()">Shuffle again</button>`;
  }
  main.innerHTML = html;
}
function renderTeamsLocal(focusKey){ const pos=captureRenderPosition(focusKey); renderTeams(); restoreRenderPosition(pos); }
window.togglePool=(id)=>{ window._pool.has(id)?window._pool.delete(id):window._pool.add(id); window._teams=null; renderTeamsLocal('pool-'+id); };
window.selectPoolAll=()=>{ const act=players.filter(p=>p.active&&!isArchived(p)); const shown=filterPlayersForQuery(act,window._teamQuery); window._pool=new Set([...window._pool,...shown.map(p=>p.id)]); window._teams=null; renderTeamsLocal(); };
window.clearPool=()=>{ window._pool=new Set(); window._teams=null; renderTeamsLocal(); };
window.filterTeamPool=(value)=>{
  window._teamQuery=value;
  const q=value.trim().toLowerCase();
  document.querySelectorAll('#teamPool .team-pool-row').forEach(row=>{ row.hidden=!!q && !(row.dataset.name||'').includes(q); });
};
window.poolAll=()=>{
  /* toggles: select every active player, or clear them all if already selected */
  const ids=players.filter(p=>p.active&&!isArchived(p)).map(p=>p.id);
  const allOn = ids.length>0 && ids.every(id=>window._pool.has(id));
  window._pool = allOn ? new Set() : new Set(ids);
  window._teams=null; renderTeamsLocal();
};
window.setTeams=(n)=>{ settings.numTeams=positiveInt(n, settings.numTeams||DEFAULT_SETTINGS.numTeams); saveSettings(); window._teams=null; renderTeamsLocal(); };
window.setTeamsCustom=()=>{
  const n=positiveInt($('#teamCustom')?.value, null);
  if(!n){ toast('Enter a team count above 0'); return; }
  setTeams(n);
};
window.genTeams=()=>{
  const pool=players.filter(p=>p.active && !isArchived(p) && window._pool.has(p.id));
  if(pool.length<settings.numTeams){ toast('Pick enough players for non-empty teams'); return; }
  window._teams=balance(pool, settings.numTeams);
  if(window._teams.some(t=>!t.length)){ window._teams=null; toast('Every generated team needs a player'); return; }
  renderTeamsLocal();
};
window.movePlayer=(id, from)=>{
  const n=window._teams.length;
  const to=(from+1)%n;
  const p=window._teams[from].find(x=>x.id===id);
  window._teams[from]=window._teams[from].filter(x=>x.id!==id);
  window._teams[to].push(p);
  renderTeamsLocal();
};
window.openMovePlayer=(id,from)=>{
  const p=window._teams?.[from]?.find(x=>x.id===id); if(!p) return;
  openSheet(`<h3>Move ${esc(p.name)}</h3><p class="small muted">Choose the destination team.</p>
    <div class="grid">${window._teams.map((t,i)=>`<button class="btn block ${i===from?'ghost':''}" ${i===from?'disabled':''} onclick="movePlayerTo('${id}',${from},${i})">Team ${teamLabel(i)}${i===from?' · current':''}</button>`).join('')}</div>${sheetCloseBtn()}`);
};
window.movePlayerTo=(id,from,to)=>{
  const p=window._teams?.[from]?.find(x=>x.id===id); if(!p||from===to) return;
  window._teams[from]=window._teams[from].filter(x=>x.id!==id); window._teams[to].push(p); closeSheet(); renderTeamsLocal();
};
window.trackTheseTeams=()=>{
  window._sel={A:new Set(window._teams[0].map(p=>p.id)), B:new Set(window._teams[1].map(p=>p.id))};
  window._fmt=null;   // generated teams are fully tracked — no autofill needed
  tab='track'; render();
};

/* ---------- GAMES ---------- */
function historyKind(g){
  if(g.solo) return 'solo';
  if(g.evId) return 'event';
  if(!g.winner) return 'ties';
  if(gameKind(g)==='partial') return 'partial';
  if(scoreOnly(g)) return 'score';
  return 'full';
}
function historySearchText(g){
  const names=[...(g.teamA||[]),...(g.teamB||[])].map(id=>pById(id)?.name||'');
  const ev=g.evId?evById(g.evId):null;
  return `${names.join(' ')} ${ev?.name||''} ${g.label||''}`.toLowerCase();
}
function historyMatchesFilter(g,f){
  if(f==='all') return true;
  if(f==='event') return !!g.evId;
  if(f==='solo') return !!g.solo;
  if(f==='ties') return !g.solo&&!g.winner;
  if(f==='partial') return !g.solo&&gameKind(g)==='partial';
  if(f==='score') return !g.solo&&scoreOnly(g);
  return !g.solo&&gameKind(g)==='full';
}
function historyRow(g){
  const d = new Date(g.date);
  const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
  if(g.solo){
    const nm = pById(g.teamA[0])?.name || 'player';
    return `<button class="history-row pressable" data-kind="solo" data-search="${esc(historySearchText(g))}" onclick="viewGame('${g.id}')">
      <span class="avatar sm">${initials(nm)}</span>
      <span class="history-line">
        <span class="ln win">${esc(nm)}</span>
        <span class="tags"><span class="pill solo">solo scout</span></span>
      </span>
      <span class="result-block"><b>${g.winner?(g.winner==='A'?'Won':'Lost'):'\u2014'}</b><span>${dateStr}</span></span>
    </button>`;
  }
  const an = g.teamA.map(id=>pById(id)?.name).filter(Boolean);
  const bn = g.teamB.map(id=>pById(id)?.name).filter(Boolean);
  const uA = unkCount(g,'A'), uB = unkCount(g,'B');
  const nameLine = (names,u)=> `${esc(names.join(', '))}${u?`${names.length?' ':''}<span class="faint">+${u} untracked</span>`:''}`;
  const tags = [];
  if(g.evId){ const ev=evById(g.evId); tags.push(`<span class="pill" style="color:var(--gold);border-color:#f2c66d55">${esc(g.label||(ev?ev.name:'event'))}</span>`); }
  if(gameKind(g)==='partial') tags.push('<span class="pill partial">partial</span>');
  if(!g.winner) tags.push('<span class="pill">tie · not rated</span>');
  else if(scoreOnly(g)) tags.push('<span class="pill">score only</span>');
  return `<button class="history-row pressable" data-kind="${historyKind(g)}" data-search="${esc(historySearchText(g))}" onclick="viewGame('${g.id}')">
    <span class="history-line">
      <span class="ln ${g.winner==='A'?'win':''}">${nameLine(an,uA)}</span>
      <span class="ln ${g.winner==='B'?'win':''}">${nameLine(bn,uB)}</span>
      ${tags.length?`<span class="tags">${tags.join('')}</span>`:''}
    </span>
    <span class="result-block"><b class="num">${g.scoreA} – ${g.scoreB}</b><span>${dateStr}</span></span>
  </button>`;
}
function renderGames(){
  if(!window._gameFilter) window._gameFilter='all';
  if(window._gameQuery===undefined) window._gameQuery='';
  const q=window._gameQuery.trim().toLowerCase();
  const filtered=games.filter(g=>historyMatchesFilter(g,window._gameFilter) && (!q||historySearchText(g).includes(q)));
  let html = screenHead('History', games.length?`${games.length} saved game${games.length===1?'':'s'}`:'Game history','Filter by format, then search for a player, event, or match label.');
  if(!games.length){
    html += `<div class="empty"><b>No games yet</b>Track a game from the Track tab. Each saved game updates everyone\u2019s rating automatically.</div>
      <button class="btn primary block" onclick="setTab('track')">Track a game</button>`;
  } else {
    html += `<div class="page-toolbar"><div class="search-wrap">${icons.search||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="6"/><path d="m16 16 4 4"/></svg>'}<input type="search" aria-label="Search history" placeholder="Search player or event" value="${esc(window._gameQuery)}" oninput="filterHistoryRows(this.value)"></div><span class="toolbar-meta">${filtered.length} shown</span></div>
      <div class="filter-row" aria-label="Game type filter">${[['all','All'],['full','Full'],['partial','Partial'],['solo','Solo'],['event','Event'],['ties','Ties'],['score','Score only']].map(([id,label])=>`<button class="${window._gameFilter===id?'on':''}" aria-pressed="${window._gameFilter===id}" onclick="setGameFilter('${id}')">${label}</button>`).join('')}</div>`;
    html += filtered.length ? `<div id="historyList">${filtered.slice().sort((a,b)=>b.date-a.date).map(historyRow).join('')}</div>` : `<div class="empty"><b>No matching games</b>Try another player, event, or game type.</div>`;
  }
  main.innerHTML = html;
}
window.setGameFilter=(f)=>{ window._gameFilter=f; renderGames(); };
window.filterHistoryRows=(value)=>{
  window._gameQuery=value;
  const q=value.trim().toLowerCase();
  document.querySelectorAll('#historyList .history-row').forEach(row=>{ row.hidden=!!q && !(row.dataset.search||'').includes(q); });
};
window.viewGame=(id)=>{
  const g=games.find(x=>x.id===id); if(!g) return;
  const playoff=findPlayoffContextForGame(g);
  if(g.solo){
    const p=pById(g.teamA[0]); const d=g.deltas&&g.deltas[g.teamA[0]];
    openSheet(`<h3>Solo · ${esc(p?p.name:'player')}</h3>
      <p class="small muted" style="margin:-8px 0 12px">${g.winner?`Recorded ${g.winner==='A'?'win':'loss'} · rating unaffected by result`:'No result recorded'}</p>
      <div class="row spread" style="padding:7px 0">
        <span class="small" style="min-width:0">${esc(p?p.name:'player')}<div class="tiny faint">${formatLog(g.log[g.teamA[0]])||'no events'}</div></span>
        <span style="text-align:right;white-space:nowrap">${d?`<div class="num small"><span class="faint">${d.before}→${d.after}</span></div><div class="tiny" style="color:var(--muted)">${whyMoved(d)}</div>`:'—'}</span>
      </div>
      <button class="btn danger block" style="margin-top:16px" onclick="deleteGame('${g.id}')">Delete game</button>
      ${sheetCloseBtn('Done')}`);
    return;
  }
  const uA=unkCount(g,'A'), uB=unkCount(g,'B');
  const probLine=(g.winProb!=null&&!settings.hideRatings&&g.winner)
    ? `<p class="small muted" style="margin:-8px 0 12px">Pre-game: Team A ${Math.round(g.winProb*100)}% · Team B ${Math.round((1-g.winProb)*100)}%${gameKind(g)==='partial'?' · tracked only':''}${g.predCorrect===false?' · upset':g.predCorrect?' · predicted':''}</p>` : '';
  const tieLine = !g.winner
    ? `<p class="small muted" style="margin:-8px 0 12px">Tie — saved for reference. Tied games don't change ratings, records, or games played.</p>` : '';
  const ctxLine = (g.winner && gameKind(g)==='partial')
    ? `<p class="small muted" style="margin:${probLine?'-6px':'-8px'} 0 12px">${g.winProb==null
        ? 'Partial tracking · other side untracked — result counted for win/loss; ratings moved on logged events only.'
        : `Partial tracking · ${uA+uB} untracked slot${uA+uB===1?'':'s'} — result impact scaled to ${Math.round((g.ctx||0)*100)}%.`}</p>`
    : '';
  const list=(ids)=>ids.map(i=>{const p=pById(i); if(!p) return ''; const d=g.deltas&&g.deltas[i];
    return `<div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border)">
      <span class="small" style="min-width:0">${esc(p.name)}<div class="tiny faint">${formatLog(g.log[i])||'no events'}</div></span>
      <span style="text-align:right;white-space:nowrap">${d?`<div class="num small"><span class="faint">${d.before}→${d.after}</span></div><div class="tiny" style="color:var(--muted)">${whyMoved(d)}</div>`:'<span class="tiny faint">—</span>'}</span>
    </div>`;}).join('');
  const evLine = (()=>{ if(!g.evId) return '';
    const ev=evById(g.evId); const a=ev&&evTeamById(ev,g.evA), b=ev&&evTeamById(ev,g.evB);
    return `<p class="small" style="margin:-8px 0 12px;color:var(--gold)">${esc(ev?ev.name:'Event')}${(a&&b)?` · ${esc(a.name)} vs ${esc(b.name)}`:''}${g.label?` · ${esc(g.label)}`:''}</p>`; })();
  openSheet(`
    <h3>Game · ${g.scoreA}–${g.scoreB}</h3>
    ${evLine}${probLine}${tieLine}${ctxLine}
    <div class="teamhdr A" style="margin-top:0">Team A${uA?` <span class="unktag">· +${uA} untracked</span>`:''} ${g.winner==='A'?'· won':''}</div>${list(g.teamA)}
    <div class="teamhdr B">Team B${uB?` <span class="unktag">· +${uB} untracked</span>`:''} ${g.winner==='B'?'· won':''}</div>${list(g.teamB)}
    ${playoff?`<button class="btn ghost block" style="margin-top:16px" onclick="openPlayoffMatchDetails('${playoff.ev.id}','${playoff.br.id}',${playoff.roundIndex},${playoff.matchIndex})">Back to playoff match actions</button>`:`<button class="btn danger block" style="margin-top:16px" onclick="deleteGame('${g.id}')">Delete game</button>`}
    ${sheetCloseBtn('Done')}
  `);
};
function whyMoved(d){
  const parts=[]; const e=Math.round(d.elo*10)/10, v=Math.round(d.ev*10)/10;
  if(e) parts.push(`result ${e>0?'+':''}${e}`);
  if(v) parts.push(`events ${v>0?'+':''}${v}`);
  return parts.join(' · ')||'no change';
}
function formatLog(log){ if(!log) return ''; return Object.entries(log).map(([k,v])=>`${v}${EV_MAP[k]?.l||k}`).join('  '); }
window.deleteGame=async(id)=>{

const POOL_SEED_MODES=['shuffle','snake','manual','random'];
function fixedPoolSeedMode(ev){return POOL_SEED_MODES.includes(ev?.poolSeedMode)?ev.poolSeedMode:'shuffle';}

  const teams=(ev?.teams||[]).slice(),requestedMode=POOL_SEED_MODES.includes(mode)?mode:'shuffle',poolCount=positiveInt(count,0);
  if(!teams.length)return {valid:false,error:'Add teams before seeding pools.',requestedMode,mode:requestedMode,assign:{},rows:[]};
  if(!poolCount)return {valid:false,error:'Choose at least one pool.',requestedMode,mode:requestedMode,assign:{},rows:[]};
  if(poolCount>teams.length)return {valid:false,error:'Pool count cannot exceed the number of teams.',requestedMode,mode:requestedMode,assign:{},rows:[]};

    const ranks=opts.manualRanks||{},missing=teams.filter(team=>!Number.isFinite(Number(ranks[team.id]))||Number(ranks[team.id])<1);
    if(missing.length)return {valid:false,error:`Enter a strength rank for ${missing.length===1?missing[0].name:'every team'}.`,requestedMode,mode:requestedMode,assign:{},rows:[],missingTeamIds:missing.map(team=>team.id)};

window.brSeedRank=(k)=>{
  /* the k-th place team of every pool, ordered by overall standing */
  const d=brCapture(); const ev=evById(d.evId); if(!ev) return;
  const st=fixedEventAutomaticSeedOrder(ev).teamIds.map(id=>({t:evTeamById(ev,id)})).filter(r=>r.t);

  const d=poolSeedCapture(),ev=d&&evById(d.evId);if(!ev)return;
  let plan=fixedPoolSeedPlan(ev,d.mode,d.count,{manualRanks:d.manualRanks,randomSeed:d.randomSeed});
  if(!plan.valid){toast(plan.error);renderPoolSeedingSheet();return;}
  const changed=poolEditChanges(ev,plan.assign),random=d.mode==='random',hasGames=evGameCount(ev)>0;

/* --- team schedule: everything one team plays — done and upcoming.
   Derived on open, same as standings: played matches grouped by matchId,
   upcoming pulled from the live schedule (court + time) when one is set,
   otherwise the remaining same-pool opponents. --- */
function teamScheduleInfo(ev, tid){
  const groups={};
  const planned=ev.sched?buildSchedule(ev,[]):null;
  games.forEach(g=>{
    if(g.evId!==ev.id || !(g.evA===tid||g.evB===tid)) return;
    const k=g.matchId||g.id; (groups[k]=groups[k]||[]).push(g);
  });
  const played=Object.values(groups).map(sets=>{
    sets=sets.slice().sort((x,y)=>x.date-y.date);
    const opp = sets[0].evA===tid ? sets[0].evB : sets[0].evA;
    let w=0,l=0; const sc=[];
    sets.forEach(g=>{
      const mine=g.evA===tid?g.scoreA:g.scoreB, theirs=g.evA===tid?g.scoreB:g.scoreA;
      if(mine>theirs)w++; else if(theirs>mine)l++;
      sc.push(mine+'\u2013'+theirs);
    });
    const plannedMatch=(sets[0].evMatchId&&planned?.allMatches?.find(m=>m.id===sets[0].evMatchId))||planned?.allMatches?.find(m=>(m.a===tid&&m.b===opp)||(m.a===opp&&m.b===tid))||planned?.plannedSlots.flat().find(m=>(m.a===tid&&m.b===opp)||(m.a===opp&&m.b===tid));
    return {opp, date:sets[sets.length-1].date, label:(sets[0].label||'').replace(/ · Set 1$/,''),round:plannedMatch?plannedMatch.slot+1:null,isMakeup:plannedMatch?!isStandardScheduleMatch(plannedMatch):false,est:plannedMatch?.est||null,court:plannedMatch?courtLabel(planned.s,plannedMatch.court):null,
      won: w>l?true:l>w?false:null,
      disp: sets.length>1 ? `${w}-${l} · ${sc.join(', ')}` : sc[0]};
  }).sort((a,b)=>a.date-b.date);
  const sc=ev.done?null:buildSchedule(ev);
  const upcoming = sc ? sc.slots.flat().concat((sc.makeupPending||[]).flat()).filter(m=>m.a===tid||m.b===tid)
    .map(m=>({opp:m.a===tid?m.b:m.a, est:m.est, court:courtLabel(sc.s,m.court), pool:m.pool,isMakeup:!isStandardScheduleMatch(m)})) : null;
  const team=evTeamById(ev,tid);
  const playedOpps=new Set(played.map(p=>p.opp));
  const remaining=(ev.teams||[]).filter(t=>t.id!==tid && (t.pool||'')===((team&&team.pool)||'') && !playedOpps.has(t.id)).map(t=>t.id);
  return {played, upcoming, remaining};
}
window.openTeamSchedule=(evId, tid)=>{

      <span class="small" style="min-width:0"><b style="color:${p.won===true?'var(--good)':p.won===false?'var(--bad)':'var(--faint)'}">${p.won===true?'W':p.won===false?'L':'D'}</b> &nbsp;vs ${esc(name(p.opp))}${p.label?`<div class="tiny faint">${esc(p.label)}</div>`:''}${p.est?`<div class="tiny faint">Planned ${fmtScheduleTime(ev,p.est)}${p.court?` · ${esc(p.court)}`:''}</div>`:''}</span>

    <p class="small muted" style="margin:-8px 0 14px">${esc(ev.name)} · ${esc(eventTimingSummary(ev))} · everything this team plays.</p>
    <div class="field"><label>Played · ${info.played.length}</label>
      ${playedRows||`<div class="tiny faint" style="padding:4px 0">Nothing yet.</div>`}</div>
    ${info.upcoming
      ? `<div class="field"><label>Up next · ${info.upcoming.length}</label>
          ${upcomingRows||`<div class="tiny" style="color:var(--mint);padding:4px 0">Pool play complete ✓</div>`}</div>`
      : ev.done ? '' : `<div class="field"><label>Still to play · ${info.remaining.length}</label>${remainingLine}</div>`}
    <button class="btn primary block" style="margin-top:4px" onclick="openParticipantScheduleShare('${ev.id}','team','${team.id}')">Save / Share Schedule</button>
    ${ev.done?'':`<button class="btn ghost block" style="margin-top:4px" onclick="openEventTeam('${ev.id}','${team.id}')">Edit team</button>`}
    ${sheetCloseBtn('Done')}`);

/* --- log an event game: single set or best-of-3 match; or hand off to live tracking --- */
window.openEventGame=(evId, preA, preB, preLabel, preMode, preMatchId)=>{
  const ev=evById(evId); if(!ev||(ev.teams||[]).length<2) return;
  window._evGameDraft={evId,evMatchId:preMatchId||null, a:preA||null, b:preB||null, mode:preMode||'set', sA:'', sB:'', s1A:'',s1B:'',s2A:'',s2B:'',s3A:'',s3B:'', label:preLabel||''};
  renderEventGameSheet();
};
function evGameCapture(){
  const d=window._evGameDraft; if(!d) return d;
  const grab=(id,key)=>{ const el=$(id); if(el) d[key]=el.value; };
  grab('#evsA','sA'); grab('#evsB','sB'); grab('#evLabel','label');
  ['1','2','3'].forEach(n=>{ grab('#evs'+n+'A','s'+n+'A'); grab('#evs'+n+'B','s'+n+'B'); });
  return d;
}
window.evGameMode=(m)=>{ const d=evGameCapture(); d.mode=m; renderEventGameSheet(); };
function renderEventGameSheet(){

    const on = d[side]===t.id;

    return `<button class="chip ${on?'on':''}" ${(taken||editing)?'disabled':''} ${taken&&!editing?'style="opacity:.35"':''} onclick="evPickTeam('${side}','${t.id}')">${esc(t.name)}</button>`;
  }).join('');

       ${['1','2','3'].map(n=>`<div class="set-grid">
         <span class="lbl">Set ${n}</span>

         <input id="evs${n}B" type="number" inputmode="numeric" min="0" placeholder="${n==='3'?'—':'0'}" value="${esc(d['s'+n+'B']||'')}">
       </div>`).join('')}
       <div class="tiny faint" style="margin-bottom:12px">Leave Set 3 blank if the match ended 2-0. Each set counts as its own game for ratings; standings score it as one match.</div>`
    : `<div class="row" style="gap:10px;margin-bottom:14px">
      <div style="flex:1"><label class="small" style="color:var(--teamA);font-weight:700;display:block;margin-bottom:6px">${esc(nA)}</label>
        <input id="evsA" type="number" inputmode="numeric" min="0" placeholder="0" value="${esc(d.sA||'')}"></div>

window.evPickTeam=(side,tid)=>{
  const d=evGameCapture();
  d[side] = d[side]===tid ? null : tid;
  renderEventGameSheet();
};
window.saveEventGame=async()=>{
  const d=evGameCapture(); const ev=evById(d.evId); if(!ev) return;
  const tA=evTeamById(ev,d.a), tB=evTeamById(ev,d.b); if(!tA||!tB) return;
  const label=(d.label||'').trim();
  const num=v=>Math.max(0, Math.round(Number(v)||0));
  const pA=tA.players.filter(id=>pById(id)), pB=tB.players.filter(id=>pById(id)),editing=!!d.editPlayoff;
  const oldGames=editing?(d.editPlayoff.gameIds||[]).map(id=>games.find(g=>g.id===id)).filter(Boolean).sort((a,b)=>a.date-b.date):[];
  const existingGames=!editing&&d.evMatchId?games.filter(g=>g.evId===ev.id&&g.evMatchId===d.evMatchId).sort((a,b)=>a.date-b.date):[];
  /* Playerless (guest) sides save as untracked slots — the engine's existing
     partial-game model then guarantees: guest vs guest moves no ratings;
     rostered vs guest counts the win/loss without result-based rating moves. */
  let baseDate=oldGames[0]?.date||existingGames[0]?.date||Date.now();
  const mk=(a,b,extra,old,index)=>{const record={...(old?{}:gameSaveMeta(false)),...(old||{}),id:old?.id||uid(),date:old?.date||(baseDate+index),
    teamA:pA,teamB:pB,unkA:pA.length?0:1,unkB:pB.length?0:1,scoreA:a,scoreB:b,winner:a>b?'A':(b>a?'B':null),log:old?.log||{},
    evId:ev.id,evA:tA.id,evB:tB.id,...(d.evMatchId?{evMatchId:d.evMatchId}:{}),...extra};
    if(!extra.matchId)delete record.matchId;return record;};
  let specs=[],winnerId=null,resultLabel='';
  if(d.mode==='bo3'){
    const sets=[];
    ['1','2','3'].forEach(n=>{
      const ra=(d['s'+n+'A']||'').trim(), rb=(d['s'+n+'B']||'').trim();
      if(ra===''&&rb==='') return;
      sets.push([num(ra),num(rb),n]);
    });
    if(!sets.length){ toast('Enter at least one set score'); return; }
    let wa=0, wb=0;
    sets.forEach(([a,b])=>{ if(a>b)wa++; else if(b>a)wb++; });
    if(wa===wb && !(await askConfirm('Set wins are even, so no match winner is recorded in standings. Save anyway?','Save anyway',false))) return;
    const matchId=oldGames[0]?.matchId||existingGames[0]?.matchId||uid();winnerId=wa===wb?null:(wa>wb?tA.id:tB.id);resultLabel=wa===wb?'Match saved · drawn on sets':`${wa>wb?tA.name:tB.name} wins the match ${Math.max(wa,wb)}-${Math.min(wa,wb)}`;
    specs=sets.map(([a,b,n])=>({a,b,extra:{matchId,label:(label?label+' · ':'')+'Set '+n}}));
  } else {
    const a=num(d.sA), b=num(d.sB);
    if(a===b && !(await askConfirm('Tied score — it shows in standings points but won\u2019t count as a win, loss, or rating change. Save anyway?','Save anyway',false))) return;
    winnerId=a===b?null:(a>b?tA.id:tB.id);resultLabel=a===b?'Tie saved · points counted':`${a>b?tA.name:tB.name} wins · standings updated`;specs=[{a,b,extra:label?{label}:{}}];
  }
  let dependencies=[];
  if(editing&&winnerId!==d.editPlayoff.oldWinner){
    const ctx=playoffContext(ev.id,d.editPlayoff.brId,d.editPlayoff.roundIndex,d.editPlayoff.matchIndex);dependencies=ctx?getDownstreamPlayoffDependencies(ev,ctx.br,ctx.roundIndex,ctx.matchIndex):[];
    const groups=new Set(dependencies.map(g=>g.evMatchId||g.matchId||g.id)).size;
    const warning=groups?`Changing this result changes the advancing team. ${groups} later playoff result${groups===1?'':'s'} involving the previous winner will be removed and must be re-entered.`:'Changing this result will update the advancing team and rebuild the bracket.';
    if(!(await askConfirm(warning,'Update bracket')))return;
  }
  if(existingGames.length&&!(await askConfirm('A saved result already exists for this match. Replace it with what you entered?','Replace result')))return;
  if(dependencies.length)await markGamesDeleted(dependencies);
  if(editing){
    const oldIds=new Set(oldGames.map(g=>g.id));games=games.filter(g=>!oldIds.has(g.id));
    if(oldGames.length>specs.length)await markGamesDeleted(oldGames.slice(specs.length));
  }
  if(existingGames.length)await markGamesDeleted(existingGames);
  specs.forEach((spec,index)=>games.push(mk(spec.a,spec.b,spec.extra,oldGames[index],index)));
  await commit();closeSheet();toast(editing?(dependencies.length?'Result updated · dependent playoff results removed':'Result updated · bracket recalculated'):resultLabel);
  render({scroll:editing?'anchor':'preserve',anchorId:editing?'playoffs':undefined});

window.backToEvent=()=>{
  /* bail out of a live-tracking handoff: nothing was saved, so just clear

  const p=window._evtPending; window._evtPending=null;
  window._sel={A:new Set(),B:new Set()}; window._fmt=null; window._trackMode='match';
  if(p){ window._evOpen=p.evId; }
  tab='events'; render();
};
window.trackEventGame=()=>{
  const d=evGameCapture(); const ev=evById(d.evId); if(!ev) return;
  const tA=evTeamById(ev,d.a), tB=evTeamById(ev,d.b); if(!tA||!tB) return;
  const usable=ids=>new Set(ids.filter(id=>{ const p=pById(id); return p&&p.active&&!isArchived(p); }));
  const sA=usable(tA.players), sB=usable(tB.players);
  if(!sA.size && !sB.size){ toast('Both teams are guest teams — nobody to track. Log the score instead.'); return; }
  window._sel={A:sA, B:sB};
  window._fmt=(!sA.size||!sB.size)?Math.max(sA.size,sB.size,2):null;
  window._trackMode='match'; window._soloPick=null;
  window._evtPending={evId:ev.id, evA:tA.id, evB:tB.id,...(d.evMatchId?{evMatchId:d.evMatchId}:{}), ...((d.label||'').trim()?{label:d.label.trim()}:{})};
  closeSheet(); tab='track'; render();
};

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  {n:'Cy',t:74,r:['passer','defense']},{n:'Dom',t:68,r:['hitter']},

function demoEvents(p){
  const s=p.seedRating/100, log={}, R=Math.random;
  const add=(k,n)=>{ if(n>0) log[k]=(log[k]||0)+n; };
  add('kill',  R()<s*0.9       ? Math.floor(R()*(1+s*4)) : 0);
  add('ace',   R()<s*0.5       ? Math.floor(R()*(1+s*2)) : 0);
  add('sin',   Math.floor(R()*(2+s*3)));
  add('dig',   R()<0.5+s*0.3   ? Math.floor(R()*(1+s*3)) : 0);
  add('block', R()<s*0.4       ? Math.floor(R()*(s*2))   : 0);
  add('goodPass', R()<0.4+s*0.4? Math.floor(R()*(1+s*3)) : 0);
  add('pget',  R()<0.35+s*0.3  ? Math.floor(R()*(1+s*2)) : 0);
  add('assist', p.roles.setter ? Math.floor(R()*(2+s*4)) : 0);
  add('kerr',  R()<(1-s)*0.6   ? Math.floor(R()*(1+(1-s)*3)) : 0);
  add('serr',  R()<(1-s)*0.5   ? Math.floor(R()*(1+(1-s)*2)) : 0);
  add('perr',  R()<(1-s)*0.6   ? Math.floor(R()*(1+(1-s)*2)) : 0);
  return log;
}
function buildDemo(){
  players = DEMO_ROSTER.map(d=>{ const p=makePlayer(d.n, d.t); d.r.forEach(k=>p.roles[k]=true); return p; });
  games = [];
  const t0 = Date.now() - 50*24*3600*1000;
  let gi=0;
  for(let s=0;s<14;s++){
    const present = shuffle(players).slice(0, 6 + Math.floor(Math.random()*7));
    const nGames = 2 + Math.floor(Math.random()*3);
    for(let k=0;k<nGames;k++){
      const pool = shuffle(present);
      const half = Math.floor(pool.length/2);
      const A = pool.slice(0,half), B = pool.slice(half);
      if(A.length<1||B.length<1) continue;
      const sa=A.reduce((x,p)=>x+p.seedRating,0)/A.length;
      const sb=B.reduce((x,p)=>x+p.seedRating,0)/B.length;
      const aWins = Math.random() < 1/(1+Math.pow(10,(sb-sa)/15));
      const winS=25, loseS=12+Math.floor(Math.random()*11);
      const scoreA=aWins?winS:loseS, scoreB=aWins?loseS:winS;
      const log={}; A.concat(B).forEach(p=>log[p.id]=demoEvents(p));
      games.push({id:uid(),date:t0+gi*3600*1000,teamA:A.map(p=>p.id),teamB:B.map(p=>p.id),scoreA,scoreB,winner:scoreA>scoreB?'A':'B',log,...gameSaveMeta(true,true)});
      gi++;
    }
  }
  for(let i=0;i<3;i++){
    const p=players[Math.floor(Math.random()*players.length)];
    games.push({id:uid(),date:t0+gi*3600*1000,solo:true,teamA:[p.id],teamB:[],scoreA:0,scoreB:0,winner:Math.random()<0.5?'A':'B',log:{[p.id]:demoEvents(p)},...gameSaveMeta(true,true)});
    gi++;
  }
}

let evalState=null;
function evalCounts(idx){ const c={}; evalState.order[idx].forEach(l=>c[l]=(c[l]||0)+1); return c; }
function evalScore(idx){
  const t=EVAL[idx], c=evalCounts(idx); let tot=0, raw=0;
  t.outs.forEach(([l,w])=>{ const n=c[l]||0; tot+=n; raw+=w*n; });
  if(!tot) return null;
  return clamp(Math.round(1+(raw/tot)*4),1,5);
}
window.startEval=()=>{

};
function renderEval(){
  const total = EVAL.length + 1;
  if(evalState.i < EVAL.length){
    const idx=evalState.i, t=EVAL[idx], c=evalCounts(idx);
    const done=evalState.order[idx].length, sc=evalScore(idx);
    openSheet(`
      <h3>Evaluate · ${t.title}</h3>
      <div class="tiny faint" style="margin:-10px 0 12px">Step ${idx+1} of ${total} · ${done} of ${t.n} logged</div>
      <p class="small muted" style="margin-bottom:14px">${t.prompt}</p>
      <div class="ev" style="gap:8px">
        ${t.outs.map(([l,w,cls])=>`<button class="${cls}" style="flex:1;padding:18px 4px;font-size:14px" onclick="evalTap(${idx},'${l}')">${l}${(c[l]||0)?`<span class="cnt">${c[l]}</span>`:''}</button>`).join('')}
      </div>
      <div class="card" style="margin-top:14px;text-align:center;background:var(--surface2)">
        <span class="muted small">Score so far</span>
        <div class="rate num" style="color:var(--sand);margin-top:4px">${sc!=null?sc:'–'}<span style="font-size:14px;color:var(--faint)"> / 5</span></div>
      </div>
      <div class="row" style="gap:8px;margin-top:8px">

    const incoming=source&&typeof source==='object'?source:{};
    deletions=replacementDeletionState({players,games,events:evts},incoming,deletions);
    const resolved=resolveDeletionProtectedRecords({players,games,events:evts},incoming,deletions,'replace');
    await saveDeletions();return resolved;
  }
  function startPoll(){stopPoll();if(cfg.on&&configured())poller=setInterval(()=>pull({}),15000);}
  function stopPoll(){if(poller){clearInterval(poller);poller=null;}}
  function ago(){
    if(!lastSyncedAt)return 'not yet';
    const s=Math.round((Date.now()-lastSyncedAt)/1000);
    if(s<5)return 'just now';
    if(s<60)return s+'s ago';
    return Math.round(s/60)+'m ago';
  }
  function statusHtml(){
    if(!configured())return 'Not set up on this device.';
    if(!cfg.on)return 'Paused.';
    return 'On · last synced '+ago();
  }
  function updateStatus(){const el=document.getElementById('syncStatusLine');if(el)el.innerHTML=statusHtml();}
  async function init(){
    await loadLocalState();
    if(applyLocalDeletions()){
      recomputeAll();await savePlayers();await saveGames();await saveEvents();
      if(typeof render==='function')render();
    }
    lastSig=payloadStr();
    if(cfg.on&&configured()){await pull({});startPoll();bindVis();}
  }
  return {
    init,pull,push,touch,startPoll,stopPoll,statusHtml,configured,endpoint,applyLocalDeletions,
    markDeleted,markDeletedMany,prepareReplacement,
    noteGameDelete:(id,deletedAt)=>markDeleted('games',id,deletedAt),
    notePlayerDelete:(id,deletedAt)=>markDeleted('players',id,deletedAt),
    deletionState:()=>normalizeDeletionState(deletions),
    persistLocalState:()=>Promise.all([saveDeletions(),saveTs()]),
    get cfg(){return cfg;},
    async connect(url,code){
      cfg.url=(url||'').trim()||SYNC_DEFAULT_URL;cfg.code=code.trim();cfg.on=false;stopPoll();window.PlayerPhotos?.resetCapability();await saveCfg();updateStatus();
      try{
        const r=await fetch(endpoint(),{method:'GET',cache:'no-store'});
        if(!r.ok)throw new Error('http '+r.status);
        const env=await r.json();
        if(env&&env.data)return 'has-data';
      }catch(e){return 'error';}
      cfg.on=true;await saveCfg();
      await push({seed:true});startPoll();bindVis();return 'seeded';
    },
    async adopt(mode){cfg.on=true;await saveCfg();await pull({force:true,mode});startPoll();bindVis();},
    async setOn(on){cfg.on=on;await saveCfg();if(on){await pull({});startPoll();bindVis();}else stopPoll();updateStatus();}
  };
})();

const PlayerPhotos=(()=>{
  const cache=new Map(),pending=new Map();
  let capabilityKey='',capabilityStatus='idle',capabilityMessage='';
  const workerUrl=path=>`${Sync.cfg.url.replace(/\/+$/,'')}${path}`;
  const configured=()=>Sync.configured();
  const cacheKey=photo=>`${photo.token}|${photo.revision}`;
  const state=()=>({status:capabilityStatus,message:capabilityMessage,available:capabilityStatus==='available'});
  function revokeEntry(key){const entry=cache.get(key);if(entry?.url)URL.revokeObjectURL(entry.url);cache.delete(key);}
  function invalidate(photo){
    const normalized=normalizePlayerPhoto(photo);if(!normalized)return;
    for(const key of [...cache.keys()])if(key.startsWith(normalized.token+'|'))revokeEntry(key);
  }
  function prune(){
    const live=new Set(players.map(player=>normalizePlayerPhoto(player.photo)).filter(Boolean).map(cacheKey));
    for(const key of [...cache.keys()])if(!live.has(key))revokeEntry(key);
  }
  async function responseData(response){try{return await response.json();}catch(_){return {};}}
  function failure(response,data,fallback){
    const error=new Error(data?.error||fallback);error.status=response.status;return error;
  }
  async function capability(){
    if(!configured()){capabilityStatus='unconfigured';capabilityMessage='Set up device sync to add player photos.';return false;}
    const key=Sync.cfg.url.replace(/\/+$/,'');
    if(capabilityKey===key&&capabilityStatus==='available')return true;
    if(capabilityKey===key&&capabilityStatus==='unavailable')return false;
    capabilityKey=key;capabilityStatus='checking';capabilityMessage='Checking photo storage…';
    try{
      const response=await fetch(workerUrl('/api/player-photos/status'),{method:'GET',cache:'no-store'}),data=await responseData(response);
      if(response.ok&&data.available===true){capabilityStatus='available';capabilityMessage='';return true;}
      capabilityStatus='unavailable';capabilityMessage=data.available===false?'Player photo storage is not set up on this sync service.':'Player photos are not available on this sync service.';return false;
    }catch(_){capabilityStatus='unavailable';capabilityMessage='Photo storage could not be reached. You can keep using Court and retry later.';return false;}
  }
  async function getUrl(photo){
    const normalized=normalizePlayerPhoto(photo);if(!normalized||!configured())throw new Error('photo unavailable');
    const key=cacheKey(normalized);if(cache.has(key)){const entry=cache.get(key);if(entry.url)return entry.url;throw new Error('photo unavailable');}if(pending.has(key))return pending.get(key);
    const operation=(async()=>{
      const response=await fetch(workerUrl(`/api/player-photos/${encodeURIComponent(normalized.token)}`),{method:'GET',cache:'no-cache',headers:{'X-Court-Room':Sync.cfg.code}});
      if(!response.ok)throw new Error('photo unavailable');
      const blob=await response.blob();if(!PLAYER_PHOTO_TYPES.has(blob.type)||!blob.size)throw new Error('photo unavailable');
      const url=URL.createObjectURL(blob);cache.set(key,{url});return url;
    })().catch(error=>{cache.set(key,{url:'',failed:true});throw error;});
    pending.set(key,operation);try{return await operation;}finally{pending.delete(key);}
  }
  function unavailable(element){
    element.classList.add('photo-unavailable');const image=element.querySelector('img');if(image){image.hidden=true;image.removeAttribute('src');}
    const note=element.parentElement?.querySelector('[data-photo-unavailable-note]');if(note)note.hidden=false;
  }
  function hydrate(root=document){
    prune();
    root.querySelectorAll?.('[data-player-photo-token][data-player-photo-revision]').forEach(element=>{
      const photo={token:element.dataset.playerPhotoToken,revision:element.dataset.playerPhotoRevision,contentType:'image/webp',width:1,height:1,bytes:1,public:false,updatedAt:1};
      const key=`${photo.token}|${photo.revision}`;if(element.dataset.photoCacheKey===key)return;element.dataset.photoCacheKey=key;
      getUrl(players.find(player=>player.photo?.token===photo.token&&player.photo?.revision===photo.revision)?.photo).then(url=>{
        if(!element.isConnected||element.dataset.photoCacheKey!==key)return;const image=element.querySelector('img');if(!image)return;
        image.src=url;image.hidden=false;element.classList.remove('photo-unavailable');const note=element.parentElement?.querySelector('[data-photo-unavailable-note]');if(note)note.hidden=true;
      }).catch(()=>{if(element.isConnected&&element.dataset.photoCacheKey===key)unavailable(element);});
    });
  }
  async function ensureAvailable(){if(await capability())return;throw new Error(capabilityMessage||'Player photo storage is unavailable.');}
  async function upload(playerId,prepared,existing,makePublic){
    await ensureAvailable();
    const headers={'Content-Type':prepared.contentType,'X-Court-Room':Sync.cfg.code,'X-Photo-Width':String(prepared.width),'X-Photo-Height':String(prepared.height),'X-Photo-Public':makePublic?'1':'0'};
    const prior=normalizePlayerPhoto(existing);if(prior)headers['X-Photo-Token']=prior.token;
    let response;try{response=await fetch(workerUrl(`/api/player-photos/${encodeURIComponent(playerId)}`),{method:'PUT',headers,body:prepared.blob});}catch(_){throw new Error('Photo upload failed while offline. The player was saved without changing the photo.');}
    const data=await responseData(response);if(!response.ok)throw failure(response,data,'Photo upload failed. The player was saved without changing the photo.');
    const photo=normalizePlayerPhoto(data.photo);if(!photo||(prior&&photo.token!==prior.token))throw new Error('The photo service returned invalid metadata. The existing photo was kept.');
    return photo;
  }
  async function setPublic(photo,value){
    await ensureAvailable();const normalized=normalizePlayerPhoto(photo);if(!normalized)throw new Error('Photo metadata is invalid.');
    let response;try{response=await fetch(workerUrl(`/api/player-photos/${encodeURIComponent(normalized.token)}`),{method:'PATCH',headers:{'Content-Type':'application/json','X-Court-Room':Sync.cfg.code},body:JSON.stringify({public:!!value})});}catch(_){throw new Error('Could not change photo sharing while offline.');}
    const data=await responseData(response);if(!response.ok)throw failure(response,data,'Could not change photo sharing.');
    const next=normalizePlayerPhoto(data.photo);if(!next||next.token!==normalized.token||next.public!==!!value)throw new Error('The photo service returned invalid metadata.');return next;
  }
  async function remove(photo){
    await ensureAvailable();const normalized=normalizePlayerPhoto(photo);if(!normalized)return;
    let response;try{response=await fetch(workerUrl(`/api/player-photos/${encodeURIComponent(normalized.token)}`),{method:'DELETE',headers:{'X-Court-Room':Sync.cfg.code}});}catch(_){throw new Error('Could not remove the photo while offline.');}
    if(response.status===404)return;const data=await responseData(response);if(!response.ok)throw failure(response,data,'Could not remove the photo.');
  }
  function resetCapability(){capabilityKey='';capabilityStatus='idle';capabilityMessage='';}
  window.addEventListener('beforeunload',()=>{for(const key of [...cache.keys()])revokeEntry(key);});
  return {capability,state,getUrl,hydrate,invalidate,upload,setPublic,remove,resetCapability,configured,_debug:()=>({cache:cache.size,pending:pending.size})};
})();
window.PlayerPhotos=PlayerPhotos;

const AppUpdates=(()=>{
  const DISMISSED_KEY='court:update-dismissed-build';
  const CHECK_THROTTLE_MS=60000;
  let status='idle',availableBuild='',checking=false,lastCheck=0,started=false,poller=null;

  function deployedUrl(){
    const url=new URL(location.href);
    url.searchParams.delete('_court_build');
    url.hash='';
    return url;
  }
  function extractBuild(html){
    try{
      const doc=new DOMParser().parseFromString(html,'text/html');
      const build=(doc.querySelector('meta[name="court-build"]')?.content||'').trim();
      return /^\d{8}\.\d+$/.test(build)?build:'';
    }catch(e){return '';}
  }
  function dismissedBuild(){try{return sessionStorage.getItem(DISMISSED_KEY)||'';}catch(e){return '';}}
  function statusHtml(){
    if(status==='checking')return 'Checking for updates…';
    if(status==='current')return 'This build is current.';
    if(status==='available')return `Update available · build ${availableBuild}.`;
    if(status==='offline')return 'Could not check while offline.';
    if(status==='unknown')return 'Could not verify the deployed build.';
    return 'Update status has not been checked yet.';
  }
  function updateUI(){
    const line=document.getElementById('updateStatusLine');if(line)line.textContent=statusHtml();
    const button=document.getElementById('checkUpdatesBtn');if(button)button.disabled=checking;
    const notice=document.getElementById('appUpdateNotice'),copy=document.getElementById('appUpdateCopy');
    const show=status==='available'&&availableBuild&&dismissedBuild()!==availableBuild;
    if(copy&&availableBuild)copy.textContent=`Running build ${APP_INFO.build} · available build ${availableBuild}.`;
    if(notice)notice.hidden=!show;
  }
  async function check(opts={}){
    if(checking)return null;
    const now=Date.now();
    if(!opts.force&&lastCheck&&now-lastCheck<CHECK_THROTTLE_MS)return status;
    checking=true;lastCheck=now;status='checking';updateUI();
    try{
      const response=await fetch(deployedUrl().toString(),{
        method:'GET',cache:'no-store',headers:{'X-Court-Build-Check':'1'}
      });
      if(!response.ok)throw new Error('http '+response.status);
      const build=extractBuild(await response.text());
      if(!build){status='unknown';return null;}
      if(build===APP_INFO.build){availableBuild='';status='current';}
      else{availableBuild=build;status='available';}
      return build;
    }catch(e){
      if(!availableBuild)status='offline';
      return null;
    }finally{checking=false;updateUI();}
  }
  function dismiss(){
    if(availableBuild){try{sessionStorage.setItem(DISMISSED_KEY,availableBuild);}catch(e){}}
    updateUI();
  }
  function unsafeUpdateReason(){
    if(live)return 'Finish or discard the current game before updating.';
    if(document.querySelector('.scrim'))return 'Close the open editor or dialog before updating.';
    if(tab==='track'){
      const selected=(window._sel?.A?.size||0)+(window._sel?.B?.size||0);
      if(selected||window._soloPick||window._evtPending)return 'Finish or clear the current tracking setup before updating.';
    }
    return '';
  }
  function navigationUrl(build=availableBuild){
    const url=deployedUrl();url.searchParams.set('_court_build',build);return url.toString();
  }
  async function applyUpdate(){
    if(!availableBuild)return false;
    const reason=unsafeUpdateReason();
    if(reason){toast(reason);return false;}
    try{
      await savePlayers();await saveGames();await saveSettings();await saveEvents();
      await Sync.persistLocalState();
    }catch(e){/* Store remains best-effort, matching normal offline saves. */}
    location.replace(navigationUrl());
    return true;
  }
  function cleanNavigationMarker(){
    const url=new URL(location.href);
    if(!url.searchParams.has('_court_build'))return;
    url.searchParams.delete('_court_build');
    history.replaceState(history.state,'',url.pathname+url.search+url.hash);
  }
  function init(){
    if(started)return;started=true;cleanNavigationMarker();
    document.addEventListener('visibilitychange',()=>{if(!document.hidden)check({});});
    setTimeout(()=>check({}),800);
    poller=setInterval(()=>check({}),300000);
  }
  return {init,check,applyUpdate,dismiss,statusHtml,updateUI,navigationUrl,extractBuild,get availableBuild(){return availableBuild;},get status(){return status;}};
})();

window.checkForUpdates=()=>AppUpdates.check({force:true});
window.applyAppUpdate=()=>AppUpdates.applyUpdate();
window.dismissAppUpdate=()=>AppUpdates.dismiss();

(function(){
  const _commit=commit;commit=async function(){const r=await _commit.apply(this,arguments);Sync.touch();return r;};
  const _saveEvents=saveEvents;saveEvents=async function(){const r=await _saveEvents.apply(this,arguments);Sync.touch();return r;};
  const _saveSettings=saveSettings;saveSettings=async function(){const r=await _saveSettings.apply(this,arguments);Sync.touch();return r;};
})();
