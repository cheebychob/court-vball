<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#070a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Court">
<title>Court — Volleyball Ratings</title>
<style>
  :root{
    /* new palette */
    --bg:#070a12;
    --text:#f4f7fc;
    --muted:#a9b4c8;
    --soft:#74819a;
    --faint:#4d5a70;
    --gold:#f2c66d;
    --gold-deep:#d99e37;
    --mint:#5fe3ae;
    --cyan:#74d7ff;
    --coral:#ff7d72;
    --warn:#ffd36d;
    --line:#ffffff1c;
    --line-strong:#ffffff2e;
    --glass:linear-gradient(150deg,#ffffff12,#ffffff07);
    --glass-strong:linear-gradient(150deg,#1a2438ee,#111a2cee);
    --radius:19px;
    --shadow:0 18px 60px #00000073;
    /* legacy aliases — the engine, editor & sheets reference these */
    --surface:#131b2b;
    --surface2:#1b2539;
    --border:#ffffff1f;
    --sand:#f2c66d;
    --good:#5fe3ae;
    --bad:#ff7d72;
    --teamA:#6db4ff;
    --teamB:#ffb36e;
    --tap:#ffffff1e;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--bg)}
  html,body{margin:0;padding:0;color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{
    min-height:100vh;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 16% -6%, #29507c5c 0, transparent 32rem),
      radial-gradient(circle at 98% 2%, #7c58305c 0, transparent 24rem),
      linear-gradient(172deg,#060810 0%,#0a0f1b 44%,#0e1424 100%);
    padding-bottom:calc(92px + env(safe-area-inset-bottom));
  }
  /* ambient court lines, fading toward the bottom */
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      linear-gradient(90deg, transparent 0 14%, #ffffff08 14% 14.3%, transparent 14.3% 85.7%, #ffffff08 85.7% 86%, transparent 86%),
      linear-gradient(0deg, transparent 0 47.5%, #ffffff07 47.5% 47.8%, transparent 47.8% 52.2%, #ffffff07 52.2% 52.5%, transparent 52.5%);
    mask-image:linear-gradient(to bottom,#000 0,#000 42%,transparent 96%);
    -webkit-mask-image:linear-gradient(to bottom,#000 0,#000 42%,transparent 96%);
    opacity:.5;
  }
  body::after{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:linear-gradient(180deg,transparent 40%,#070a12cc 100%);
  }

  button{font:inherit;color:inherit;cursor:pointer;border:0;background:transparent;padding:0}
  button:disabled{opacity:.45;cursor:not-allowed}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em}

  input,select,textarea{font-family:inherit;font-size:16px;color:var(--text);
    background:#ffffff0d;border:1px solid var(--line);border-radius:14px;
    padding:12px 13px;width:100%;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:0;border-color:transparent}
  ::placeholder{color:var(--faint)}
  textarea{resize:vertical}
  input[type="file"]{padding:10px;font-size:13px;color:var(--muted)}

  /* ---------- top bar & brand ---------- */
  .topbar{position:sticky;top:0;z-index:30;
    padding:calc(12px + env(safe-area-inset-top)) 16px 10px;
    background:linear-gradient(180deg,#070a12f4,#070a12c4 72%,transparent);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
  .topbar-inner{display:flex;align-items:center;gap:12px;max-width:1140px;margin:0 auto}
  .brand-mark{width:38px;height:38px;flex:none;border-radius:13px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#ffffff21,#ffffff06),linear-gradient(145deg,#2a4a70,#1a1f31 58%,#54401f);
    border:1px solid #ffffff26;
    box-shadow:0 0 26px #6db4ff20, inset 0 1px 0 #ffffff2e;}
  .brand-mark::before,.brand-mark::after{content:"";position:absolute;left:50%;top:50%;
    border:1.5px solid #f2c66dcc;border-radius:50%;}
  .brand-mark::before{width:22px;height:22px;margin:-11px 0 0 -11px;transform:rotate(24deg)}
  .brand-mark::after{width:30px;height:11px;margin:-5.5px 0 0 -15px;
    border-left-color:transparent;border-right-color:transparent;transform:rotate(-18deg)}
  .brand-copy{min-width:0}
  .brand-copy h1{margin:0;font-size:17px;line-height:1;font-weight:850;letter-spacing:.1em;text-transform:uppercase}
  .brand-copy span{display:block;margin-top:4px;color:var(--soft);font-size:12px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .night-pill{margin-left:auto;min-height:34px;display:inline-flex;align-items:center;gap:8px;
    padding:7px 11px;border-radius:999px;background:#ffffff0e;border:1px solid var(--line);
    color:var(--muted);font-size:12px;font-weight:650;white-space:nowrap;}
  .pulse{width:8px;height:8px;border-radius:999px;background:var(--mint);box-shadow:0 0 16px var(--mint)}
  .pulse.idle{background:var(--soft);box-shadow:none}

  main{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:8px 16px 30px;
    animation:rise .24s ease-out;}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- screen headers ---------- */
  .screen-head{margin:6px 1px 14px}
  .eyebrow{color:var(--gold);font-size:11px;font-weight:850;letter-spacing:.15em;text-transform:uppercase}
  .screen-head h2{margin:7px 0 0;font-size:26px;line-height:1.05;letter-spacing:-.01em}
  .subcopy{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.45;max-width:560px}
  .section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:22px 1px 10px}
  .section-head h3{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:800}
  .section-head span{color:var(--soft);font-size:12px}

  /* ---------- hero (Home) ---------- */
  .hero{position:relative;overflow:hidden;border-radius:26px;padding:18px;
    background:linear-gradient(140deg,#182c48dd 0%,#111a2cde 48%,#2c2412de 100%);
    border:1px solid #ffffff24;
    box-shadow:var(--shadow), inset 0 1px 0 #ffffff22;}
  .hero::before{content:"";position:absolute;inset:11px;border:1px solid #ffffff16;border-radius:18px;
    background:
      linear-gradient(90deg,transparent 0 49%,#ffffff17 49% 49.4%,transparent 49.4%),
      linear-gradient(0deg,transparent 0 50%,#ffffff12 50% 50.5%,transparent 50.5%);
    pointer-events:none;}
  .hero::after{content:"";position:absolute;width:220px;height:220px;right:-88px;top:-92px;border-radius:50%;
    border:1px solid #f2c66d33;box-shadow:0 0 76px #f2c66d24, inset 0 0 46px #ffffff08;}
  .hero-content{position:relative;z-index:1}
  .hero h2{margin:9px 0 6px;font-size:27px;line-height:1.05;letter-spacing:-.01em}
  .hero .subcopy{margin:0}
  .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:15px}
  .mini-stat{min-width:0;padding:11px 10px;border-radius:15px;background:#ffffff10;border:1px solid #ffffff19;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
  .mini-stat b{display:block;font-size:19px;line-height:1}
  .mini-stat span{display:block;margin-top:5px;color:var(--muted);font-size:11px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---------- cards ---------- */
  .card{position:relative;border-radius:var(--radius);background:var(--glass);
    border:1px solid var(--line);box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;
    padding:14px;margin-bottom:11px;}
  .card.flat{box-shadow:none}
  .grid{display:grid;gap:11px}
  .grid.two{grid-template-columns:1fr}

  .pressable{transition:transform .12s ease,border-color .16s ease,background-color .16s ease}
  .pressable:active{transform:scale(.976)}
  @media (hover:hover){ .pressable:hover{border-color:var(--line-strong)} }

  /* ---------- quick action tiles ---------- */
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .action-tile{min-height:88px;display:flex;flex-direction:column;align-items:flex-start;
    justify-content:space-between;gap:10px;padding:13px;border-radius:var(--radius);text-align:left;
    background:var(--glass);border:1px solid var(--line);
    box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;}
  .action-tile b{font-size:15px}
  .action-tile span{color:var(--soft);font-size:12px;line-height:1.3}
  .tile-icon{width:32px;height:32px;border-radius:12px;display:grid;place-items:center;color:#0a1220;
    background:var(--gold);box-shadow:0 0 20px #f2c66d40;}
  .tile-icon svg{width:17px;height:17px}
  .t-cyan .tile-icon{background:var(--cyan);box-shadow:0 0 20px #74d7ff40}
  .t-mint .tile-icon{background:var(--mint);box-shadow:0 0 20px #5fe3ae40}
  .t-coral .tile-icon{background:var(--coral);box-shadow:0 0 20px #ff7d7240}

  /* ---------- buttons (legacy .btn, restyled) ---------- */
  .btn{min-height:46px;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 15px;border-radius:15px;border:1px solid #ffffff22;background:#ffffff10;
    color:var(--text);font-weight:750;font-size:14px;
    transition:transform .1s ease,background .16s ease,border-color .16s ease;}
  .btn:active{transform:scale(.97)}
  .btn svg{width:17px;height:17px}
  .btn.primary{background:linear-gradient(135deg,#f5d47b,var(--gold-deep));color:#191106;
    border-color:#f6d98c5f;box-shadow:0 10px 30px #d99e3740;}
  .btn.ghost{background:#ffffff08;color:var(--muted);border-color:#ffffff17}
  .btn.ghost.on{color:var(--gold);border-color:#f2c66d55;background:#f2c66d14}
  .btn.danger{color:var(--coral);border-color:#ff7d7238;background:#ff7d7210}
  .btn.block{width:100%}
  .btn.sm{min-height:35px;padding:7px 11px;font-size:12.5px;border-radius:11px}

  /* ---------- pills / status ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;min-height:24px;padding:4px 9px;border-radius:999px;
    font-size:11px;font-weight:700;background:#ffffff0c;border:1px solid var(--line);color:var(--muted);
    white-space:nowrap;}
  .pill.solo{color:var(--cyan);border-color:#74d7ff42;background:#74d7ff12}
  .pill.partial{color:var(--gold);border-color:#f2c66d42;background:#f2c66d12}
  .pill.good{color:var(--mint);border-color:#5fe3ae42;background:#5fe3ae12}
  .pill.bad{color:var(--coral);border-color:#ff7d7242;background:#ff7d7212}
  .pill.warn{color:var(--warn);border-color:#ffd36d42;background:#ffd36d12}

  .row{display:flex;align-items:center;gap:10px}
  .spread{justify-content:space-between}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .soft{color:var(--soft)}
  .small{font-size:12.5px} .tiny{font-size:11px}

  .rate{font-weight:850;font-size:22px;line-height:1;color:var(--gold)}
  .rate.big{font-size:34px}
  .bar{display:block;height:7px;border-radius:5px;background:#ffffff10;overflow:hidden;margin-top:10px;border:1px solid #ffffff0f}
  .bar > i{display:block;height:100%;border-radius:inherit;
    background:linear-gradient(90deg,#7a6027,var(--gold));box-shadow:0 0 16px #f2c66d55;}
  .meter{height:10px;border-radius:999px;background:#ffffff10;overflow:hidden;border:1px solid #ffffff12}
  .meter i{display:block;height:100%;border-radius:inherit;
    background:linear-gradient(90deg,var(--coral),var(--gold),var(--mint));box-shadow:0 0 20px #5fe3ae55}

  .avatar{width:40px;height:40px;flex:none;display:grid;place-items:center;border-radius:14px;
    background:linear-gradient(150deg,#274563,#151c2e);border:1px solid #ffffff22;
    color:var(--text);font-weight:850;font-size:14px;box-shadow:inset 0 1px 0 #ffffff1c;position:relative;}
  .avatar.sm{width:34px;height:34px;border-radius:12px;font-size:12px}
  .avatar .off-dot{position:absolute;right:-3px;top:-3px;width:11px;height:11px;border-radius:999px;
    background:var(--soft);border:2px solid var(--bg)}

  /* ---------- segmented controls ---------- */
  .seg{display:flex;gap:7px;flex-wrap:wrap}
  .seg button{flex:1;min-height:42px;min-width:52px;padding:9px 8px;border-radius:13px;
    background:#ffffff0b;border:1px solid #ffffff17;color:var(--muted);font-weight:750;font-size:13.5px;
    transition:transform .1s ease,background .16s ease,border-color .16s ease,color .16s ease;}
  .seg button:active{transform:scale(.96)}
  .seg button.on{color:var(--gold);background:#f2c66d16;border-color:#f2c66d55;
    box-shadow:0 0 0 1px #f2c66d22, 0 8px 26px #f2c66d14;}
  .custom-num{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:end;margin-top:9px}
  .custom-num label{display:block;font-size:11px;color:var(--faint);font-weight:750;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
  .custom-num input{min-height:42px;padding:9px 11px;border-radius:13px}
  .custom-num .btn{min-height:42px;border-radius:13px;padding:9px 12px}

  /* ---------- chips (player pool / selection) ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;min-height:38px;padding:8px 12px;border-radius:999px;
    background:#ffffff0a;border:1px solid #ffffff19;color:var(--muted);font-weight:700;font-size:12.5px;
    transition:transform .1s ease,background .16s ease,border-color .16s ease,color .16s ease;}
  .chip:active{transform:scale(.95)}
  .chip .r{color:var(--soft);font-weight:800;font-size:11.5px}
  .chip.on{background:#5fe3ae16;border-color:#5fe3ae5c;color:var(--mint)}
  .chip.on .r{color:inherit;opacity:.85}

  /* ---------- player cards ---------- */
  .player-list{display:grid;gap:10px;margin-top:12px}
  .player-card{width:100%;text-align:left;padding:13px;border-radius:var(--radius);
    background:var(--glass);border:1px solid var(--line);
    box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;}
  .player-card.inactive{opacity:.62}
  .player-top{display:flex;align-items:flex-start;gap:11px}
  .player-meta{min-width:0;flex:1}
  .player-meta > b{display:block;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-sub{display:block;margin-top:4px;color:var(--muted);font-size:12px}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .rating-badge{text-align:right;flex:none}
  .rating-badge > b{display:block;font-size:25px;line-height:.95;font-weight:850;color:var(--gold)}
  .rating-badge .spark{display:block;margin-left:auto;margin-top:7px}
  .delta{display:inline-block;margin-top:5px;font-size:11px;font-weight:850}
  .delta.up{color:var(--mint)} .delta.down{color:var(--coral)}
  .spark{opacity:.95}

  .mover{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:14px;
    background:#ffffff08;border:1px solid #ffffff12;margin-top:8px}
  .mover .who{min-width:0;flex:1}
  .mover .who b{display:block;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mover .who span{display:block;margin-top:2px;color:var(--soft);font-size:11.5px}
  .delta-up{color:var(--mint);font-weight:850} .delta-down{color:var(--coral);font-weight:850}

  .empty{text-align:center;color:var(--soft);padding:44px 18px;font-size:14px;line-height:1.5}
  .empty b{display:block;color:var(--text);font-size:16px;margin-bottom:7px}

  /* ---------- track: mode selector ---------- */
  .mode-row{display:grid;grid-template-columns:1fr;gap:9px;margin:2px 0 14px}
  .mode-btn{text-align:left;min-height:64px;display:flex;align-items:center;gap:12px;padding:12px;
    border-radius:18px;background:#ffffff0a;border:1px solid #ffffff16;}
  .mode-btn.active{background:linear-gradient(150deg,#1e334d,#141d31);border-color:#74d7ff5c;
    box-shadow:0 0 0 1px #74d7ff20, 0 12px 36px #74d7ff14;}
  .mode-icon{width:40px;height:40px;flex:none;border-radius:14px;display:grid;place-items:center;
    background:#ffffff0f;border:1px solid #ffffff1c;color:var(--cyan);}
  .mode-icon svg{width:19px;height:19px}
  .mode-copy{min-width:0}
  .mode-copy b{display:block;font-size:14px}
  .mode-copy span{display:block;margin-top:3px;color:var(--soft);font-size:12px;line-height:1.3}

  /* ---------- track: live score ---------- */
  .score-card{padding:13px;border-radius:23px;background:var(--glass-strong);
    border:1px solid #ffffff20;box-shadow:var(--shadow), inset 0 1px 0 #ffffff1c;margin-bottom:11px;}
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .score-box{padding:12px 10px;border-radius:18px;background:#ffffff0b;border:1px solid #ffffff16;text-align:center}
  .score-box.A{border-color:#6db4ff4d} .score-box.B{border-color:#ffb36e4d}
  .score-lbl{font-size:11px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}
  .score-box.A .score-lbl{color:var(--teamA)} .score-box.B .score-lbl{color:var(--teamB)}
  .score-num{font-size:46px;line-height:.95;font-weight:900;margin:8px 0 10px}
  .score-steps{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .score-steps button{min-height:44px;border-radius:14px;background:#ffffff10;border:1px solid #ffffff1c;
    font-size:22px;font-weight:850;transition:transform .1s ease,background .14s ease;}
  .score-steps button:active{transform:scale(.94);background:var(--tap)}
  .prob-line{text-align:center;color:var(--faint);font-size:11.5px;margin:9px 2px 0}

  .strip{display:flex;align-items:center;gap:8px;margin:0 0 12px}
  .strip .btn.sm{flex:none}

  .teamhdr{font-size:11px;letter-spacing:.13em;text-transform:uppercase;font-weight:850;margin:15px 1px 8px}
  .teamhdr.A{color:var(--teamA)} .teamhdr.B{color:var(--teamB)}
  .unktag{color:var(--faint);font-weight:600;text-transform:none;letter-spacing:0;font-size:11px}
  .unkline{color:var(--soft);font-size:12px;line-height:1.45;padding:10px 12px;border-radius:14px;
    background:#ffffff07;border:1px dashed #ffffff1f;margin-bottom:10px}

  /* ---------- tracked player card ---------- */
  .tcard{padding:12px;border-radius:18px;background:var(--glass);border:1px solid var(--line);
    box-shadow:0 8px 26px #00000024, inset 0 1px 0 #ffffff15;margin-bottom:9px}
  .thead{display:flex;align-items:center;gap:10px}
  .tname{min-width:0;flex:1}
  .tname b{display:block;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tname span{display:block;margin-top:2px;color:var(--soft);font-size:11.5px}
  .perf{flex:none;min-width:44px;text-align:right;font-weight:900;font-size:19px;color:var(--faint)}
  .perf.good{color:var(--mint)} .perf.bad{color:var(--coral)}

  .ev{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .ev button{flex:1 1 auto;min-width:56px;min-height:44px;padding:9px 5px;border-radius:12px;
    font-size:12px;font-weight:800;background:#ffffff0c;border:1px solid #ffffff17;color:var(--muted);
    position:relative;transition:transform .1s ease,background .12s ease;}
  .ev button:active{transform:scale(.93);background:var(--tap)}
  .ev button.g{color:var(--mint);border-color:#5fe3ae2c}
  .ev button.b{color:var(--coral);border-color:#ff7d722c}
  .ev .cnt{font-size:10px;opacity:.75;margin-left:4px;color:var(--text)}
  .evrow{display:flex;align-items:center;gap:9px;margin-top:8px}
  .evrow .evlbl{flex:0 0 50px;font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-weight:800}
  .evrow .ev{flex:1;margin-top:0}
  .expand{display:inline-block;font-size:12px;color:var(--soft);margin-top:9px;padding:4px 2px;font-weight:650}

  /* ---------- teams ---------- */
  .team-results{display:grid;gap:11px;margin-top:4px}
  .team-card{padding:13px;border-radius:20px;background:var(--glass);border:1px solid var(--line);
    box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;}
  .team-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
  .team-title b{display:block;font-size:16px}
  .team-title span{display:block;margin-top:3px;color:var(--soft);font-size:12px}
  .team-avg{text-align:right;color:var(--gold);font-weight:900;font-size:23px;line-height:1}
  .team-avg span{display:block;margin-top:4px;color:var(--soft);font-size:10.5px;font-weight:650}
  .member{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:13px;
    background:#00000021;border:1px solid #ffffff0e;margin-top:7px}

<script>
/* ============================================================
   STORAGE  — persists across sessions via window.storage,
   with an in-memory fallback so it never hard-fails.
   ============================================================ */
const Store = (()=>{
  const mem = {};
  // Detect localStorage (works in a real browser / home-screen app)
  let lsOK = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); lsOK = true; }
  catch(e){ lsOK = false; }
  // Detect Claude's cloud storage (works inside the Claude app artifact)
  const wsOK = (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');

  async function get(k){
    if(lsOK){ try{ const v = localStorage.getItem(k); if(v!=null) return v; }catch(e){} }
    if(wsOK){ try{ const r = await window.storage.get(k); if(r && r.value!=null) return r.value; }catch(e){} }
    return mem[k] ?? null;
  }
  async function set(k,v){
    mem[k]=v;
    let saved=false;
    if(lsOK){ try{ localStorage.setItem(k,v); saved=true; }catch(e){} }
    if(wsOK){ try{ await window.storage.set(k,v,false); saved=true; }catch(e){} }
    return saved;
  }
  return { get, set, mode: lsOK?'device':(wsOK?'cloud':'memory') };
})();

/* ============================================================
   STATE
   ============================================================ */
const VOLLEYBALL_LEVELS = [

    }},
  {key:'a', label:'A', seed:82, min:75, max:89, short:'Strong',
    overall:'Strong player. Reliable, intentional, and tournament-capable.',

      serving:'Tough serve, targets seams and passers.',

    }},
  {key:'aa-open', label:'AA/Open', seed:93, min:90, max:100, short:'Elite',
    overall:'Rare high-end player. Dominant in most open gyms, strong tournament/college-level skill.',

    }}
];
const LEVEL_ANCHOR_LABELS = [
  ['serving','Serve'],
  ['passing','Passing'],
  ['setting','Setting'],
  ['attacking','Attacking'],
  ['defense','Defense'],
  ['iqCommunication','IQ / communication'],
];
const TIERS = VOLLEYBALL_LEVELS.map(l=>({k:l.label, seed:l.seed, d:l.short}));
const ROLE_DEFS = [
  ['setter','Setter'], ['passer','Passer'], ['hitter','Hitter'],
  ['defense','Defense'], ['blocker','Blocker'], ['beginner','Beginner'],
];
const SKILL_DEFS = [
  ['passing','Passing / receive',25], ['serving','Serving',15], ['setting','Setting',15],
  ['hitting','Hitting / block',20], ['defense','Defense / move',15], ['iq','IQ / comms',10],
];
// event types: k=key, l=label, w=weight, c=color class, common=quick view,
// grade=part of serve/pass grading trio, detail=only shown in Detailed grading mode
const EVENTS = [
  {k:'ace',     l:'Ace',    w:3,    c:'g', common:true, grade:true},
  {k:'sin',     l:'In',     w:0.5,  c:'g', detail:true, grade:true},
  {k:'serr',    l:'Srv err',w:-2,   c:'b', grade:true},
  {k:'goodPass',l:'Pass',   w:1,    c:'g', grade:true},
  {k:'pget',    l:'Get',    w:0.4,  c:'g', detail:true, grade:true},
  {k:'perr',    l:'Pass err',w:-1.5,c:'b', common:true, grade:true},
  {k:'kill',    l:'Kill',   w:2,    c:'g', common:true},
  {k:'kerr',    l:'Hit err',w:-1.5, c:'b'},
  {k:'dig',     l:'Dig',    w:1.5,  c:'g', common:true},
  {k:'block',   l:'Block',  w:2,    c:'g'},

  {k:'fault',   l:'Fault',  w:-1,   c:'b'},
];
const EV_MAP = Object.fromEntries(EVENTS.map(e=>[e.k,e]));
// how events cluster in the live tracker, each group ordered great -> gettable -> error
const EVENT_GROUPS = [
  {g:'Serve',   keys:['ace','sin','serr']},
  {g:'Receive', keys:['goodPass','pget','perr']},
  {g:'Attack',  keys:['kill','kerr']},
  {g:'Defense', keys:['dig','block']},
  {g:'Other',   keys:['assist','fault']},
];
const PLAYER_STAT_GROUPS = [
  {g:'Serve', keys:['ace','sin','serr']},
  {g:'Receive', keys:['goodPass','pget','perr']},
  {g:'Attack', keys:['kill','kerr','block']},
  {g:'Defense', keys:['dig']},
  {g:'Setting', keys:['assist']},
  {g:'Other', keys:['fault']},
];
const PLAYER_STAT_LABELS = {
  ace:'Aces',
  sin:'Serves in',
  serr:'Serve errors',
  goodPass:'Good passes',
  pget:'Playable passes',
  perr:'Pass errors',
  kill:'Kills',
  kerr:'Hit errors',
  dig:'Digs',
  block:'Blocks',
  assist:'Sets / assists',
  fault:'Faults',
};
const PLAYER_STAT_ERRORS = new Set(['serr','perr','kerr','fault']);

const DEFAULT_SETTINGS = {
  numTeams:2, hideRatings:false, detailed:false, playerSort:'az',
  eloK:5, eloD:20, eventK:0.6, maxElo:6, maxEvent:5, confGames:12,
};

let players = [];      // see makePlayer()
let games = [];        // see makeGame()
let evts = [];         // events/tournaments: {id,name,created,done,teams:[{id,name,players:[ids]}]}
let settings = {...DEFAULT_SETTINGS};
let live = null;       // in-progress game state
let tab = 'players';

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function zeroEvents(){ const o={}; EVENTS.forEach(e=>o[e.k]=0); return o; }
function makePlayer(name, seed){
  return { id:uid(), name:name.trim(), seedRating:seed,
    rating:seed, gamesPlayed:0, trackedGames:0, wins:0, losses:0,
    fullGames:0, partialGames:0, soloGames:0,
    roles:{}, skills:null, lifetime:zeroEvents(),
    history:[{i:0,r:seed}], notes:'', active:true, archived:false };
}

/* ============================================================
   LOAD / SAVE
   ============================================================ */
async function load(){
  const p = await Store.get('vb:players'); if(p) players = JSON.parse(p);
  const g = await Store.get('vb:games');   if(g) games = JSON.parse(g);
  const s = await Store.get('vb:settings');if(s) settings = {...DEFAULT_SETTINGS, ...JSON.parse(s)};
  const e = await Store.get('vb:events');  if(e) evts = JSON.parse(e);
  migrateEvents();
  // migrate any missing fields
  migratePlayers();
}
function migrateEvents(){
  evts.forEach(ev=>{
    if(ev.bracket){ ev.brackets=[{id:uid(), name:'Playoffs', created:ev.bracket.created, seeds:ev.bracket.seeds}]; delete ev.bracket; }
    if(!ev.brackets) ev.brackets=[];
  });
}
function migratePlayers(){

/* ============================================================
   RATING ENGINE — deterministic replay of all games in order.
   ============================================================ */
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
function positiveInt(value, fallback){
  const n = Math.round(Number(value));
  return Number.isFinite(n) && n>0 ? n : fallback;
}
function alphaLabel(index){
  let n = Math.floor(Number(index));
  if(!Number.isFinite(n) || n<0) n = 0;
  n++;
  let out = '';
  while(n>0){
    n--;
    out = String.fromCharCode(65 + (n%26)) + out;
    n = Math.floor(n/26);
  }
  return out;
}
function teamLabel(index){ return alphaLabel(index); }
function poolLabel(index){ return alphaLabel(index); }
function bracketRoundName(size, matchLabel=false){
  if(size===2) return 'Final';
  if(size===4) return matchLabel ? 'Semifinal' : 'Semifinals';
  if(size===8) return matchLabel ? 'Quarterfinal' : 'Quarterfinals';
  return 'Round of '+size;
}
function tierOf(r){
  return volleyballLevelOf(r).label;
}
function volleyballLevelOf(rating){
  const r = clamp(Math.round(Number(rating)||0), 0, 100);
  return VOLLEYBALL_LEVELS.find(l=>r>=l.min && r<=l.max) || VOLLEYBALL_LEVELS[0];

function reliability(p){
  // Confidence is driven by games that actually taught us something about this
  // player — their own logged events, or a both-sides-tracked result — not by
  // every game their name appeared on a team. See trackedGames in the engine.
  const gp=p.trackedGames||0, full=settings.confGames;
  if(gp>=full) return {k:'established', c:'var(--good)'};
  if(gp < Math.ceil(full/3)) return {k:'new', c:'var(--faint)'};
  return {k:'settling', c:'var(--sand)'};
}
function band(p){
  const conf=Math.min(1, (p.trackedGames||0)/settings.confGames);
  return Math.round((1-conf)*11 + 3);              // ±range, wide when new
}
function winProbability(aIds,bIds){
  const A=aIds.map(pById).filter(Boolean), B=bIds.map(pById).filter(Boolean);
  if(!A.length||!B.length) return null;
  const avgA=A.reduce((s,p)=>s+p.rating,0)/A.length;
  const avgB=B.reduce((s,p)=>s+p.rating,0)/B.length;
  return 1/(1+Math.pow(10,(avgB-avgA)/settings.eloD));
}
function recentDelta(p, n=5){
  if(!p.history||p.history.length<2) return 0;
  const cur=p.history[p.history.length-1].r;
  const back=p.history[Math.max(0, p.history.length-1-n)].r;
  return cur-back;
}
const DASH = '—';
function evCount(p,k){ return Number(((p&&p.lifetime)||{})[k])||0; }
function eventTotal(p){ return EVENTS.reduce((s,e)=>s+evCount(p,e.k),0); }
function pct(n,d){ return d>0 ? `${Math.round((n/d)*100)}%` : DASH; }
function rateOrDash(n,d,places=1,suffix=''){
  if(!(d>0)) return DASH;
  return `${(n/d).toFixed(places)}${suffix}`;
}
function hitEff(n,d){
  if(!(d>0)) return DASH;
  const v=n/d;
  if(v===0) return '.000';
  const abs=Math.abs(v).toFixed(3);
  if(Math.abs(v)<1) return `${v<0?'-':''}${abs.replace(/^0/,'')}`;
  return `${v<0?'-':''}${abs}`;
}
function sampleLabel(count, lowThreshold, trustedThreshold){
  const n=Number(count)||0;
  if(n<lowThreshold) return 'low sample';
  if(n<trustedThreshold) return 'building sample';
  return 'trusted sample';
}
function recentRatingTrend(p, n=5){
  const hist=(p&&p.history||[]).filter(x=>Number.isFinite(Number(x.r)));
  if(!p || p.gamesPlayed<3 || hist.length<4){
    return {label:'Not enough games', delta:0, games:Math.max(0,Number(p&&p.gamesPlayed)||0), tone:'var(--faint)'};
  }
  const games=Math.min(n, hist.length-1);
  const cur=Number(hist[hist.length-1].r);
  const back=Number(hist[hist.length-1-games].r);
  const delta=cur-back;
  if(delta>=2) return {label:'Rising', delta, games, tone:'var(--good)'};
  if(delta<=-2) return {label:'Cooling off', delta, games, tone:'var(--bad)'};
  return {label:'Stable', delta, games, tone:'var(--faint)'};
}
function statConfidence(p){
  const total=eventTotal(p);
  return {label:sampleLabel(total,12,40), count:total};
}
function playerInsights(p){
  const ace=evCount(p,'ace'), sin=evCount(p,'sin'), serr=evCount(p,'serr');
  const goodPass=evCount(p,'goodPass'), pget=evCount(p,'pget'), perr=evCount(p,'perr');
  const kill=evCount(p,'kill'), kerr=evCount(p,'kerr'), dig=evCount(p,'dig'), block=evCount(p,'block');
  const serveDen=ace+sin+serr, passDen=goodPass+pget+perr, hitDen=kill+kerr;
  const overall={label:sampleLabel(p.trackedGames||0, Math.ceil(settings.confGames/3), settings.confGames), count:p.trackedGames||0};
  const stat=statConfidence(p);
  const a=analyze(p);
  const notes=[];
  if(stat.label==='low sample'){
    notes.push('Need more logged events for reliable stat insights');
  } else {
    if(a&&a.strength) notes.push(`${stat.label==='trusted sample'?'Strong signal':'Early signal'}: ${a.strength}`);
    if(a&&a.weakness) notes.push(`Watch: ${a.weakness}`);
    if(!notes.length) notes.push(stat.label==='trusted sample' ? 'No standout stat pattern yet' : 'More logged events will sharpen these notes');
  }
  return {
    trend:recentRatingTrend(p),
    overallConfidence:overall,
    statConfidence:stat,
    rates:{
      serveIn:pct(ace+sin,serveDen),
      aceRate:pct(ace,serveDen),
      passErr:pct(perr,passDen),
      hitEff:hitEff(kill-kerr,hitDen),
      defense:rateOrDash(dig+block,p.gamesPlayed,1,'/game')

function confidenceColor(label){
  return label==='trusted sample'?'var(--good)':label==='building sample'?'var(--sand)':'var(--faint)';
}
function insightCard(p){
  const ins=playerInsights(p);

  const delta = trend.delta>0?`+${trend.delta}`:`${trend.delta}`;
  const trendMeta = (!settings.hideRatings && trend.label!=='Not enough games')
    ? `<span class="tiny faint" style="margin-left:6px">${delta} last ${trend.games}</span>`
    : '';
  const lowNote = ins.statConfidence.label==='low sample'
    ? `<div class="tiny faint" style="margin-top:5px">Low sample stats can swing quickly; do not overread them yet.</div>`
    : '';
  const metrics=[
    ['Serve in',ins.rates.serveIn,''],
    ['Ace rate',ins.rates.aceRate,''],
    ['Pass err %',ins.rates.passErr,''],

  ];

    <div class="row spread">
      <div class="stat-title" style="margin:0">Player insights</div>
      <span class="pill" style="color:${trend.tone};border-color:${trend.tone}">${esc(trend.label)}${trendMeta}</span>
    </div>
    <div style="margin-top:9px">
      <div class="row spread" style="margin-top:5px"><span class="small muted">Overall sample</span><span class="small" style="font-weight:700;color:${confidenceColor(ins.overallConfidence.label)}">${ins.overallConfidence.label}</span></div>
      <div class="row spread" style="margin-top:5px"><span class="small muted">Stat sample</span><span class="small" style="font-weight:700;color:${confidenceColor(ins.statConfidence.label)}">${ins.statConfidence.label}</span></div>
      ${lowNote}
    </div>
    <div class="insight-grid">
      ${metrics.map(([label,value,wide])=>`<div class="insight-metric ${wide}">

    </div>
    <div class="tiny faint" style="margin-top:7px">Hit eff. (kills - errors) / logged attacks. Ratings still use saved results + event weights.</div>
    <div style="margin-top:8px">${ins.notes.map(n=>`<div class="small">${esc(n)}</div>`).join('')}</div>

/* ============================================================
   PLAYER PROFILE CARD
   Pure, derived-on-render. Nothing here is stored; fixing or
   deleting a game self-corrects the card, same as everything else.
   Radar values blend a prior (current rating, shaped by the seed
   skill ratings) with observed per-axis evidence (event rates
   z-scored against peers). The blend weight grows with the number
   of logged events on that axis, so the card is honest: axes with
   little data lean on the prior and render faded.
   ============================================================ */
const CARD_AXES=[
  {k:'serving', label:'Serve',   pos:[['ace',3],['sin',0.5]],       neg:[['serr',2]]},
  {k:'passing', label:'Pass',    pos:[['goodPass',1],['pget',0.4]], neg:[['perr',1.5]]},
  {k:'setting', label:'Set',     pos:[['assist',1]],                neg:[]},
  {k:'hitting', label:'Attack',  pos:[['kill',2],['block',2]],      neg:[['kerr',1.5]]},
  {k:'defense', label:'Defense', pos:[['dig',1.5]],                 neg:[]},
  {k:'iq',      label:'IQ',      pos:[],                            neg:[]},
];
function passerRating(p){
  // Standard volleyball 3-point passer rating: perfect=3, playable=1, error=0.
  const g=evCount(p,'goodPass'), t=evCount(p,'pget'), e=evCount(p,'perr');
  const den=g+t+e;
  return den>0 ? {value:(3*g+t)/den, n:den} : {value:null, n:0};
}
function axisSample(p,ax){ return ax.pos.concat(ax.neg).reduce((s,[k])=>s+evCount(p,k),0); }
function axisNetRate(p,ax){
  const gp=Math.max(1,p.gamesPlayed||0);
  let s=0;
  ax.pos.forEach(([k,w])=>s+=w*evCount(p,k));
  ax.neg.forEach(([k,w])=>s-=w*evCount(p,k));
  return s/gp;
}
function radarAxes(p, peerPool){
  const peers=(peerPool||players).filter(x=>x.gamesPlayed>=3 && eventTotal(x)>0);
  const usePeers=peers.length>=3;
  const skills=p.skills||null;
  const skillMean=skills? SKILL_DEFS.reduce((s,[k])=>s+(Number(skills[k])||3),0)/SKILL_DEFS.length : 3;
  return CARD_AXES.map(ax=>{
    const n=axisSample(p,ax);
    const prior=clamp(p.rating + (skills? ((Number(skills[ax.k])||3)-skillMean)*7 : 0), 0, 100);
    let observed=prior, w=0;
    if(usePeers && ax.pos.length && n>0){
      const vals=peers.map(x=>axisNetRate(x,ax));
      const m=vals.reduce((s,x)=>s+x,0)/vals.length;
      const sd=Math.sqrt(vals.reduce((s,x)=>s+(x-m)*(x-m),0)/vals.length)||1e-6;
      const z=clamp((axisNetRate(p,ax)-m)/sd, -2.2, 2.2);
      observed=clamp(p.rating + z*14, 0, 100);
      w=n/(n+10);
    }
    return {key:ax.k, label:ax.label, value:clamp(w*observed+(1-w)*prior,0,100), n, w, measured:w>0.33};
  });
}
function capFirst(s){ return s? s.charAt(0).toUpperCase()+s.slice(1) : s; }
function profileCardData(p){
  const ins=playerInsights(p);

  const pr=passerRating(p);
  const dig=evCount(p,'dig'), block=evCount(p,'block');
  const gp=p.gamesPlayed||0;
  const level=volleyballLevelOf(p.rating);
  const roleNames=ROLE_DEFS.filter(([k])=>p.roles&&p.roles[k]).map(([,l])=>l);
  const trend=recentRatingTrend(p);
  return {
    name:p.name,
    initials:initials(p.name),
    subtitle:roleNames.length?roleNames.slice(0,2).join(' \u00b7 '):(settings.hideRatings?'Player':level.short+' player'),
    level:settings.hideRatings?null:level.label,
    sample:ins.statConfidence.label,
    axes:radarAxes(p),
    strengths:a&&a.strength?capFirst(a.strength):null,
    workOn:a&&a.weakness?capFirst(a.weakness):null,
    stats:[
      ['Passer rating', pr.value==null?DASH:pr.value.toFixed(2)],
      ['Hit efficiency', ins.rates.hitEff],
      ['Serve in', ins.rates.serveIn],
      ['Ace rate', ins.rates.aceRate],
      ['Digs / game', gp&&dig?(dig/gp).toFixed(1):DASH],
      ['Blocks / game', gp&&block?(block/gp).toFixed(1):DASH],
    ],
    footer:`${gp} game${gp===1?'':'s'}${trend.label==='Rising'?' \u00b7 trending up':trend.label==='Cooling off'?' \u00b7 cooling off':''}`,
  };

function drawPlayerCard(canvas, d){
  const W=1080, H=1500;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  if(!ctx) return;
  const F=(w,s)=>`${w} ${s}px system-ui, sans-serif`;
  function rrect(x,y,w,h,r){
    ctx.beginPath();
    if(ctx.roundRect){ ctx.roundRect(x,y,w,h,r); return; }
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }
  // background: night court
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0b1322'); bg.addColorStop(1,'#070a12');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const glow=ctx.createRadialGradient(W/2,90,60,W/2,90,760);
  glow.addColorStop(0,'rgba(116,150,255,0.20)'); glow.addColorStop(1,'rgba(116,150,255,0)');
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,900);
  const pad=64;
  // header
  ctx.beginPath(); ctx.arc(pad+56,152,56,0,Math.PI*2);
  ctx.fillStyle='#16233d'; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='rgba(116,215,255,0.35)'; ctx.stroke();
  ctx.fillStyle='#9cc6ff'; ctx.font=F(800,40); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(d.initials, pad+56, 154);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#f4f7fc'; ctx.font=F(800,52); ctx.fillText(d.name, pad+140, 142);
  ctx.fillStyle='#a9b4c8'; ctx.font=F(500,30); ctx.fillText(d.subtitle, pad+140, 190);
  if(d.level){
    ctx.font=F(800,30);
    const tw=ctx.measureText(d.level).width;
    rrect(W-pad-tw-44, 96, tw+44, 56, 28);
    ctx.fillStyle='rgba(109,180,255,0.16)'; ctx.fill();
    ctx.fillStyle='#9cc6ff'; ctx.textAlign='center';
    ctx.fillText(d.level, W-pad-(tw+44)/2, 136);
  }
  ctx.textAlign='right'; ctx.fillStyle='#74819a'; ctx.font=F(500,27);
  ctx.fillText(d.sample, W-pad, 192);
  // radar
  const cx=W/2, cy=560, R=225, N=d.axes.length;
  const pt=(i,r)=>{ const a=-Math.PI/2 + i*2*Math.PI/N; return [cx+Math.cos(a)*r, cy+Math.sin(a)*r]; };
  ctx.lineWidth=1.5; ctx.strokeStyle='rgba(255,255,255,0.10)';
  [1/3,2/3,1].forEach(f=>{
    ctx.beginPath();
    for(let i=0;i<N;i++){ const [x,y]=pt(i,R*f); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    ctx.closePath(); ctx.stroke();
  });
  for(let i=0;i<N;i++){ const [x,y]=pt(i,R); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke(); }
  ctx.beginPath();
  d.axes.forEach((ax,i)=>{ const [x,y]=pt(i,R*ax.value/100); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.closePath();
  ctx.fillStyle='rgba(109,180,255,0.17)'; ctx.fill();
  ctx.lineWidth=3.5; ctx.strokeStyle='#6db4ff'; ctx.stroke();
  d.axes.forEach((ax,i)=>{
    const [x,y]=pt(i,R*ax.value/100);
    ctx.globalAlpha=0.35+0.65*ax.w;
    ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fillStyle='#6db4ff'; ctx.fill();
    ctx.globalAlpha=1;
    const [lx,ly]=pt(i,R+46);
    const c=Math.cos(-Math.PI/2 + i*2*Math.PI/N);
    ctx.textAlign = Math.abs(c)<0.3 ? 'center' : (c>0?'left':'right');
    ctx.textBaseline='middle';
    ctx.fillStyle = ax.measured ? '#c7d3e8' : '#74819a';
    ctx.font=F(600,30);
    ctx.fillText(ax.label, lx, ly);
  });
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  // divider + strengths
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pad,862); ctx.lineTo(W-pad,862); ctx.stroke();
  ctx.font=F(600,30);
  ctx.fillStyle='#5fe3ae'; ctx.fillText('\u2197', pad, 930);
  ctx.fillStyle='#a9b4c8'; ctx.fillText('Strengths', pad+44, 930);
  ctx.fillStyle='#f2c66d'; ctx.fillText('\u25ce', pad, 990);
  ctx.fillStyle='#a9b4c8'; ctx.fillText('Work on', pad+44, 990);
  ctx.textAlign='right'; ctx.font=F(800,32);
  ctx.fillStyle=d.strengths?'#f4f7fc':'#4d5a70';
  ctx.fillText(d.strengths||'Log more events', W-pad, 930);
  ctx.fillStyle=d.workOn?'#f4f7fc':'#4d5a70';
  ctx.fillText(d.workOn||'Log more events', W-pad, 990);
  ctx.textAlign='left';
  // stat tiles
  const tw2=(W-pad*2-24)/2, th=118;
  d.stats.forEach(([label,value],i)=>{
    const col=i%2, row=Math.floor(i/2);
    const x=pad+col*(tw2+24), y=1030+row*(th+24);
    rrect(x,y,tw2,th,18);
    ctx.fillStyle='#131b2b'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle='rgba(255,255,255,0.09)'; ctx.stroke();
    ctx.fillStyle='#a9b4c8'; ctx.font=F(500,27); ctx.fillText(label, x+28, y+44);
    ctx.fillStyle=value===DASH?'#4d5a70':'#f4f7fc'; ctx.font=F(800,44);
    ctx.fillText(value, x+28, y+96);
  });
  // footer
  ctx.fillStyle='#74819a'; ctx.font=F(500,27);
  ctx.fillText(d.footer, pad, H-38);
  ctx.textAlign='right'; ctx.fillStyle='#f2c66d'; ctx.font=F(800,30);
  ctx.fillText('Court', W-pad, H-38);
  ctx.textAlign='left';
}

function accuracyStats(){
  const g=games.filter(x=>x.winner && x.predCorrect!=null);
  if(!g.length) return null;
  const right=g.filter(x=>x.predCorrect).length;
  return {pct:Math.round(right/g.length*100), n:g.length};
}
const SIGNALS=[
  {k:'ace',label:'serving',dir:1},{k:'kill',label:'hitting',dir:1},
  {k:'dig',label:'defense',dir:1},{k:'block',label:'blocking',dir:1},
  {k:'assist',label:'setting',dir:1},{k:'goodPass',label:'passing',dir:1},
  {k:'serr',label:'serving',dir:-1},{k:'kerr',label:'hitting',dir:-1},{k:'perr',label:'passing',dir:-1},
];
function analyze(p){
  if(p.gamesPlayed<3) return null;
  const peers=players.filter(x=>x.gamesPlayed>=1);
  if(peers.length<3) return null;
  const rate=(pl,k)=>(pl.lifetime[k]||0)/Math.max(1,pl.gamesPlayed);
  function st(k){ const v=peers.map(x=>rate(x,k)); const m=v.reduce((s,x)=>s+x,0)/v.length;
    const sd=Math.sqrt(v.reduce((s,x)=>s+(x-m)*(x-m),0)/v.length)||1e-6; return {m,sd}; }
  let str=null,strZ=0.6, weak=null,weakZ=0.6;
  SIGNALS.forEach(sig=>{
    const {m,sd}=st(sig.k); const z=(rate(p,sig.k)-m)/sd;
    if(sig.dir===1){
      if(z>strZ){ strZ=z; str=sig.label; }
      if(-z>weakZ){ weakZ=-z; weak=sig.label; }
    } else {
      if(z>weakZ){ weakZ=z; weak=sig.label+' errors'; }
    }
  });
  if(!str && !weak) return null;
  return {strength:str, weakness:weak};
}
function trendChart(hist){
  if(!hist||hist.length<2) return '<div class="tiny faint" style="padding:8px 0">Play a few games to see a trend line.</div>';
  const w=300,h=80,padX=4,padY=10;
  const rs=hist.map(x=>x.r); const mn=Math.min(...rs),mx=Math.max(...rs),rng=(mx-mn)||1;
  const X=i=>padX+(i/(hist.length-1))*(w-2*padX);
  const Y=r=>h-padY-((r-mn)/rng)*(h-2*padY);
  const line=hist.map((x,i)=>`${X(i).toFixed(1)},${Y(x.r).toFixed(1)}`).join(' ');
  const up=rs[rs.length-1]>=rs[0]; const col=up?'var(--good)':'var(--bad)';
  const area=`${padX},${(h-padY).toFixed(1)} ${line} ${(w-padX).toFixed(1)},${(h-padY).toFixed(1)}`;
  return `<div class="row spread tiny faint" style="margin-bottom:2px"><span>high ${mx}</span><span>now ${rs[rs.length-1]}</span></div>
  <svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block;height:80px">
    <polygon points="${area}" fill="${col}" opacity="0.10"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
function pById(id){ return players.find(p=>p.id===id); }
function isArchived(p){ return !!(p&&p.archived); }
function playerAppearsInGames(id){
  return games.some(g=>
    (g.teamA||[]).includes(id) ||
    (g.teamB||[]).includes(id) ||
    !!(g.log&&Object.prototype.hasOwnProperty.call(g.log,id))
  );
}
function clearPlayerRuntimeState(id){

  if(window._pool) window._pool.delete(id);
  if(window._soloPick===id) window._soloPick=null;
  if(window._teams) window._teams=null;
}
function rawPerf(counts){ let s=0; for(const k in counts) s += (EV_MAP[k]?.w||0)*counts[k]; return s; }
function hasLoggedEvents(log){ return Object.values(log||{}).some(v=>v>0); }

/* Untracked fill slots are stored as COUNTS on the game (g.unkA / g.unkB),
   never as roster players — so autofilled games can't pollute the roster,
   can't break replay, and old backups (which lack these fields) still load
   unchanged and replay as fully tracked games. */
function unkCount(g, side){ return Math.max(0, Math.round(Number(side==='A'?g.unkA:g.unkB))||0); }
function gameKind(g){
  if(g.solo) return 'solo';
  if(unkCount(g,'A')+unkCount(g,'B') > 0) return 'partial';
  return 'full';
}
function scoreOnly(g){
  const log=g.log||{};
  return !Object.keys(log).some(pid=>hasLoggedEvents(log[pid]));
}
// Group's typical per-game event output — the conservative comparison point
// used whenever a player's opponents/teammates are unknown.
function peerBaseline(exceptId){
  const peers = players.filter(x=>x.gamesPlayed>=1 && x.id!==exceptId);
  if(!peers.length) return 0;
  return peers.reduce((s,x)=> s + rawPerf(x.lifetime)/Math.max(1,x.gamesPlayed), 0)/peers.length;
}

function recomputeAll(){
  players.forEach(p=>{
    p.rating = p.seedRating; p.gamesPlayed=0; p.trackedGames=0; p.wins=0; p.losses=0;
    p.fullGames=0; p.partialGames=0; p.soloGames=0;
    p.lifetime = zeroEvents(); p.history = [{i:0, r:Math.round(p.seedRating)}];
  });
  const done = games.filter(g=>g.winner || g.solo).slice().sort((a,b)=>a.date-b.date);
  done.forEach(g=>applyGame(g));
  players.forEach(p=>p.rating = clamp(p.rating,0,100));
}

/* Rating policy by how much of the court is tracked (most → least information):
   • FULL (no untracked slots): Elo on team averages + event deltas vs the game
     average. Identical math to before — legacy games replay unchanged.
   • PARTIAL, tracked players on BOTH sides: same math, but the result (Elo)
     component is scaled by ctx = min(trackedA/sizeA, trackedB/sizeB), because
     the team averages only describe the players we can actually see. Events
     stay full strength — they're direct observations of tracked players.
     Partial games are excluded from the prediction record.
   • PARTIAL, only ONE side tracked: opponent strength is unknown, so no Elo at
     all. Win/loss still tallies. Each tracked player's rating moves only from
     their own logged events vs the roster baseline — the same conservative
     model as solo tracking. Score-only games like this record the result and
     move nothing.
   g.ctx / g.winProb / g.predCorrect / g.deltas are derived and rebuilt on
   every replay; they're stored for recap display only. */
function applyGame(g){
  if(g.solo){ applySolo(g); return; }
  const A = g.teamA.map(pById).filter(Boolean);
  const B = g.teamB.map(pById).filter(Boolean);
  g.deltas = {};
  if(!A.length && !B.length) return;
  const uA = unkCount(g,'A'), uB = unkCount(g,'B');
  const bothTracked = A.length>0 && B.length>0;
  const sizeA = A.length + uA, sizeB = B.length + uB;
  const ctx = bothTracked ? Math.min(A.length/sizeA, B.length/sizeB) : 0;
  g.ctx = ctx;

  let expA = null, actA = 0;
  if(bothTracked){
    const avgA = A.reduce((s,p)=>s+p.rating,0)/A.length;
    const avgB = B.reduce((s,p)=>s+p.rating,0)/B.length;
    expA = 1/(1+Math.pow(10,(avgB-avgA)/settings.eloD));
    // margin-aware actual score (capped so blowouts don't over-swing)
    if(g.scoreA+g.scoreB>0){ actA = clamp(g.scoreA/(g.scoreA+g.scoreB), 0.2, 0.8); }
    else actA = g.winner==='A'?1:0;
  }
  g.winProb = expA;                                  // pre-game chance for team A (tracked players only)
  g.predCorrect = (expA==null || ctx<1 || Math.abs(expA-0.5)<0.02) ? null : ((expA>0.5) === (g.winner==='A'));

  // per-game event raw perf, and the game average (self-normalises intensity)
  const all = [...A,...B];
  const perf = {};
  all.forEach(p=>{ perf[p.id] = rawPerf((g.log&&g.log[p.id]) || {}); });
  const anyEvents = Object.values(perf).some(v=>v!==0);
  const avgPerf = anyEvents ? Object.values(perf).reduce((s,v)=>s+v,0)/all.length : 0;
  const kind = gameKind(g);

  function upd(p, isA){
    const before = p.rating;
    const conf = Math.min(1, (p.trackedGames||0)/settings.confGames);
    const vol = 1.3 - conf;                       // new players move faster
    let eloD = 0, evD = 0;
    if(bothTracked){
      const act = isA ? actA : (1-actA);
      const exp = isA ? expA : (1-expA);
      eloD = clamp(settings.eloK*(act-exp)*vol*ctx, -settings.maxElo, settings.maxElo);
      evD  = anyEvents ? clamp((perf[p.id]-avgPerf)*settings.eventK*vol, -settings.maxEvent, settings.maxEvent) : 0;
    } else {
      // one-sided tracking: solo-style — own events vs roster baseline, gently,
      // and never punish a player just because nothing was logged for them.
      evD = hasLoggedEvents(g.log&&g.log[p.id])
        ? clamp((perf[p.id]-peerBaseline(p.id))*settings.eventK*vol*0.7, -settings.maxEvent, settings.maxEvent)
        : 0;
    }
    p.rating = clamp(p.rating + eloD + evD, 0, 100);
    p.gamesPlayed++;
    // Confidence only advances when the game actually informed this player's
    // rating: a both-sides-tracked result (Elo ran for them) OR their own logged
    // events. A player parked on a roster while others are tracked stays "new".
    if(bothTracked || hasLoggedEvents(g.log&&g.log[p.id])) p.trackedGames++;
    if(kind==='partial') p.partialGames++; else p.fullGames++;
    if((isA&&g.winner==='A')||(!isA&&g.winner==='B')) p.wins++; else p.losses++;
    const c = (g.log&&g.log[p.id])||{}; for(const k in c) p.lifetime[k]=(p.lifetime[k]||0)+c[k];
    p.history.push({i:p.gamesPlayed, r:Math.round(p.rating)});
    g.deltas[p.id] = {before:Math.round(before), after:Math.round(p.rating), elo:eloD, ev:evD};
  }
  A.forEach(p=>upd(p,true)); B.forEach(p=>upd(p,false));
}

// Solo (scout) game: one player, unknown opponent. Rating moves only from their
// own production vs the group's typical output, gently. Result is recorded for
// the W/L tally but never run through Elo.
function applySolo(g){
  g.deltas = {}; g.winProb = null; g.predCorrect = null; g.ctx = 0;
  const p = pById(g.teamA[0]); if(!p) return;
  const perf = rawPerf((g.log&&g.log[p.id]) || {});
  const baseline = peerBaseline(p.id);
  const before = p.rating;
  const conf = Math.min(1, (p.trackedGames||0)/settings.confGames);
  const vol = 1.3 - conf;
  // no events logged → no movement (don't punish a quiet scouting entry)
  const evD = hasLoggedEvents(g.log&&g.log[p.id])
    ? clamp((perf-baseline)*settings.eventK*vol*0.7, -settings.maxEvent, settings.maxEvent)
    : 0;
  p.rating = clamp(p.rating + evD, 0, 100);
  p.gamesPlayed++;
  // A bare scouting entry (no events, no opponent) teaches us nothing, so it
  // records the appearance but doesn't build confidence.
  if(hasLoggedEvents(g.log&&g.log[p.id])) p.trackedGames++;
  p.soloGames++;
  if(g.winner==='A') p.wins++; else if(g.winner==='B') p.losses++;
  const c = (g.log&&g.log[p.id])||{}; for(const k in c) p.lifetime[k]=(p.lifetime[k]||0)+c[k];
  p.history.push({i:p.gamesPlayed, r:Math.round(p.rating)});
  g.deltas[p.id] = {before:Math.round(before), after:Math.round(p.rating), elo:0, ev:evD};
}

/* ============================================================
   TEAM BALANCER
   ============================================================ */
function balance(pool, numTeams){
  const sorted = pool.slice().sort((a,b)=>b.rating-a.rating);
  const teams = Array.from({length:numTeams},()=>[]);
  // snake (serpentine) draft -> near-equal team SIZES and rough balance
  let i=0, d=1;
  sorted.forEach(p=>{
    teams[i].push(p);
    i+=d;
    if(i===numTeams){ i=numTeams-1; d=-1; }
    else if(i<0){ i=0; d=1; }
  });
  // size-preserving swaps to minimise the gap between team AVERAGES
  const avg = t => t.length ? t.reduce((s,p)=>s+p.rating,0)/t.length : 0;
  for(let pass=0; pass<80; pass++){
    let best=null, bestGain=0.05;
    for(let a=0;a<numTeams;a++) for(let b=a+1;b<numTeams;b++){
      const sumA=teams[a].reduce((s,p)=>s+p.rating,0), sumB=teams[b].reduce((s,p)=>s+p.rating,0);
      const cur=Math.abs(sumA/teams[a].length - sumB/teams[b].length);
      for(const pa of teams[a]) for(const pb of teams[b]){
        const na=(sumA-pa.rating+pb.rating)/teams[a].length;
        const nb=(sumB-pb.rating+pa.rating)/teams[b].length;
        const gain=cur-Math.abs(na-nb);
        if(gain>bestGain){ bestGain=gain; best={a,b,pa,pb}; }
      }
    }
    if(!best) break;
    teams[best.a]=teams[best.a].filter(p=>p!==best.pa).concat(best.pb);
    teams[best.b]=teams[best.b].filter(p=>p!==best.pb).concat(best.pa);
  }
  spreadRole(teams,'setter');
  spreadRole(teams,'passer');
  spreadRole(teams,'beginner');
  return teams;
}
// Even out how many players with a given role land on each team, swapping with
// the closest-rating player who lacks the role so the rating balance barely moves.
function spreadRole(teams, key){
  const n=teams.length;
  for(let guard=0; guard<50; guard++){
    const counts=teams.map(t=>t.filter(p=>p.roles[key]).length);
    let hi=0, lo=0;
    for(let i=1;i<n;i++){ if(counts[i]>counts[hi]) hi=i; if(counts[i]<counts[lo]) lo=i; }
    if(counts[hi]-counts[lo] <= 1) break;
    const give = teams[hi].filter(p=>p.roles[key]).sort((a,b)=>a.rating-b.rating)[0];
    const take = teams[lo].filter(p=>!p.roles[key]).sort((a,b)=>Math.abs(a.rating-give.rating)-Math.abs(b.rating-give.rating))[0];
    if(!give || !take) break;
    teams[hi]=teams[hi].filter(p=>p!==give).concat(take);
    teams[lo]=teams[lo].filter(p=>p!==take).concat(give);
  }
}

  const mn=Math.min(...rs), mx=Math.max(...rs); const rng=(mx-mn)||1;

}

function isToday(ts){ const d=new Date(ts), n=new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate(); }
function ago(ts){
  const days=Math.floor((Date.now()-ts)/86400000);
  if(days<=0) return 'earlier today';
  if(days===1) return 'yesterday';
  if(days<30) return days+' days ago';
  const mo=Math.floor(days/30); return mo===1?'a month ago':mo+' months ago';
}
