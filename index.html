      <button class="action-tile pressable" onclick="setTab('track')"><span class="tile-icon">${icons.bolt}</span><span><b>Track game</b><br><span>Live score + events</span></span></button>
      <button class="action-tile pressable t-cyan" onclick="setTab('teams')"><span class="tile-icon">${icons.teams}</span><span><b>Build teams</b><br><span>Balanced by rating</span></span></button>
      <button class="action-tile pressable t-mint" onclick="openPlayer()"><span class="tile-icon">${icons.plus}</span><span><b>Add player</b><br><span>Seed a starting level</span></span></button>
      <button class="action-tile pressable t-coral" onclick="scoutQuick()"><span class="tile-icon">${icons.scout}</span><span><b>Scout player</b><br><span>Solo, unknown opponent</span></span></button>
    </div>

    <div class="section-head"><h3>Up next</h3></div>
    <div class="card">
      <div class="row spread" style="align-items:flex-start">
        <div style="min-width:0;flex:1">
          <div style="font-weight:750;font-size:15px">${sug.t}</div>
          <div class="small soft" style="margin-top:4px;line-height:1.45">${sug.c}</div>
        </div>
      </div>
      <button class="btn primary block" style="margin-top:12px" onclick="${sug.a}">${sug.b}</button>
    </div>`;

  const liveEv = evts.filter(e=>!e.done).sort((a,b)=>b.created-a.created)[0];
  if(liveEv){
    const st=eventStandings(liveEv), n=evGameCount(liveEv);
    html += `<button class="ev-row pressable" onclick="openEvent('${liveEv.id}')">
      <div class="row spread"><span class="small"><b style="color:var(--gold)">Event live</b> · ${esc(liveEv.name)}</span><span class="tiny faint">›</span></div>
      <div class="tiny faint" style="margin-top:4px">${(liveEv.teams||[]).length} teams · ${n} game${n===1?'':'s'}${(st.length&&n)?` · ${esc(st[0].t.name)} leads ${st[0].mw}-${st[0].ml}`:''}</div>
    </button>`;
  }

  if(roster.length){
    html += `
    <div class="grid two">
      <div>
        <div class="section-head"><h3>Rating confidence</h3><span>${settings.confGames} informative games = established</span></div>
        <div class="card">
          <div class="meter"><i style="width:${Math.round(confAvg*100)}%"></i></div>
          <div class="row spread" style="margin-top:11px">
            <span class="small muted">${est} established</span>
            <span class="small" style="color:var(--gold)">${settling} settling</span>
            <span class="small faint">${fresh} new</span>
          </div>
          <div class="tiny faint" style="margin-top:8px">Confidence grows only from games that actually inform a player \u2014 both sides tracked, or their own logged events.</div>
        </div>
      </div>
      <div>`;
    if(!settings.hideRatings){
      const movers = roster.filter(p=>p.gamesPlayed>=3)
        .map(p=>({p, d:recentDelta(p)})).filter(x=>Math.abs(x.d)>=2)
        .sort((a,b)=>Math.abs(b.d)-Math.abs(a.d)).slice(0,4);
      html += `<div class="section-head"><h3>Recent movers</h3><span>last 5 games each</span></div><div class="card">`;
      if(movers.length){
        html += movers.map(({p,d})=>`
          <div class="mover">
            <div class="avatar sm">${initials(p.name)}</div>
            <div class="who"><b>${esc(p.name)}</b><span>${esc(volleyballLevelOf(p.rating).label)} · ${p.wins}-${p.losses}</span></div>
            <span class="num ${d>0?'delta-up':'delta-down'}">${d>0?'▲ +':'▼ '}${Math.abs(d)}</span>
          </div>`).join('');
      } else {
        html += `<div class="small soft" style="padding:6px 2px">No big movers over the last few games \u2014 ratings are holding steady.</div>`;
      }
      html += `</div>`;
    } else {
      html += `<div class="section-head"><h3>Stealth mode</h3></div>
        <div class="card"><div class="small soft">Ratings are hidden. Court still updates them behind the scenes \u2014 flip them back on in More.</div></div>`;
    }
    html += `</div></div>`;
  }

  if(games.length){
    const recent = games.slice().sort((a,b)=>b.date-a.date).slice(0,3);
    html += `<div class="section-head"><h3>Recent games</h3><button class="btn sm ghost" onclick="setTab('games')">All history</button></div>`;
    html += recent.map(g=>historyRow(g)).join('');
  }

  main.innerHTML = html;
}

/* ---------- PLAYERS ---------- */
function renderPlayers(){
  const roster = players.filter(p=>!isArchived(p));
  const sorted = sortPlayers(roster);
  let html = screenHead('Roster', roster.length?`${roster.length} player${roster.length===1?'':'s'}`:'Build your roster');
  html += `<div class="row" style="gap:8px">
    <button class="btn primary" style="flex:1" onclick="openPlayer()">${icons.plus} Add player</button>
    ${roster.length?`<button class="btn ghost" onclick="togglePlayerSort()">${settings.playerSort==='rating'?'Sort: rating':'Sort: A–Z'}</button>`:''}
  </div>`;
  if(!roster.length){
    html += `<div class="empty"><b>No players yet</b>Add everyone in your group, then track games or build balanced teams. Seed each person with a rough level \u2014 the ratings self-correct as they play.</div>`;
  } else {
    if(!settings.hideRatings){
      const movers = roster.filter(p=>p.gamesPlayed>=3).map(p=>({p,d:recentDelta(p)})).filter(x=>x.d>=2).sort((a,b)=>b.d-a.d);
      if(movers.length){
        html += `<div class="card" style="margin-top:12px;border-color:#5fe3ae33">
          <div class="small" style="font-weight:800;color:var(--mint)">▲ Most improved</div>
          ${movers.slice(0,3).map(m=>`<div class="row spread" style="margin-top:7px"><span class="small">${esc(m.p.name)}</span><span class="num small" style="color:var(--mint);font-weight:800">+${m.d} over last 5</span></div>`).join('')}
        </div>`;
      }
    }
    html += `<div class="player-list">${sorted.map(playerCard).join('')}</div>`;
  }
  main.innerHTML = html;
}
function playerCard(p){
  const rel = reliability(p);
  const rd = recentDelta(p);
  const level = volleyballLevelOf(p.rating).label;
  const roles = ROLE_DEFS.filter(([k])=>p.roles[k]).map(([k,l])=>`<span class="pill">${l}</span>`).join('');
  const levelPart = settings.hideRatings ? '' : `${esc(level)} · `;
  const sub = p.gamesPlayed
    ? `${levelPart}${p.wins}-${p.losses} · <span style="color:${rel.c}">${rel.k}</span>`
    : `${levelPart}<span style="color:${rel.c}">new</span>`;
  const arrow = (p.gamesPlayed>=2 && Math.abs(rd)>=1 && !settings.hideRatings)
    ? `<span class="delta ${rd>0?'up':'down'} num">${rd>0?'▲':'▼'}${Math.abs(rd)}</span>` : '';
  return `<button class="player-card pressable ${p.active?'':'inactive'}" onclick="openPlayer('${p.id}')">
    <span class="player-top">
      <span class="avatar">${initials(p.name)}${p.active?'':'<i class="off-dot"></i>'}</span>
      <span class="player-meta">
        <b>${esc(p.name)}</b>
        <span class="player-sub">${sub}${p.active?'':' · away'}</span>
        ${roles?`<span class="tags">${roles}</span>`:''}
      </span>
      <span class="rating-badge"><b class="num">${showRate(p.rating)}</b>${arrow}${settings.hideRatings?'':sparkline(p.history)}</span>
    </span>
    ${settings.hideRatings?'':`<span class="bar"><i style="width:${clamp(p.rating,0,100)}%"></i></span>`}
  </button>`;
}

/* ---------- TRACK ---------- */
function trackCard(p){
  const v = Math.round(rawPerf(live.log[p.id]||{})*10)/10;
  const cls = v>0?'good':(v<0?'bad':'');
  const exp = live.expanded[p.id];
  const vis = e=>{
    if(e.detail && !settings.detailed) return false;
    if(exp) return true;
    return settings.detailed ? (e.common||e.grade) : e.common;
  };
  const grouped = settings.detailed || exp;
  const btn = k=>{ const e=EV_MAP[k]; const c=(live.log[p.id]||{})[k]||0;
    return `<button class="${e.c}" onclick="logEv('${p.id}','${k}')">${e.l}${c?`<span class="cnt">${c}</span>`:''}</button>`; };
  let evHtml;
  if(grouped){
    evHtml = EVENT_GROUPS.map(grp=>{
      const ks = grp.keys.filter(k=>vis(EV_MAP[k]));
      if(!ks.length) return '';
      return `<div class="evrow"><span class="evlbl">${grp.g}</span><div class="ev">${ks.map(btn).join('')}</div></div>`;
    }).join('');
  } else {
    evHtml = `<div class="ev">${EVENTS.filter(vis).map(e=>btn(e.k)).join('')}</div>`;
  }
  const meta = `${settings.hideRatings?'':esc(volleyballLevelOf(p.rating).label)}${p.gamesPlayed?`${settings.hideRatings?'':' · '}${p.wins}-${p.losses}`:''}`;
  return `<div class="tcard">
    <div class="thead">
      <div class="avatar sm">${initials(p.name)}</div>
      <div class="tname"><b>${esc(p.name)}</b>${meta?`<span>${meta}</span>`:''}</div>
      <div class="perf ${cls} num">${v>0?'+':''}${v}</div>
    </div>
    ${live.quick?'':evHtml+`<button class="expand" onclick="toggleExpand('${p.id}')">${exp?'− fewer':'+ more events'}</button>`}
  </div>`;
}

function renderTrack(){
  if(!live){ renderTrackSetup(); return; }
  if(live.solo){
    const p = pById(live.player);
    main.innerHTML = `
      ${screenHead('Scout / Solo', p?esc(p.name):'Solo tracking', `Unknown opponent \u2014 only ${p?esc(p.name):'this player'}\u2019s own logged events move their rating.`)}
      <div class="strip">
        <button class="btn sm ghost" onclick="undoEv()" ${live.undo.length?'':'disabled'}>↶ Undo</button>
        <button class="btn sm ghost" style="margin-left:auto" onclick="cancelGame()">Discard</button>
      </div>
      ${p?trackCard(p):'<div class="empty">Player not found.</div>'}
      <div class="card">
        <div class="small muted" style="margin-bottom:9px;font-weight:700">Result (optional)</div>
        <div class="seg">
          <button class="${live.result==='W'?'on':''}" onclick="setSoloResult('W')">Won</button>
          <button class="${live.result==='L'?'on':''}" onclick="setSoloResult('L')">Lost</button>
          <button class="${live.result==null?'on':''}" onclick="setSoloResult(null)">No result</button>
        </div>
      </div>
      <button class="btn primary block" style="margin-top:4px" onclick="finishSolo()">Save & update rating</button>
      <p class="tiny faint" style="text-align:center;margin-top:11px">Won/Lost goes on their record but doesn\u2019t move the rating, since the opponent is unknown.</p>
    `;
    return;
  }
  const A = (live.teamA||[]).map(pById).filter(Boolean);
  const B = (live.teamB||[]).map(pById).filter(Boolean);
  main.innerHTML = `
    ${screenHead('Live', 'Track this game')}
    <div class="score-card">
      <div class="score-grid">
        <div class="score-box A">
          <div class="score-lbl">Team A${live.unkA?` <span class="unktag">+${live.unkA}</span>`:''}</div>
          <div class="score-num num">${live.scoreA}</div>
          <div class="score-steps"><button onclick="score('A',-1)" aria-label="Team A minus one">−</button><button onclick="score('A',1)" aria-label="Team A plus one">+</button></div>
        </div>
        <div class="score-box B">
          <div class="score-lbl">Team B${live.unkB?` <span class="unktag">+${live.unkB}</span>`:''}</div>
          <div class="score-num num">${live.scoreB}</div>
          <div class="score-steps"><button onclick="score('B',-1)" aria-label="Team B minus one">−</button><button onclick="score('B',1)" aria-label="Team B plus one">+</button></div>
        </div>
      </div>
      ${(!settings.hideRatings && live.winProb!=null)?`<div class="prob-line">Pre-game: <span style="color:var(--teamA)">A ${Math.round(live.winProb*100)}%</span> · <span style="color:var(--teamB)">B ${Math.round((1-live.winProb)*100)}%</span>${(live.unkA||live.unkB)?' · tracked players only':''}</div>`:''}
      ${((live.unkA||live.unkB)&&live.winProb==null)?`<div class="prob-line">One side is untracked \u2014 result counts for the record; ratings move on logged events.</div>`:''}
    </div>
    <div class="strip">
      <button class="btn sm ghost" onclick="undoEv()" ${live.undo.length?'':'disabled'}>↶ Undo</button>
      <button class="btn sm ghost" onclick="toggleQuick()" style="${live.quick?'color:var(--gold);border-color:#f2c66d4a':''}">${live.quick?'Score only: on':'Score only: off'}</button>
      <button class="btn sm ghost" style="margin-left:auto" onclick="cancelGame()">Discard</button>
    </div>
    ${live.quick?`<div class="unkline">Score-only mode \u2014 event buttons are tucked away. The final score still moves ratings; flip it off any time to log events.</div>`:''}
    <div class="teamhdr A">Team A${live.unkA?` <span class="unktag">· +${live.unkA} untracked</span>`:''}</div>
    ${A.map(trackCard).join('')}
    ${(!A.length&&live.unkA)?`<div class="unkline">Fully untracked side \u2014 nothing to log here.</div>`:''}
    <div class="teamhdr B">Team B${live.unkB?` <span class="unktag">· +${live.unkB} untracked</span>`:''}</div>
    ${B.map(trackCard).join('')}
    ${(!B.length&&live.unkB)?`<div class="unkline">Fully untracked side \u2014 nothing to log here.</div>`:''}
    <button class="btn primary block" style="margin-top:13px" onclick="finishGame()">Save game & update ratings</button>
    <p class="tiny faint" style="text-align:center;margin-top:11px">Score decides the win; events fine-tune who carried it. Both are valid ways to track.</p>
  `;
}

function renderTrackSetup(){
  const act = sortPlayers(players.filter(p=>p.active&&!isArchived(p)));
  const activeIds = new Set(act.map(p=>p.id));
  if(window._sel){
    window._sel.A = new Set([...window._sel.A].filter(id=>activeIds.has(id)));
    window._sel.B = new Set([...window._sel.B].filter(id=>activeIds.has(id)));
  }
  if(act.length<1){
    main.innerHTML = `${screenHead('Track','Track a game')}
      <div class="empty"><b>Add players first</b>Add at least one player to your roster to start tracking.</div>
      <button class="btn primary block" onclick="openPlayer()">${icons.plus} Add player</button>`;
    return;
  }
  if(!window._trackMode) window._trackMode='match';
  const mode = window._trackMode;
  const modeRow = `<div class="mode-row">
    <button class="mode-btn pressable ${mode==='match'?'active':''}" onclick="setTrackMode('match')">
      <span class="mode-icon">${icons.track}</span>
      <span class="mode-copy"><b>Match</b><span>Full court or just the players you can see \u2014 open slots autofill as untracked.</span></span>
    </button>
    <button class="mode-btn pressable ${mode==='solo'?'active':''}" onclick="setTrackMode('solo')">
      <span class="mode-icon">${icons.scout}</span>
      <span class="mode-copy"><b>Scout / Solo</b><span>Watch one player anywhere. Unknown opponent, events only.</span></span>
    </button>
  </div>`;
  if(mode==='solo'){
    if(!window._soloPick || !activeIds.has(window._soloPick)) window._soloPick=null;
    const pick = window._soloPick;
    const schip = p=>`<button class="chip ${pick===p.id?'on':''}" style="${pick===p.id?'border-color:#f2c66d66;color:var(--gold);background:#f2c66d16':''}" onclick="pickSolo('${p.id}')">${esc(p.name)} <span class="r num">${showRate(p.rating)}</span></button>`;
    main.innerHTML = `
      ${screenHead('Track','Scout one player')}
      ${modeRow}
      <div class="card">
        <div class="small muted" style="margin-bottom:10px">Watching one player somewhere else? Pick them and track just their game. The opponent stays unknown, so only their own stats nudge the rating.</div>
        <div class="chips">${act.map(schip).join('')}</div>
      </div>
      <button class="btn primary block" onclick="startSolo()" ${pick?'':'disabled'}>Start solo tracking</button>
    `;
    return;
  }
  if(!window._sel) window._sel = {A:new Set(), B:new Set()};
  const sel = window._sel;
  if(window._fmt===undefined) window._fmt=null;
  if(window._fmt!=null) window._fmt=positiveInt(window._fmt,null);
  const fmt = window._fmt;
  const fmtPresets = [2,3,4,6];
  const customFmt = fmt && !fmtPresets.includes(fmt) ? fmt : '';
  const unkA = fmt ? Math.max(0, fmt - sel.A.size) : 0;
  const unkB = fmt ? Math.max(0, fmt - sel.B.size) : 0;
  const partial = (unkA+unkB)>0;
  const canStart = fmt ? (sel.A.size+sel.B.size)>=1 : (sel.A.size>0 && sel.B.size>0);
  function chip(p){
    const inA=sel.A.has(p.id), inB=sel.B.has(p.id);
    const state = inA?'A':inB?'B':'';
    const bg = inA?'var(--teamA)':inB?'var(--teamB)':'';
    return `<button class="chip ${state?'on':''}" style="${state?`border-color:${bg};color:${bg};background:${inA?'#6db4ff1c':'#ffb36e1c'}`:''}"
      onclick="cycleSel('${p.id}')">${esc(p.name)} <span class="r num">${showRate(p.rating)}</span>${state?` · ${state}`:''}</button>`;
  }
  const sideLine = (label, n, u, set) =>
    `<span>${label}: <b>${n}</b>${u?` <span class="faint">+${u} untracked</span>`:''}${n?` · avg ${avgSel(set)}`:''}</span>`;
  let evBanner='';
  if(window._evtPending){
    const pev=evById(window._evtPending.evId);
    if(!pev){ window._evtPending=null; }
    else {
      const tA=evTeamById(pev,window._evtPending.evA), tB=evTeamById(pev,window._evtPending.evB);
      evBanner = `<div class="card" style="border-color:#f2c66d55">
        <div class="row spread"><span class="small" style="min-width:0"><b style="color:var(--gold)">${esc(pev.name)}</b> · ${esc(tA?.name||'?')} vs ${esc(tB?.name||'?')}${window._evtPending.label?` · ${esc(window._evtPending.label)}`:''}</span>
          <button class="btn sm ghost" onclick="window._evtPending=null;render()">detach</button></div>
        <div class="tiny faint" style="margin-top:4px">This game will count toward the event standings.</div>
        <button class="btn sm ghost block" style="margin-top:9px" onclick="backToEvent()">‹ Back to event · nothing saved</button>
      </div>`;
    }
  }
  main.innerHTML = `
    ${screenHead('Track','Track a game')}
    ${modeRow}
    ${evBanner}
    <div class="card">
      <div class="small muted" style="margin-bottom:10px">Tap a player once for <b style="color:var(--teamA)">Team A</b>, twice for <b style="color:var(--teamB)">Team B</b>, again to clear.</div>
      <div class="chips">${act.map(chip).join('')}</div>
    </div>
    <div class="card">
      <div class="row spread" style="margin-bottom:9px">
        <span class="small muted" style="font-weight:700">Players per side</span>
        <span class="tiny faint">${fmt?'open slots fill as untracked':'exactly who you tapped'}</span>
      </div>
      <div class="seg">
        ${fmtPresets.map(n=>`<button class="${fmt===n?'on':''}" onclick="setFmt(${n})">${n}s</button>`).join('')}
        <button class="${!fmt?'on':''}" onclick="setFmt(null)">Any</button>
      </div>
      <div class="custom-num">
        <div><label for="fmtCustom">Custom</label><input id="fmtCustom" type="number" inputmode="numeric" min="1" placeholder="5" value="${esc(customFmt?String(customFmt):'')}" onkeydown="if(event.key==='Enter')setFmtCustom()"></div>
        <button class="btn sm ghost" onclick="setFmtCustom()">Use</button>
      </div>
    </div>
    <div class="row small muted spread" style="padding:0 4px 10px">
      ${sideLine('A', sel.A.size, unkA, sel.A)}
      ${sideLine('B', sel.B.size, unkB, sel.B)}
    </div>
    ${(partial&&canStart)?`<div class="unkline">Open slots are filled by untracked players \u2014 they get no stat buttons and never join your roster. With part of the court untracked, the result moves ratings less; logged events do most of the work.</div>`:''}
    ${(sel.A.size&&sel.B.size&&!settings.hideRatings)?(()=>{const wp=winProbability([...sel.A],[...sel.B]);return `<div class="card" style="text-align:center"><span class="small muted">Win chance${partial?' <span class="tiny faint">· tracked players only</span>':''}</span><div class="num" style="font-weight:850;margin-top:5px;font-size:18px"><span style="color:var(--teamA)">A ${Math.round(wp*100)}%</span> &nbsp; <span class="faint" style="font-weight:600">vs</span> &nbsp; <span style="color:var(--teamB)">B ${Math.round((1-wp)*100)}%</span></div></div>`;})():''}
    <button class="btn primary block" onclick="startGame()" ${canStart?'':'disabled'}>Start tracking</button>
    <button class="btn block" style="margin-top:8px" onclick="openQuickResult()" ${canStart?'':'disabled'}>Log final score only</button>
  `;
}
window.setFmt=(n)=>{ window._fmt=n==null ? null : positiveInt(n, window._fmt||2); renderTrack(); };
window.setFmtCustom=()=>{
  const n=positiveInt($('#fmtCustom')?.value, null);
  if(!n){ toast('Enter a players-per-side value above 0'); return; }
  window._fmt=n; renderTrack();
};
window.setTrackMode=(m)=>{ window._trackMode=m; renderTrack(); };
window.pickSolo=(id)=>{ window._soloPick = (window._soloPick===id)?null:id; renderTrack(); };
window.startSolo=()=>{
  if(!window._soloPick || !players.some(p=>p.id===window._soloPick&&p.active&&!isArchived(p))) return;
  live = { solo:true, player:window._soloPick, log:{}, undo:[], expanded:{}, result:null };
  render();
};
window.setSoloResult=(r)=>{ live.result=r; renderTrack(); };
window.finishSolo=async()=>{
  const winner = live.result==='W'?'A':live.result==='L'?'B':null;
  const gid=uid();
  games.push({ id:gid, date:Date.now(), solo:true, teamA:[live.player], teamB:[], scoreA:0, scoreB:0, winner, log:live.log });
  await commit();
  live=null;
  showRecap(gid);
};
function avgSel(set){
  if(!set.size) return '–';
  let s=0,n=0; set.forEach(id=>{ const p=pById(id); if(p&&p.active&&!isArchived(p)){ s+=p.rating; n++; } });
  return n?showRate(s/n):'–';
}
window.cycleSel=(id)=>{
  const s=window._sel;
  if(s.A.has(id)){ s.A.delete(id); s.B.add(id); }
  else if(s.B.has(id)){ s.B.delete(id); }
  else s.A.add(id);
  renderTrack();
};
function setupSlots(){
  const s=window._sel, fmt=positiveInt(window._fmt,null);
  window._fmt=fmt;
  const unkA = fmt ? Math.max(0, fmt - s.A.size) : 0;
  const unkB = fmt ? Math.max(0, fmt - s.B.size) : 0;
  const ok = fmt ? (s.A.size+s.B.size)>=1 : (s.A.size>0 && s.B.size>0);
  return { s, fmt, unkA, unkB, ok };
}
window.startGame=()=>{
  const {s,fmt,unkA,unkB,ok}=setupSlots(); if(!ok) return;
  live = { teamA:[...s.A], teamB:[...s.B], unkA, unkB, fmt, scoreA:0, scoreB:0,
    log:{}, undo:[], expanded:{}, quick:false,
    winProb: (s.A.size&&s.B.size) ? winProbability([...s.A],[...s.B]) : null };
  if(window._evtPending){ live.evt=window._evtPending; window._evtPending=null; }
  render();
};
// Quick result: save a final score for the selected teams with no live tracking.
window.openQuickResult=()=>{
  const {s,unkA,unkB,ok}=setupSlots(); if(!ok) return;
  const oneSided = !(s.A.size&&s.B.size);
  openSheet(`<h3>Log final score</h3>
    <p class="small muted" style="margin:-8px 0 14px">Saves the result for the selected teams without live tracking. No events are logged, so ${oneSided?'with one side fully untracked this just records the win or loss — ratings don\'t move.':'ratings move on the result alone'+((unkA+unkB)?', scaled down for the untracked slots.':'.')}</p>
    <div class="row" style="gap:10px;margin-bottom:14px">
      <div style="flex:1"><label class="small" style="color:var(--teamA);font-weight:700;display:block;margin-bottom:6px">Team A${unkA?` <span class="faint" style="font-weight:500">+${unkA}</span>`:''}</label>
        <input id="qsA" type="number" inputmode="numeric" min="0" placeholder="0"></div>
      <div style="flex:1"><label class="small" style="color:var(--teamB);font-weight:700;display:block;margin-bottom:6px">Team B${unkB?` <span class="faint" style="font-weight:500">+${unkB}</span>`:''}</label>
        <input id="qsB" type="number" inputmode="numeric" min="0" placeholder="0"></div>
    </div>
    <button class="btn primary block" onclick="saveQuickResult()">Save result</button>
    ${sheetCloseBtn()}`);
};
window.saveQuickResult=async()=>{
  const {s,fmt,unkA,unkB,ok}=setupSlots(); if(!ok) return;
  const a=Math.max(0, Math.round(Number($('#qsA').value)||0));
  const b=Math.max(0, Math.round(Number($('#qsB').value)||0));
  if(a===b){
    if(!(await askConfirm('Scores are tied, so no winner is recorded and the result won\'t change ratings. Save anyway?','Save anyway',false))) return;
  }
  const gid=uid();
  games.push({ id:gid, date:Date.now(), teamA:[...s.A], teamB:[...s.B],
    unkA, unkB, fmt, scoreA:a, scoreB:b, winner:a>b?'A':(b>a?'B':null), log:{},
    ...(window._evtPending||{}) });
  window._evtPending=null;
  await commit();
  window._sel={A:new Set(),B:new Set()};
  closeSheet();
  showRecap(gid);
};
window.score=(t,d)=>{ live['score'+t]=Math.max(0, live['score'+t]+d); renderTrack(); };
window.logEv=(pid,k)=>{
  if(!live.log[pid]) live.log[pid]={};
  live.log[pid][k]=(live.log[pid][k]||0)+1;
  live.undo.push([pid,k]);
  if(navigator.vibrate) navigator.vibrate(8);
  renderTrack();
};
window.undoEv=()=>{
  const last=live.undo.pop(); if(!last) return;
  const [pid,k]=last; live.log[pid][k]--; if(live.log[pid][k]<=0) delete live.log[pid][k];
  renderTrack();
};
window.toggleExpand=(pid)=>{ live.expanded[pid]=!live.expanded[pid]; renderTrack(); };
window.toggleQuick=()=>{ live.quick=!live.quick; renderTrack(); };
window.cancelGame=async()=>{ if(await askConfirm('Discard this game without saving?','Discard')){ if(live&&live.evt) window._evtPending=live.evt; live=null; render(); } };
window.finishGame=async()=>{
  if(live.scoreA===live.scoreB){
    if(!(await askConfirm('Scores are tied, so no winner is recorded and the result won\'t change ratings. Save anyway?','Save anyway',false))){return;}
  }
  const winner = live.scoreA>live.scoreB?'A':(live.scoreB>live.scoreA?'B':null);
  const gid=uid();
  games.push({ id:gid, date:Date.now(), teamA:live.teamA, teamB:live.teamB,
    unkA:live.unkA||0, unkB:live.unkB||0, fmt:live.fmt||null,
    scoreA:live.scoreA, scoreB:live.scoreB, winner, log:live.log, ...(live.evt||{}) });
  await commit();
  live=null; window._sel={A:new Set(),B:new Set()};
  showRecap(gid);
};
function showRecap(gid){
  const g=games.find(x=>x.id===gid);
  if(!g){ tab='players'; render(); return; }
  if(g.solo){
    const p=pById(g.teamA[0]); const d=g.deltas&&g.deltas[g.teamA[0]];
    const net=d?d.after-d.before:0; const col=net>0?'var(--good)':net<0?'var(--bad)':'var(--faint)';
    openSheet(`<h3>Solo · ${esc(p?p.name:'player')}</h3>
      ${g.winner?`<p class="small muted" style="margin:-8px 0 12px">Recorded as a ${g.winner==='A'?'win':'loss'} (rating not affected by the result).</p>`:`<p class="small muted" style="margin:-8px 0 12px">No result recorded.</p>`}
      <div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border)">
        <span class="small">${esc(p?p.name:'player')}</span>
        <span class="num small">${d?`<span class="faint">${d.before} → ${d.after}</span> &nbsp; <b style="color:${col}">${net>0?'+':''}${net}</b>`:'—'}</span>
      </div>
      <div class="tiny faint" style="margin-top:10px">From events: ${formatLog(g.log[g.teamA[0]])||'none logged'}</div>
      <button class="btn primary block" style="margin-top:12px" onclick="closeRecap()">Done</button>`);
    return;
  }
  const wlabel = g.winner==='A'?'Team A':g.winner==='B'?'Team B':'Nobody';
  let probLine='';
  if(g.winProb!=null && !settings.hideRatings && g.winner){
    const favProb=Math.round((g.winner==='A'?g.winProb:1-g.winProb)*100);
    const tail = g.predCorrect===false?' — upset!':g.predCorrect?' — called it.':'';
    probLine=`Court gave ${wlabel} a ${favProb}% chance${gameKind(g)==='partial'?' (tracked players only)':''}${tail}`;
  }
  const uA=unkCount(g,'A'), uB=unkCount(g,'B');
  let ctxLine='';
  if(g.winner && gameKind(g)==='partial'){
    ctxLine = g.winProb==null
      ? 'Partial tracking — the other side was untracked, so the result counts for the record and ratings moved on each player\'s own logged events.'
      : `Partial tracking — ${uA+uB} untracked slot${uA+uB===1?'':'s'}, so the result's rating impact was scaled to ${Math.round((g.ctx||0)*100)}%.`;
  }
  const rows=(ids)=>ids.map(id=>{ const p=pById(id); const d=g.deltas&&g.deltas[id]; if(!p||!d) return '';
    const net=d.after-d.before; const col=net>0?'var(--good)':net<0?'var(--bad)':'var(--faint)';
    return `<div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border)">
      <span class="small">${esc(p.name)}</span>
      <span class="num small"><span class="faint">${d.before} → ${d.after}</span> &nbsp; <b style="color:${col}">${net>0?'+':''}${net}</b></span>
    </div>`;}).join('');
  openSheet(`<h3>${g.winner?`${wlabel} won ${g.scoreA}–${g.scoreB}`:`Tie · ${g.scoreA}–${g.scoreB}`}</h3>
    ${g.winner?'':`<p class="small muted" style="margin:-8px 0 14px">Saved for reference — tied games don't change ratings, records, or games played.</p>`}
    ${probLine?`<p class="small muted" style="margin:-8px 0 14px">${probLine}</p>`:''}
    ${ctxLine?`<p class="small muted" style="margin:${probLine?'-6px':'-8px'} 0 14px">${ctxLine}</p>`:''}
    <div class="teamhdr A" style="margin-top:0">Team A${uA?` <span class="unktag">· +${uA} untracked</span>`:''}</div>${rows(g.teamA)}
    <div class="teamhdr B">Team B${uB?` <span class="unktag">· +${uB} untracked</span>`:''}</div>${rows(g.teamB)}
    ${scoreOnly(g)?`<p class="tiny faint" style="margin-top:12px">Score only — no events were logged for this game.</p>`:''}
    <p class="tiny faint" style="margin-top:${scoreOnly(g)?'6px':'12px'}">Open a player to see the full breakdown of why their number moved.</p>
    <button class="btn primary block" style="margin-top:8px" onclick="closeRecap()">Done</button>`);
}
window.closeRecap=()=>{ closeSheet(); tab='players'; render(); };

/* ---------- TEAMS ---------- */
function renderTeams(){
  const act = sortPlayers(players.filter(p=>p.active&&!isArchived(p)));
  const activeIds = new Set(act.map(p=>p.id));
  settings.numTeams = positiveInt(settings.numTeams, DEFAULT_SETTINGS.numTeams);
  if(!window._pool) window._pool = new Set(activeIds);
  else window._pool = new Set([...window._pool].filter(id=>activeIds.has(id)));
  const pool = window._pool;
  const teamPresets = [2,3,4,5,6];
  const customTeams = !teamPresets.includes(settings.numTeams) ? settings.numTeams : '';
  const canGenerate = pool.size>=settings.numTeams;
  function chip(p){
    const on = pool.has(p.id);
    return `<button class="chip ${on?'on':''}" onclick="togglePool('${p.id}')">${esc(p.name)} <span class="r num">${showRate(p.rating)}</span></button>`;
  }
  let html = `${screenHead('Teams','Make even teams','Balanced by rating, then sanity-checked for setters, passers, and beginners. Running fixed teams instead? Use the Events tab.')}`;
  if(!act.length){
    html += `<div class="empty"><b>No active players</b>Add players or mark some as active to build teams.</div>
      <button class="btn primary block" onclick="openPlayer()">${icons.plus} Add player</button>`;
    main.innerHTML = html; return;
  }
  html += `
    <div class="card">
      <div class="row spread" style="margin-bottom:9px">
        <span class="small muted" style="font-weight:700">Who\u2019s here today? (${pool.size} selected)</span>
        <button class="btn sm ghost" onclick="poolAll()">${act.length&&act.every(p=>pool.has(p.id))?'None':'All'}</button>
      </div>
      <div class="chips">${act.map(chip).join('')}</div>
    </div>
    <div class="card">
      <div class="small muted" style="font-weight:700;margin-bottom:9px">Number of teams</div>
      <div class="seg">
        ${teamPresets.map(n=>`<button class="${settings.numTeams===n?'on':''}" onclick="setTeams(${n})">${n}</button>`).join('')}
      </div>
      <div class="custom-num">
        <div><label for="teamCustom">Custom</label><input id="teamCustom" type="number" inputmode="numeric" min="1" placeholder="7" value="${esc(customTeams?String(customTeams):'')}" onkeydown="if(event.key==='Enter')setTeamsCustom()"></div>
        <button class="btn sm ghost" onclick="setTeamsCustom()">Use</button>
      </div>
      ${pool.size<settings.numTeams?`<div class="tiny" style="color:var(--gold);margin-top:7px">Pick at least ${settings.numTeams} players to make ${settings.numTeams} non-empty teams.</div>`:''}
    </div>
    <button class="btn primary block" onclick="genTeams()" ${canGenerate?'':'disabled'}>${icons.bolt} Generate balanced teams</button>`;

  if(window._teams){
    html += `<div class="section-head"><h3>Balanced teams</h3><span>tap Move to shift a player</span></div><div class="team-results">`;
    window._teams.forEach((t,i)=>{
      const tot = t.reduce((s,p)=>s+p.rating,0);
      const avg = t.length ? tot/t.length : 0;
      const hasSetter = t.some(p=>p.roles.setter);
      const hasPasser = t.some(p=>p.roles.passer);
      const warnings = [];
      if(!hasSetter) warnings.push(`<span class="pill bad">No setter</span>`);
      if(!hasPasser && t.length>2) warnings.push(`<span class="pill warn">No strong passer tagged</span>`);
      if(t.filter(p=>p.roles.beginner).length>1) warnings.push(`<span class="pill warn">Beginner-heavy</span>`);
      html += `<div class="team-card">
        <div class="team-head">
          <div class="team-title"><b>Team ${teamLabel(i)}</b><span>${t.length} player${t.length===1?'':'s'} · total ${settings.hideRatings?'••':Math.round(tot)}</span></div>
          <div class="team-avg num">${showRate(avg)}<span>avg rating</span></div>
        </div>
        ${t.slice().sort((a,b)=>b.rating-a.rating).map(p=>`<div class="member">
          <span class="nm">${esc(p.name)}</span>
          ${ROLE_DEFS.filter(([k])=>p.roles[k]).slice(0,2).map(([k,l])=>`<span class="pill">${l}</span>`).join('')}
          <span class="mrate num">${showRate(p.rating)}</span>
          <button class="mv" onclick="movePlayer('${p.id}',${i})">Move ▸</button>
        </div>`).join('')}
        <div class="warning-row">${warnings.length?warnings.join(''):'<span class="pill good">Roles covered</span>'}</div>
      </div>`;
    });
    html += `</div>`;
    const avgs = window._teams.map(t=> t.length ? t.reduce((s,p)=>s+p.rating,0)/t.length : 0);
    const spread = Math.round(Math.max(...avgs)-Math.min(...avgs));
    if(window._teams.length===2 && !settings.hideRatings){
      const wp = winProbability(window._teams[0].map(p=>p.id), window._teams[1].map(p=>p.id));
      html += `<div class="card row spread" style="margin-top:11px"><span class="small muted">Predicted win chance</span>
        <span class="num small" style="font-weight:800"><span style="color:var(--teamA)">A ${Math.round(wp*100)}%</span> · <span style="color:var(--teamB)">B ${Math.round((1-wp)*100)}%</span></span></div>`;
    }
    html += `<div class="card row spread"><span class="small muted">Avg rating gap between teams</span>
      <span class="num" style="font-weight:850;font-size:17px;color:${spread<=4?'var(--mint)':spread<=9?'var(--gold)':'var(--coral)'}">${settings.hideRatings?'••':spread}</span></div>`;
    if(window._teams.length===2){
      html += `<button class="match-action" onclick="trackTheseTeams()">Track this matchup ▸</button>`;
    }
    html += `<button class="btn ghost block" style="margin-top:9px" onclick="genTeams()">Shuffle again</button>`;
  }
  main.innerHTML = html;
}
window.togglePool=(id)=>{ window._pool.has(id)?window._pool.delete(id):window._pool.add(id); window._teams=null; renderTeams(); };
window.poolAll=()=>{
  /* toggles: select every active player, or clear them all if already selected */
  const ids=players.filter(p=>p.active&&!isArchived(p)).map(p=>p.id);
  const allOn = ids.length>0 && ids.every(id=>window._pool.has(id));
  window._pool = allOn ? new Set() : new Set(ids);
  window._teams=null; renderTeams();
};
window.setTeams=(n)=>{ settings.numTeams=positiveInt(n, settings.numTeams||DEFAULT_SETTINGS.numTeams); saveSettings(); window._teams=null; renderTeams(); };
window.setTeamsCustom=()=>{
  const n=positiveInt($('#teamCustom')?.value, null);
  if(!n){ toast('Enter a team count above 0'); return; }
  setTeams(n);
};
window.genTeams=()=>{
  const pool=players.filter(p=>p.active && !isArchived(p) && window._pool.has(p.id));
  if(pool.length<settings.numTeams){ toast('Pick enough players for non-empty teams'); return; }
  window._teams=balance(pool, settings.numTeams);
  if(window._teams.some(t=>!t.length)){ window._teams=null; toast('Every generated team needs a player'); return; }
  renderTeams();
};
window.movePlayer=(id, from)=>{
  const n=window._teams.length;
  const to=(from+1)%n;
  const p=window._teams[from].find(x=>x.id===id);
  window._teams[from]=window._teams[from].filter(x=>x.id!==id);
  window._teams[to].push(p);
  renderTeams();
};
window.trackTheseTeams=()=>{
  window._sel={A:new Set(window._teams[0].map(p=>p.id)), B:new Set(window._teams[1].map(p=>p.id))};
  window._fmt=null;   // generated teams are fully tracked — no autofill needed
  tab='track'; render();
};

/* ---------- GAMES ---------- */
function historyRow(g){
  const d = new Date(g.date);
  const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
  if(g.solo){
    const nm = pById(g.teamA[0])?.name || 'player';
    return `<button class="history-row pressable" onclick="viewGame('${g.id}')">
      <span class="avatar sm">${initials(nm)}</span>
      <span class="history-line">
        <span class="ln win">${esc(nm)}</span>
        <span class="tags"><span class="pill solo">solo scout</span></span>
      </span>
      <span class="result-block"><b>${g.winner?(g.winner==='A'?'Won':'Lost'):'\u2014'}</b><span>${dateStr}</span></span>
    </button>`;
  }
  const an = g.teamA.map(id=>pById(id)?.name).filter(Boolean);
  const bn = g.teamB.map(id=>pById(id)?.name).filter(Boolean);
  const uA = unkCount(g,'A'), uB = unkCount(g,'B');
  const nameLine = (names,u)=> `${esc(names.join(', '))}${u?`${names.length?' ':''}<span class="faint">+${u} untracked</span>`:''}`;
  const tags = [];
  if(g.evId){ const ev=evById(g.evId); tags.push(`<span class="pill" style="color:var(--gold);border-color:#f2c66d55">${esc(g.label||(ev?ev.name:'event'))}</span>`); }
  if(gameKind(g)==='partial') tags.push('<span class="pill partial">partial</span>');
  if(!g.winner) tags.push('<span class="pill">tie · not rated</span>');
  else if(scoreOnly(g)) tags.push('<span class="pill">score only</span>');
  return `<button class="history-row pressable" onclick="viewGame('${g.id}')">
    <span class="history-line">
      <span class="ln ${g.winner==='A'?'win':''}">${nameLine(an,uA)}</span>
      <span class="ln ${g.winner==='B'?'win':''}">${nameLine(bn,uB)}</span>
      ${tags.length?`<span class="tags">${tags.join('')}</span>`:''}
    </span>
    <span class="result-block"><b class="num">${g.scoreA} – ${g.scoreB}</b><span>${dateStr}</span></span>
  </button>`;
}
function renderGames(){
  let html = screenHead('History', games.length?`${games.length} game${games.length===1?'':'s'}`:'Game history');
  if(!games.length){
    html += `<div class="empty"><b>No games yet</b>Track a game from the Track tab. Each saved game updates everyone\u2019s rating automatically.</div>
      <button class="btn primary block" onclick="setTab('track')">Track a game</button>`;
  } else {
    html += games.slice().sort((a,b)=>b.date-a.date).map(historyRow).join('');
  }
  main.innerHTML = html;
}
window.viewGame=(id)=>{
  const g=games.find(x=>x.id===id); if(!g) return;
  if(g.solo){
    const p=pById(g.teamA[0]); const d=g.deltas&&g.deltas[g.teamA[0]];
    openSheet(`<h3>Solo · ${esc(p?p.name:'player')}</h3>
      <p class="small muted" style="margin:-8px 0 12px">${g.winner?`Recorded ${g.winner==='A'?'win':'loss'} · rating unaffected by result`:'No result recorded'}</p>
      <div class="row spread" style="padding:7px 0">
        <span class="small" style="min-width:0">${esc(p?p.name:'player')}<div class="tiny faint">${formatLog(g.log[g.teamA[0]])||'no events'}</div></span>
        <span style="text-align:right;white-space:nowrap">${d?`<div class="num small"><span class="faint">${d.before}→${d.after}</span></div><div class="tiny" style="color:var(--muted)">${whyMoved(d)}</div>`:'—'}</span>
      </div>
      <button class="btn danger block" style="margin-top:16px" onclick="deleteGame('${g.id}')">Delete game</button>
      ${sheetCloseBtn('Done')}`);
    return;
  }
  const uA=unkCount(g,'A'), uB=unkCount(g,'B');
  const probLine=(g.winProb!=null&&!settings.hideRatings&&g.winner)
    ? `<p class="small muted" style="margin:-8px 0 12px">Pre-game: Team A ${Math.round(g.winProb*100)}% · Team B ${Math.round((1-g.winProb)*100)}%${gameKind(g)==='partial'?' · tracked only':''}${g.predCorrect===false?' · upset':g.predCorrect?' · predicted':''}</p>` : '';
  const tieLine = !g.winner
    ? `<p class="small muted" style="margin:-8px 0 12px">Tie — saved for reference. Tied games don't change ratings, records, or games played.</p>` : '';
  const ctxLine = (g.winner && gameKind(g)==='partial')
    ? `<p class="small muted" style="margin:${probLine?'-6px':'-8px'} 0 12px">${g.winProb==null
        ? 'Partial tracking · other side untracked — result counted for win/loss; ratings moved on logged events only.'
        : `Partial tracking · ${uA+uB} untracked slot${uA+uB===1?'':'s'} — result impact scaled to ${Math.round((g.ctx||0)*100)}%.`}</p>`
    : '';
  const list=(ids)=>ids.map(i=>{const p=pById(i); if(!p) return ''; const d=g.deltas&&g.deltas[i];
    return `<div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border)">
      <span class="small" style="min-width:0">${esc(p.name)}<div class="tiny faint">${formatLog(g.log[i])||'no events'}</div></span>
      <span style="text-align:right;white-space:nowrap">${d?`<div class="num small"><span class="faint">${d.before}→${d.after}</span></div><div class="tiny" style="color:var(--muted)">${whyMoved(d)}</div>`:'<span class="tiny faint">—</span>'}</span>
    </div>`;}).join('');
  const evLine = (()=>{ if(!g.evId) return '';
    const ev=evById(g.evId); const a=ev&&evTeamById(ev,g.evA), b=ev&&evTeamById(ev,g.evB);
    return `<p class="small" style="margin:-8px 0 12px;color:var(--gold)">${esc(ev?ev.name:'Event')}${(a&&b)?` · ${esc(a.name)} vs ${esc(b.name)}`:''}${g.label?` · ${esc(g.label)}`:''}</p>`; })();
  openSheet(`
    <h3>Game · ${g.scoreA}–${g.scoreB}</h3>
    ${evLine}${probLine}${tieLine}${ctxLine}
    <div class="teamhdr A" style="margin-top:0">Team A${uA?` <span class="unktag">· +${uA} untracked</span>`:''} ${g.winner==='A'?'· won':''}</div>${list(g.teamA)}
    <div class="teamhdr B">Team B${uB?` <span class="unktag">· +${uB} untracked</span>`:''} ${g.winner==='B'?'· won':''}</div>${list(g.teamB)}
    <button class="btn danger block" style="margin-top:16px" onclick="deleteGame('${g.id}')">Delete game</button>
    ${sheetCloseBtn('Done')}
  `);
};
function whyMoved(d){
  const parts=[]; const e=Math.round(d.elo*10)/10, v=Math.round(d.ev*10)/10;
  if(e) parts.push(`result ${e>0?'+':''}${e}`);
  if(v) parts.push(`events ${v>0?'+':''}${v}`);
  return parts.join(' · ')||'no change';
}
function formatLog(log){ if(!log) return ''; return Object.entries(log).map(([k,v])=>`${v}${EV_MAP[k]?.l||k}`).join('  '); }
window.deleteGame=async(id)=>{
  if(!(await askConfirm('Delete this game? Ratings will be recalculated for everyone who played in it.','Delete game'))) return;
  games=games.filter(g=>g.id!==id); await commit(); closeSheet(); toast('Game deleted'); render();
};

/* ---------- EVENTS (tournaments · fixed teams · standings) ----------
   Format-agnostic by design: an event is just a named group of games
   between locked teams. Pool play, brackets, round robin — you pick each
   matchup, standings do the math. Games carry optional evId/evA/evB/label
   fields which the rating engine never reads, so event games rate exactly
   like normal games and old backups replay unchanged. */
function evById(id){ return evts.find(e=>e.id===id); }
function evTeamById(ev,tid){ return (ev.teams||[]).find(t=>t.id===tid); }
function evGameCount(ev){ return games.filter(g=>g.evId===ev.id).length; }
function eventStandings(ev){
  /* A "match" is a group of sets sharing a matchId (best-of-3 logging);
     a game without matchId is a one-set match. Match winner = more set
     wins in the group. Rank: match W → match L → set diff → point diff. */
  const rows=(ev.teams||[]).map(t=>({t,mw:0,ml:0,sw:0,sl:0,ties:0,pf:0,pa:0,gp:0}));
  const by={}; rows.forEach(r=>by[r.t.id]=r);
  const groups={};
  games.forEach(g=>{
    if(g.evId!==ev.id) return;
    const key=g.matchId||g.id;
    (groups[key]=groups[key]||[]).push(g);
  });
  Object.values(groups).forEach(sets=>{
    const tally={};
    sets.forEach(g=>{
      const a=by[g.evA], b=by[g.evB]; if(!a||!b) return;
      a.pf+=g.scoreA||0; a.pa+=g.scoreB||0; b.pf+=g.scoreB||0; b.pa+=g.scoreA||0;
      a.gp++; b.gp++;
      tally[g.evA]=tally[g.evA]||0; tally[g.evB]=tally[g.evB]||0;
      if(g.winner==='A'){ a.sw++; b.sl++; tally[g.evA]++; }
      else if(g.winner==='B'){ b.sw++; a.sl++; tally[g.evB]++; }
      else { a.ties++; b.ties++; }
    });
    const ids=Object.keys(tally).filter(id=>by[id]);
    if(ids.length===2){
      const [x,y]=ids;
      if(tally[x]>tally[y]){ by[x].mw++; by[y].ml++; }
      else if(tally[y]>tally[x]){ by[y].mw++; by[x].ml++; }
      /* equal set wins → drawn match: points and sets count, no match W-L */
    }
  });
  rows.forEach(r=>{ r.diff=r.pf-r.pa; r.sdiff=r.sw-r.sl; });
  rows.sort((x,y)=> y.mw-x.mw || x.ml-y.ml || y.sdiff-x.sdiff || y.diff-x.diff || x.t.name.localeCompare(y.t.name));
  return rows;
}
/* --- brackets: ev.brackets is a list; each stores ONLY {id, name, created, seeds}.
   Who has advanced is derived from games on every render — same rule as
   standings and ratings — so fixing or deleting a game self-corrects the
   bracket. Only matches played after a bracket's creation count toward it.
   Any team count 2+ works: seeds are padded to the next power of two and
   top seeds receive first-round byes. --- */
function bracketSeedOrder(P){
  /* standard bracket position order: 1 meets 2 only in the final */
  let a=[0];
  while(a.length<P) a=a.flatMap(x=>[x, a.length*2-1-x]);
  return a;
}
function bracketRoundNames(P){
  const names=[];
  for(let n=P; n>=2; n/=2) names.push(bracketRoundName(n,false));
  return names;
}
function bracketMatchLabel(br, P, roundIdx, i, count){
  const nm=bracketRoundName(P/Math.pow(2,roundIdx),true);
  return (br.name?br.name+' · ':'')+nm+(count>1?' '+(i+1):'');
}
function bracketPairResult(ev, br, ta, tb){
  const groups={};
  games.forEach(g=>{
    if(g.evId!==ev.id || g.date<br.created) return;
    if(!((g.evA===ta&&g.evB===tb)||(g.evA===tb&&g.evB===ta))) return;
    const k=g.matchId||g.id; (groups[k]=groups[k]||[]).push(g);
  });
  let best=null, bestDate=0;
  Object.values(groups).forEach(sets=>{
    let wa=0, wb=0, latest=0;
    const sc=[];
    sets.slice().sort((x,y)=>x.date-y.date).forEach(g=>{
      const sa=g.evA===ta?g.scoreA:g.scoreB, sb=g.evA===ta?g.scoreB:g.scoreA;
      if(sa>sb)wa++; else if(sb>sa)wb++;
      latest=Math.max(latest,g.date); sc.push(sa+'\u2013'+sb);
    });
    if(wa===wb) return;
    if(latest>=bestDate){
      bestDate=latest;
      best={winner: wa>wb?ta:tb, disp: sc.length>1?`${Math.max(wa,wb)}-${Math.min(wa,wb)}`:sc[0]};
    }
  });
  return best;
}
function bracketState(ev, br){
  if(!br||!br.seeds||br.seeds.length<2) return null;
  const N=br.seeds.length;
  let P=2; while(P<N) P*=2;
  const order=bracketSeedOrder(P);
  const seedNum={}; br.seeds.forEach((id,i)=>seedNum[id]=i+1);
  const padded=i=> i<N ? br.seeds[i] : null;
  let round=[];
  for(let i=0;i<order.length;i+=2){
    const a=padded(order[i]), b=padded(order[i+1]);
    round.push({a, b, bye: (a&&!b)||(b&&!a)});
  }
  const rounds=[];
  for(;;){
    round.forEach(m=>{
      if(m.bye){ m.winner=m.a||m.b; m.res=null; return; }
      const res=(m.a&&m.b)?bracketPairResult(ev,br,m.a,m.b):null;
      m.res=res; m.winner=res?res.winner:null;
    });
    rounds.push(round);
    if(round.length===1) break;
    const next=[];
    for(let i=0;i<round.length;i+=2) next.push({a:round[i].winner, b:round[i+1].winner, bye:false});
    round=next;
  }
  return {rounds, seedNum, size:P, byes:P-N};
}
/* --- courts & schedule: ev.sched stores the plan {start, courts, courtStyle,
   setMin, matchMin, breakMin}. The timeline itself is DERIVED on every render:
   pool matchups come from round-robin math, played pairs drop off, and the
   next pending match re-anchors to "now" when the day runs late (or early).
   Nothing to manually adjust — delays and breaks are absorbed automatically. --- */
const MAX_COURTS = 64;
function evSchedDefaults(){ return {start:'10:00', courts:2, courtStyle:'num', setMin:25, matchMin:45, breakMin:15}; }
function sanitizeCourtCount(value, fallback=evSchedDefaults().courts){ return clamp(positiveInt(value, fallback), 1, MAX_COURTS); }
function courtLabel(s,i){ return s.courtStyle==='letter' ? 'Court '+alphaLabel(i) : 'Court '+(i+1); }
function fmtClock(ms){ return new Date(ms).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
function scheduleTimeStatus(startMs, now, done){
  const start=fmtClock(startMs);
  if(done>0) return {mode:'progress', note:'Live-adjusted from current progress.'};
  if(now>startMs) return {mode:'now', note:`Live-adjusted from now because the ${start} start time has passed.`};
  return {mode:'planned', note:`Planned from ${start}.`};
}
function roundRobinRounds(ids){
  /* circle method: n-1 rounds (even n) or n rounds (odd n, one bye each round) */
  const t=ids.slice(); if(t.length<2) return [];
  if(t.length%2===1) t.push(null);
  const n=t.length, rounds=[];
  for(let r=0;r<n-1;r++){
    const rd=[];
    for(let i=0;i<n/2;i++){
      const a=t[i], b=t[n-1-i];
      if(a!=null&&b!=null) rd.push(r%2? [b,a]:[a,b]);
    }
    rounds.push(rd);
    t.splice(1,0,t.pop());
  }
  return rounds;
}
function buildSchedule(ev){
  const s=ev.sched; if(!s) return null;
  const teams=ev.teams||[]; if(teams.length<2) return null;
  const poolVals=[...new Set(teams.map(t=>t.pool||''))].filter(Boolean).sort();
  const warnings=[];
  if(!poolVals.length && teams.length>8) warnings.push(`Single round robin: ${teams.length*(teams.length-1)/2} matches. Pools can shorten the day, but this schedule is still available.`);
  const grps = poolVals.length
    ? poolVals.map(p=>({pool:p, ids:teams.filter(t=>(t.pool||'')===p).map(t=>t.id)}))
    : [{pool:'', ids:teams.map(t=>t.id)}];
  const rawCourts=Number(s.courts);
  const requestedCourts=sanitizeCourtCount(s.courts,1);
  const playedPair=(a,b)=> games.some(g=> g.evId===ev.id && ((g.evA===a&&g.evB===b)||(g.evA===b&&g.evB===a)));
  const [hh,mm]=(s.start||'10:00').split(':').map(Number);
  const sd=new Date(); sd.setHours(hh||10, mm||0, 0, 0);
  const startMs=sd.getTime(), now=Date.now(), MIN=60000;
  const roundsPer=grps.map(g=>({pool:g.pool, rounds:roundRobinRounds(g.ids)}));
  const q=[];
  const maxR=Math.max(0,...roundsPer.map(g=>g.rounds.length));
  for(let r=0;r<maxR;r++){
    roundsPer.forEach(g=>{
      (g.rounds[r]||[]).forEach(([a,b])=>q.push({a,b,pool:g.pool}));
    });
  }
  if(!q.length) return null;
  const done=q.filter(m=>playedPair(m.a,m.b)).length;
  const pending=q.filter(m=>!playedPair(m.a,m.b));
  const pendingTeams=new Set();
  pending.forEach(m=>{ pendingTeams.add(m.a); pendingTeams.add(m.b); });
  const maxLegalSimultaneousMatches=Math.floor(pendingTeams.size/2);
  const effectiveCourts=pending.length
    ? Math.max(1, Math.min(requestedCourts, MAX_COURTS, pending.length, maxLegalSimultaneousMatches))
    : 0;
  const timing=scheduleTimeStatus(startMs, now, done);
  const anchorBase = timing.mode==='planned' ? startMs : now;
  const slots=[];
  while(pending.length){
    const used=new Set(), slot=[];
    for(let i=0;i<pending.length && slot.length<effectiveCourts;i++){
      const m=pending[i];
      if(used.has(m.a) || used.has(m.b)) continue;
      used.add(m.a); used.add(m.b);
      slot.push({...m, slot:slots.length, court:slot.length, est:anchorBase + slots.length*s.setMin*MIN});
      pending.splice(i,1); i--;
    }
    if(!slot.length) break;
    slots.push(slot);
  }
  const courtBuckets=slots.length ? Math.max(...slots.map(slot=>slot.length)) : 0;
  const courts=Array.from({length:courtBuckets},(_,ci)=>{
    const items=slots.map(slot=>slot.find(m=>m.court===ci)).filter(Boolean);
    return {label:courtLabel(s,ci), pools:[...new Set(items.map(m=>m.pool).filter(Boolean))], items, done, total:items.length};
  }).filter(c=>c.items.length);
  const poolsEnd=slots.length ? slots[slots.length-1][0].est + s.setMin*MIN
    : anchorBase;
  const playoffStart=poolsEnd + s.breakMin*MIN;
  const brRounds=Math.max(0, ...(ev.brackets||[]).map(br=>{ const bs=bracketState(ev,br); return bs?bs.rounds.length:0; }));
  const playoff=brRounds ? Array.from({length:brRounds},(_,i)=>({name:'Playoff round '+(i+1), est:playoffStart + i*s.matchMin*MIN})) : null;
  if(Number.isFinite(rawCourts) && rawCourts>MAX_COURTS) warnings.push(`Court count capped at ${MAX_COURTS} for stability.`);
  if(requestedCourts>effectiveCourts && effectiveCourts>0) warnings.push(`Using ${effectiveCourts} of ${requestedCourts} requested courts; unused courts are normal when there are not enough legal simultaneous matches.`);
  return {courts, slots, done, total:q.length, requestedCourts, effectiveCourts, maxLegalSimultaneousMatches,
    poolsEnd, playoffStart, playoff, warnings, s:{...s, courts:requestedCourts}, rawCourts, timeNote:timing.note, timeMode:timing.mode,
    awards: playoff ? playoff[playoff.length-1].est + s.matchMin*MIN : null};
}
function renderEvents(){
  const openEv = window._evOpen ? evById(window._evOpen) : null;
  if(window._evOpen && !openEv) window._evOpen=null;
  if(openEv){ renderEventDetail(openEv); return; }
  let html = screenHead('Events','Tournaments & events','Lock in team rosters, log scores, and Court keeps the standings. Works for pool play, brackets, round robin — you pick each matchup.');
  html += `<button class="btn primary block" onclick="openNewEvent()">${icons.plus} New event</button>`;
  if(!evts.length){
    html += `<div class="empty" style="margin-top:12px"><b>No events yet</b>Create one on tournament day: name it, add fixed teams, then log each result. Ratings still update quietly underneath — score-only games count.</div>`;
  } else {
    const sorted=evts.slice().sort((a,b)=>((a.done?1:0)-(b.done?1:0)) || (b.created-a.created));
    html += sorted.map(ev=>{
      const n=evGameCount(ev);
      const st=eventStandings(ev);
      const lead=st.length?st[0]:null;
      return `<button class="ev-row pressable" onclick="openEvent('${ev.id}')">
        <div class="row spread"><b>${esc(ev.name)}</b><span class="pill" style="${ev.done?'':'color:var(--gold);border-color:#f2c66d55'}">${ev.done?'final':'live'}</span></div>
        <div class="tiny faint" style="margin-top:5px">${(ev.teams||[]).length} team${(ev.teams||[]).length===1?'':'s'} · ${n} game${n===1?'':'s'}${(lead&&n)?` · ${esc(lead.t.name)} ${ev.done?'won':'leads'}`:''}</div>
      </button>`;
    }).join('');
  }
  main.innerHTML=html;
}
function renderEventDetail(ev){
  const st=eventStandings(ev);
  const gs=games.filter(g=>g.evId===ev.id).sort((a,b)=>b.date-a.date);
  const canLog=(ev.teams||[]).length>=2;
  let html = `<button class="btn sm ghost" style="margin-bottom:4px" onclick="closeEvent()">‹ All events</button>`;
  html += screenHead(ev.done?'Event · final':'Event · live', esc(ev.name));
  html += `<div class="card">
    <div class="row spread" style="margin-bottom:4px"><div class="stat-title" style="margin:0">Standings</div>
      <span class="tiny faint">tap a team for its schedule</span></div>`;
  if(!st.length) html+=`<div class="stat-empty">Add at least two teams to start.</div>`;

      ? poolVals.slice().sort((a,b)=> (a===''?1:b===''?-1:a.localeCompare(b))).map(p=>({label:p?`Pool ${p}`:'No pool', rows:st.filter(r=>(r.t.pool||'')===p)}))
      : [{label:null, rows:st}];

        <span class="small" style="font-weight:700;min-width:0">${esc(r.t.name)}<div class="tiny faint" style="font-weight:500">sets ${r.sw}-${r.sl}${r.ties?` · ${r.ties} tie${r.ties===1?'':'s'}`:''} · ${r.gp} played</div></span>
        <span class="num small" style="text-align:right;font-weight:700">${r.mw}-${r.ml}</span>
        <span class="num small" style="text-align:right;font-weight:700;color:${r.diff>0?'var(--good)':r.diff<0?'var(--bad)':'var(--faint)'}">${r.diff>0?'+':''}${r.diff}</span></button>`).join('');
    html += groups.filter(g=>g.rows.length).map(g=>`${g.label?`<div class="pool-title">${esc(g.label)}</div>`:''}${table(g.rows)}`).join('');

  const sc = ev.done ? null : buildSchedule(ev);
  if(sc){
    html += `<div class="card" style="margin-top:12px">
      <div class="row spread" style="margin-bottom:2px"><div class="stat-title" style="margin:0">Schedule</div>

      <div class="tiny faint" style="margin:5px 0 6px">${esc(sc.timeNote)}</div>
      ${(sc.warnings||[]).map(w=>`<div class="unkline">${esc(w)}</div>`).join('')}

        <div class="pool-title">${esc(c.label)} <span class="tiny faint" style="text-transform:none;letter-spacing:0">· ${c.items.length} match${c.items.length===1?'':'es'}</span></div>
        ${c.items.length ? c.items.map(m=>{
          const ta=evTeamById(ev,m.a), tb=evTeamById(ev,m.b);
          return `<div class="row spread" style="padding:5px 0;border-bottom:1px solid var(--border)">

              <span class="small" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ta?ta.name:'?')} vs ${esc(tb?tb.name:'?')}</span>
            </span>
            <span class="tiny num faint" style="white-space:nowrap;margin-left:8px">${fmtClock(m.est)}</span></div>`;
        }).join('') : `<div class="tiny" style="color:var(--mint);padding:4px 0">Pool play complete ✓</div>`}
      `).join('') : `<div class="tiny" style="color:var(--mint);padding:4px 0">Pool play complete ✓</div>`}

        ? `<div class="pool-title">Playoffs <span class="tiny faint" style="text-transform:none;letter-spacing:0">· best of 3 · after ${sc.s.breakMin}-min break</span></div>`
          + sc.playoff.map(r=>`<div class="row spread" style="padding:4px 0"><span class="small">${esc(r.name)}</span><span class="tiny num faint">≈ ${fmtClock(r.est)}</span></div>`).join('')
          + `<div class="row spread" style="padding:4px 0"><span class="small" style="color:var(--gold);font-weight:700">Awards</span><span class="tiny num" style="color:var(--gold)">≈ ${fmtClock(sc.awards)}</span></div>`
        : `<div class="tiny faint" style="margin-top:8px">Pool play ends ≈ ${fmtClock(sc.poolsEnd)} · add a bracket to project the playoff timeline.</div>`}
    </div>`;
  }
  (ev.brackets||[]).forEach(br=>{

    const cols=bs.rounds.map((round,ri)=>{
      const slots=round.map((m,i)=>{
        const label=bracketMatchLabel(br,bs.size,ri,i,round.length);
        const canLog=!ev.done && m.a && m.b && !m.winner;

        return canLog
          ? `<button class="br-match open" onclick="openEventGame('${ev.id}','${m.a}','${m.b}','${esc(label)}','bo3')">${inner}</button>`

      }).join('');
      return `<div class="br-col"><div class="br-round">${names[ri]}</div><div class="br-slots">${slots}</div></div>`;
    }).join('');

    const champTeam=champ?evTeamById(ev,champ):null;
    const champCol=`<div class="br-col" style="min-width:112px"><div class="br-round">Champion</div><div class="br-slots"><div class="br-champ">${champTeam?`<b>${esc(champTeam.name)}</b>`:`<span class="tiny faint">TBD</span>`}</div></div></div>`;
    html += `<div class="card" style="margin-top:12px">
      <div class="row spread" style="margin-bottom:8px"><div class="stat-title" style="margin:0;color:var(--gold)">${esc(br.name||'Bracket')}</div>
        ${ev.done?'':`<button class="btn sm ghost" onclick="resetBracket('${ev.id}','${br.id}')">Remove</button>`}</div>
      <div class="bracket-scroll"><div class="bracket">${cols}${champCol}</div></div>
      ${bs.byes?`<div class="tiny faint" style="margin-top:6px">${bs.byes===1?'Top seed has':'Top '+bs.byes+' seeds have'} a first-round bye.</div>`:''}
      ${ev.done?'':`<div class="tiny faint" style="margin-top:6px">Tap an open matchup to log it. Winners advance automatically — and un-advance if a game is deleted or corrected.</div>`}
    </div>`;
  });
  if(!ev.done){
    html += `<button class="btn primary block" style="margin-top:12px" ${canLog?'':'disabled'} onclick="openEventGame('${ev.id}')">Log a game</button>
      <div class="row" style="gap:8px;margin-top:8px">
        <button class="btn ghost" style="flex:1" onclick="openEventTeam('${ev.id}')">${icons.plus} Add team</button>
        <button class="btn ghost" style="flex:1" onclick="openBulkTeams('${ev.id}')">${icons.plus} Add many</button>
      </div>
      ${((ev.teams||[]).length>=2)?`<button class="btn ghost block" style="margin-top:8px" onclick="openManagePools('${ev.id}')">Manage pools</button>`:''}
      ${((ev.teams||[]).length>=2)?`<button class="btn ghost block" style="margin-top:8px;color:var(--gold)" onclick="openBracketSetup('${ev.id}')">${icons.trophy} Add bracket</button>`:''}
      <button class="btn ghost block" style="margin-top:8px" onclick="openEvSettings('${ev.id}')">Courts & schedule</button>`;
  }
  if((ev.teams||[]).length){
    html += `<div class="card" style="margin-top:12px"><div class="stat-title">Teams${ev.done?'':' <span class="tiny faint" style="font-weight:500">· tap to edit / sub players</span>'}</div>`
      + ev.teams.map(t=>`<button class="ev-team pressable" onclick="openEventTeam('${ev.id}','${t.id}')">
          <span class="small" style="font-weight:700;white-space:nowrap">${esc(t.name)}${t.pool?` <span class="tiny" style="color:var(--gold);font-weight:800">· ${esc(t.pool)}</span>`:''}</span>
          <span class="tiny faint">${t.players.map(id=>pById(id)?.name).filter(Boolean).map(esc).join(', ')||'guest team'}</span>
        </button>`).join('') + `</div>`;

    html += `<div class="card" style="margin-top:12px"><div class="stat-title">Games</div>`
      + gs.map(g=>{
        const a=evTeamById(ev,g.evA), b=evTeamById(ev,g.evB);
        const wname = g.winner==='A'?(a?.name||'A'):g.winner==='B'?(b?.name||'B'):null;

function cleanPoolLabel(v){ return (v||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,''); }
/* --- manage pools: pools are just labels on event teams. Pool count is
   DERIVED from current labels; "changing the count" means relabeling teams.
   Nothing here touches games, rosters, or ratings — only t.pool. --- */
function eventPoolLabels(ev){
  return [...new Set((ev.teams||[]).map(t=>cleanPoolLabel(t.pool||'')).filter(Boolean))]
    .sort((a,b)=> a.length-b.length || a.localeCompare(b));
}
function poolAssignments(teamIds, count){
  /* even round-robin split A, B, C… preserving team order (same rule as bulk add);
     count 0 clears all pool labels */
  const n=positiveInt(count,0), map={};
  teamIds.forEach((id,i)=>{ map[id]= n ? poolLabel(i%n) : ''; });
  return map;
}
function teamsWithEventGames(ev){
  const s=new Set();
  games.forEach(g=>{ if(g.evId===ev.id){ s.add(g.evA); s.add(g.evB); } });
  return s;
}
function poolEditChanges(ev, assign){
  /* teams whose pool label would actually change under `assign` */
  return (ev.teams||[]).filter(t=> assign[t.id]!=null && cleanPoolLabel(assign[t.id])!==cleanPoolLabel(t.pool||''));
}
function applyPoolAssignments(ev, assign){
  (ev.teams||[]).forEach(t=>{ if(assign[t.id]!=null) t.pool=cleanPoolLabel(assign[t.id]); });
}
function eventPoolChoices(ev, current=''){
  const visibleCount=Math.max(12, Math.min(16, (ev.teams||[]).length || 12));
  const generated=Array.from({length:visibleCount},(_,i)=>poolLabel(i));
  const existing=[...new Set((ev.teams||[]).map(t=>cleanPoolLabel(t.pool||'')).filter(Boolean))];
  return ['', ...new Set([...generated, ...existing.slice(0,16), cleanPoolLabel(current)].filter(Boolean))];
}

const BR_NAME_PRESETS=['Gold','Silver','Bronze','Championship'];
/* Capture the typed name BEFORE re-rendering — never inside the render
   itself, or programmatic name changes (presets) get overwritten by the
   stale input value. */
function brCapture(){
  const d=window._brDraft;

  return d;
}
function renderBracketSetupSheet(){
  const d=window._brDraft; const ev=evById(d.evId); if(!ev) return;
  const st=eventStandings(ev);
  const seedOf=id=>d.seeds.indexOf(id);
  const usedElsewhere=new Set(); (ev.brackets||[]).forEach(b=>b.seeds.forEach(id=>usedElsewhere.add(id)));
  const chips=st.map(r=>{
    const i=seedOf(r.t.id);
    const dim = i<0 && usedElsewhere.has(r.t.id);
    return `<button class="chip ${i>=0?'on':''}" style="${dim?'opacity:.55':''}" onclick="brSeedToggle('${r.t.id}')">${i>=0?`<b style="color:var(--gold)">${i+1}</b> `:''}${esc(r.t.name)} <span class="tiny faint">${r.mw}-${r.ml}</span></button>`;
  }).join('');
  const pools=[...new Set((ev.teams||[]).map(t=>t.pool||''))].filter(Boolean).sort();
  const rankBtns = pools.length
    ? `<div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:7px">
        ${[1,2,3,4].map(k=>`<button class="btn sm ghost" style="color:var(--gold);padding:4px 9px" onclick="brSeedRank(${k})">${k===1?'1st':k===2?'2nd':k===3?'3rd':'4th'} of each pool</button>`).join('')}
      </div>` : '';
  const N=d.seeds.length;
  let P=2; while(P<Math.max(N,2)) P*=2;
  const byeNote = N>=2 && P>N ? `<div class="tiny" style="color:var(--gold);margin-top:6px">${N} teams → top ${P-N} seed${P-N===1?'':'s'} get a first-round bye.</div>` : '';
  const bigNote = N>32 ? `<div class="tiny faint" style="margin-top:6px">${N} teams creates a ${bracketRoundName(P)} bracket. It may scroll horizontally on phones.</div>` : '';
  const topBtns = [8,16,32].filter(n=>st.length>=n).map(n=>`<button class="btn sm ghost" style="color:var(--gold);padding:4px 9px" onclick="brSeedTop(${n})">Top ${n}</button>`).join('');
  openSheet(`<h3>Add bracket · ${esc(ev.name)}</h3>
    <p class="small muted" style="margin:-8px 0 14px">Single elimination, best-of-3 by default. Seeds pair 1 vs lowest so top seeds meet late. Run several brackets side by side — Gold for pool winners, Silver for runners-up, and so on.</p>

      <input id="brName" value="${esc(d.name)}" placeholder="e.g. Gold" oninput="brNameTyped(this.value)">

    </div>
    <div class="field">
      <div class="row spread" style="margin-bottom:7px">
        <label style="margin:0">Seeding · ${N} team${N===1?'':'s'}</label>

      </div>
      ${topBtns?`<div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:7px">${topBtns}</div>`:''}
      ${rankBtns}
      <div class="chips">${chips}</div>
      <div class="tiny faint" style="margin-top:6px">Tap teams in seed order (1 first), tap again to remove. Dimmed teams are already in another bracket — allowed, just flagged. Standings order shown as W-L.</div>
      ${byeNote}
      ${bigNote}
    </div>
    <button id="brCreate" class="btn primary block" ${(N>=2&&(d.name||'').trim())?'':'disabled'} onclick="createBracketNow()">Create bracket</button>
    ${sheetCloseBtn()}`);
}

window.brNameTyped=(v)=>{

  const d=window._brDraft; d.name=v;

window.brSeedRank=(k)=>{
  /* the k-th place team of every pool, ordered by overall standing */
  const d=brCapture(); const ev=evById(d.evId); if(!ev) return;
  const st=eventStandings(ev);
  const pools=[...new Set((ev.teams||[]).map(t=>t.pool||''))].filter(Boolean).sort();
  const picks=[];
  pools.forEach(p=>{
    const rows=st.filter(r=>(r.t.pool||'')===p);
    if(rows[k-1]) picks.push(rows[k-1].t.id);
  });
  /* keep overall-standing order so the strongest k-th seed is #1 */
  d.seeds=st.filter(r=>picks.includes(r.t.id)).map(r=>r.t.id);
  renderBracketSetupSheet();
};
window.brSeedTop=(n)=>{
  const d=brCapture(); const ev=evById(d.evId); if(!ev) return;
  d.seeds=eventStandings(ev).slice(0,n).map(r=>r.t.id);

/* --- team schedule: everything one team plays — done and upcoming.
   Derived on open, same as standings: played matches grouped by matchId,
   upcoming pulled from the live schedule (court + time) when one is set,
   otherwise the remaining same-pool opponents. --- */
function teamScheduleInfo(ev, tid){
  const groups={};
  games.forEach(g=>{
    if(g.evId!==ev.id || !(g.evA===tid||g.evB===tid)) return;
    const k=g.matchId||g.id; (groups[k]=groups[k]||[]).push(g);
  });
  const played=Object.values(groups).map(sets=>{
    sets=sets.slice().sort((x,y)=>x.date-y.date);
    const opp = sets[0].evA===tid ? sets[0].evB : sets[0].evA;
    let w=0,l=0; const sc=[];
    sets.forEach(g=>{
      const mine=g.evA===tid?g.scoreA:g.scoreB, theirs=g.evA===tid?g.scoreB:g.scoreA;
      if(mine>theirs)w++; else if(theirs>mine)l++;
      sc.push(mine+'\u2013'+theirs);
    });
    return {opp, date:sets[sets.length-1].date, label:(sets[0].label||'').replace(/ · Set 1$/,''),
      won: w>l?true:l>w?false:null,
      disp: sets.length>1 ? `${w}-${l} · ${sc.join(', ')}` : sc[0]};
  }).sort((a,b)=>a.date-b.date);
  const sc=ev.done?null:buildSchedule(ev);
  const upcoming = sc ? sc.slots.flat().filter(m=>m.a===tid||m.b===tid)
    .map(m=>({opp:m.a===tid?m.b:m.a, est:m.est, court:courtLabel(sc.s,m.court), pool:m.pool})) : null;
  const team=evTeamById(ev,tid);
  const playedOpps=new Set(played.map(p=>p.opp));
  const remaining=(ev.teams||[]).filter(t=>t.id!==tid && (t.pool||'')===((team&&team.pool)||'') && !playedOpps.has(t.id)).map(t=>t.id);
  return {played, upcoming, remaining};
}
window.openTeamSchedule=(evId, tid)=>{
  const ev=evById(evId); const team=ev&&evTeamById(ev,tid); if(!team) return;
  const info=teamScheduleInfo(ev, tid);
  const name=id=>{ const t=evTeamById(ev,id); return t?t.name:'?'; };
  const playedRows=info.played.map(p=>`<div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border);gap:10px">
      <span class="small" style="min-width:0"><b style="color:${p.won===true?'var(--good)':p.won===false?'var(--bad)':'var(--faint)'}">${p.won===true?'W':p.won===false?'L':'D'}</b> &nbsp;vs ${esc(name(p.opp))}${p.label?`<div class="tiny faint">${esc(p.label)}</div>`:''}</span>
      <span class="num small" style="white-space:nowrap">${esc(p.disp)}</span>
    </div>`).join('');
  const upcomingRows=(info.upcoming||[]).map(u=>`<div class="row spread" style="padding:7px 0;border-bottom:1px solid var(--border);gap:10px">
      <span class="small" style="min-width:0">vs ${esc(name(u.opp))}${u.pool?`<div class="tiny faint">Pool ${esc(u.pool)}</div>`:''}</span>
      <span class="tiny num faint" style="white-space:nowrap;text-align:right">${esc(u.court)}<br>≈ ${fmtClock(u.est)}</span>
    </div>`).join('');
  const remainingLine=info.remaining.length
    ? `<div class="small" style="padding:4px 0">${info.remaining.map(id=>esc(name(id))).join(' · ')}</div>
       <div class="tiny faint" style="margin-top:4px">Set up Courts & schedule for courts and times.</div>`
    : `<div class="tiny" style="color:var(--mint);padding:4px 0">Pool play complete ✓</div>`;
  openSheet(`<h3>${esc(team.name)}${team.pool?` <span style="color:var(--gold)">· Pool ${esc(team.pool)}</span>`:''}</h3>
    <p class="small muted" style="margin:-8px 0 14px">${esc(ev.name)} · everything this team plays.</p>
    <div class="field"><label>Played · ${info.played.length}</label>
      ${playedRows||`<div class="tiny faint" style="padding:4px 0">Nothing yet.</div>`}</div>
    ${info.upcoming
      ? `<div class="field"><label>Up next · ${info.upcoming.length}</label>
          ${upcomingRows||`<div class="tiny" style="color:var(--mint);padding:4px 0">Pool play complete ✓</div>`}</div>`
      : ev.done ? '' : `<div class="field"><label>Still to play · ${info.remaining.length}</label>${remainingLine}</div>`}
    ${ev.done?'':`<button class="btn ghost block" style="margin-top:4px" onclick="openEventTeam('${ev.id}','${team.id}')">Edit team</button>`}
    ${sheetCloseBtn('Done')}`);
};

window.openEventGame=(evId, preA, preB, preLabel, preMode)=>{
  const ev=evById(evId); if(!ev||(ev.teams||[]).length<2) return;
  window._evGameDraft={evId, a:preA||null, b:preB||null, mode:preMode||'set', sA:'', sB:'', s1A:'',s1B:'',s2A:'',s2B:'',s3A:'',s3B:'', label:preLabel||''};

function evGameCapture(){

  ['1','2','3'].forEach(n=>{ grab('#evs'+n+'A','s'+n+'A'); grab('#evs'+n+'B','s'+n+'B'); });

}
window.evGameMode=(m)=>{ const d=evGameCapture(); d.mode=m; renderEventGameSheet(); };
function renderEventGameSheet(){

window.evPickTeam=(side,tid)=>{
  const d=evGameCapture();
  d[side] = d[side]===tid ? null : tid;
  renderEventGameSheet();
};
window.saveEventGame=async()=>{
  const d=evGameCapture(); const ev=evById(d.evId); if(!ev) return;
  const tA=evTeamById(ev,d.a), tB=evTeamById(ev,d.b); if(!tA||!tB) return;
  const label=(d.label||'').trim();
  const num=v=>Math.max(0, Math.round(Number(v)||0));
  const pA=tA.players.filter(id=>pById(id)), pB=tB.players.filter(id=>pById(id));
  /* Playerless (guest) sides save as untracked slots — the engine's existing
     partial-game model then guarantees: guest vs guest moves no ratings;
     rostered vs guest counts the win/loss without result-based rating moves. */
  const mk=(a,b,extra)=>({ id:uid(), date:Date.now(),
    teamA:pA, teamB:pB, unkA:pA.length?0:1, unkB:pB.length?0:1,
    scoreA:a, scoreB:b, winner:a>b?'A':(b>a?'B':null), log:{},
    evId:ev.id, evA:tA.id, evB:tB.id, ...extra });
  if(d.mode==='bo3'){
    const sets=[];
    ['1','2','3'].forEach(n=>{
      const ra=(d['s'+n+'A']||'').trim(), rb=(d['s'+n+'B']||'').trim();
      if(ra===''&&rb==='') return;
      sets.push([num(ra),num(rb),n]);
    });
    if(!sets.length){ toast('Enter at least one set score'); return; }
    let wa=0, wb=0;
    sets.forEach(([a,b])=>{ if(a>b)wa++; else if(b>a)wb++; });
    if(wa===wb && !(await askConfirm('Set wins are even, so no match winner is recorded in standings. Save anyway?','Save anyway',false))) return;
    const matchId=uid();
    sets.forEach(([a,b,n])=>{
      games.push(mk(a,b,{ matchId, label:(label?label+' · ':'')+'Set '+n }));
    });
    await commit(); closeSheet();
    toast(wa===wb?'Match saved · drawn on sets':`${esc(wa>wb?tA.name:tB.name)} wins the match ${Math.max(wa,wb)}-${Math.min(wa,wb)}`);
  } else {
    const a=num(d.sA), b=num(d.sB);
    if(a===b && !(await askConfirm('Tied score — it shows in standings points but won\u2019t count as a win, loss, or rating change. Save anyway?','Save anyway',false))) return;
    games.push(mk(a,b, label?{label}:{}));
    await commit(); closeSheet();
    toast(a===b?'Tie saved · points counted':`${esc(a>b?tA.name:tB.name)} wins · standings updated`);
  }
  render();
};
window.backToEvent=()=>{
  /* bail out of a live-tracking handoff: nothing was saved, so just clear
     the pending link and the auto-filled selection and reopen the event */
  const p=window._evtPending; window._evtPending=null;
  window._sel={A:new Set(),B:new Set()}; window._fmt=null; window._trackMode='match';
  if(p){ window._evOpen=p.evId; }
  tab='events'; render();
};
window.trackEventGame=()=>{
  const d=evGameCapture(); const ev=evById(d.evId); if(!ev) return;
  const tA=evTeamById(ev,d.a), tB=evTeamById(ev,d.b); if(!tA||!tB) return;
  const usable=ids=>new Set(ids.filter(id=>{ const p=pById(id); return p&&p.active&&!isArchived(p); }));
  const sA=usable(tA.players), sB=usable(tB.players);
  if(!sA.size && !sB.size){ toast('Both teams are guest teams — nobody to track. Log the score instead.'); return; }
  window._sel={A:sA, B:sB};
  window._fmt=(!sA.size||!sB.size)?Math.max(sA.size,sB.size,2):null;
  window._trackMode='match'; window._soloPick=null;
  window._evtPending={evId:ev.id, evA:tA.id, evB:tB.id, ...((d.label||'').trim()?{label:d.label.trim()}:{})};
  closeSheet(); tab='track'; render();
};

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const DEMO_ROSTER = [
  {n:'Alex',t:90,r:['setter','passer']},{n:'Bri',t:80,r:['hitter','blocker']},
  {n:'Cy',t:74,r:['passer','defense']},{n:'Dom',t:68,r:['hitter']},

function demoEvents(p){
  const s=p.seedRating/100, log={}, R=Math.random;
  const add=(k,n)=>{ if(n>0) log[k]=(log[k]||0)+n; };
  add('kill',  R()<s*0.9       ? Math.floor(R()*(1+s*4)) : 0);
  add('ace',   R()<s*0.5       ? Math.floor(R()*(1+s*2)) : 0);
  add('sin',   Math.floor(R()*(2+s*3)));
  add('dig',   R()<0.5+s*0.3   ? Math.floor(R()*(1+s*3)) : 0);
  add('block', R()<s*0.4       ? Math.floor(R()*(s*2))   : 0);
  add('goodPass', R()<0.4+s*0.4? Math.floor(R()*(1+s*3)) : 0);
  add('pget',  R()<0.35+s*0.3  ? Math.floor(R()*(1+s*2)) : 0);
  add('assist', p.roles.setter ? Math.floor(R()*(2+s*4)) : 0);
  add('kerr',  R()<(1-s)*0.6   ? Math.floor(R()*(1+(1-s)*3)) : 0);
  add('serr',  R()<(1-s)*0.5   ? Math.floor(R()*(1+(1-s)*2)) : 0);
  add('perr',  R()<(1-s)*0.6   ? Math.floor(R()*(1+(1-s)*2)) : 0);
  return log;
}
function buildDemo(){
  players = DEMO_ROSTER.map(d=>{ const p=makePlayer(d.n, d.t); d.r.forEach(k=>p.roles[k]=true); return p; });
  games = [];
  const t0 = Date.now() - 50*24*3600*1000;
  let gi=0;
  for(let s=0;s<14;s++){
    const present = shuffle(players).slice(0, 6 + Math.floor(Math.random()*7));
    const nGames = 2 + Math.floor(Math.random()*3);
    for(let k=0;k<nGames;k++){
      const pool = shuffle(present);
      const half = Math.floor(pool.length/2);
      const A = pool.slice(0,half), B = pool.slice(half);
      if(A.length<1||B.length<1) continue;
      const sa=A.reduce((x,p)=>x+p.seedRating,0)/A.length;
      const sb=B.reduce((x,p)=>x+p.seedRating,0)/B.length;
      const aWins = Math.random() < 1/(1+Math.pow(10,(sb-sa)/15));
      const winS=25, loseS=12+Math.floor(Math.random()*11);
      const scoreA=aWins?winS:loseS, scoreB=aWins?loseS:winS;
      const log={}; A.concat(B).forEach(p=>log[p.id]=demoEvents(p));
      games.push({id:uid(),date:t0+gi*3600*1000,teamA:A.map(p=>p.id),teamB:B.map(p=>p.id),scoreA,scoreB,winner:scoreA>scoreB?'A':'B',log});
      gi++;
    }
  }
  for(let i=0;i<3;i++){
    const p=players[Math.floor(Math.random()*players.length)];
    games.push({id:uid(),date:t0+gi*3600*1000,solo:true,teamA:[p.id],teamB:[],scoreA:0,scoreB:0,winner:Math.random()<0.5?'A':'B',log:{[p.id]:demoEvents(p)}});
    gi++;
  }
}

function computeSkillSeed(){
  if(!draft.skills) return draft.seedRating;
  let s=0; SKILL_DEFS.forEach(([k,,w])=> s += (draft.skills[k]/5)*w);
  return Math.round(s);
}

window.savePlayer=async()=>{
  const name=$('#pName').value.trim();
  if(!name){ toast('Enter a name'); return; }
  const notes=$('#pNotes')?$('#pNotes').value:'';
  if(window._seedMode==='skills') draft.seedRating=computeSkillSeed();
  if(editId){
    const p=pById(editId);
    const seedChanged = Number(p.seedRating) !== Number(draft.seedRating);
    if(seedChanged && p.gamesPlayed>0 &&
      !(await askConfirm("Changing this starting level will recalculate this player's full rating history from their new baseline. Continue?", 'Continue'))){
      return;
    }
    p.name=name; p.notes=notes; p.roles=draft.roles; p.skills=draft.skills;
    p.seedRating=draft.seedRating; if(draft.active!==undefined)p.active=draft.active;
  } else {
    const np=makePlayer(name, draft.seedRating);
    np.roles=draft.roles; np.skills=draft.skills; np.notes=notes;
    players.push(np);
  }
  await commit();  // reseat ratings if seed changed
  closeSheet(); toast(editId?'Saved':'Player added'); render();
};
window.deletePlayer=async()=>{
  const p=pById(editId); if(!p) return;
  const historical = playerAppearsInGames(editId);
  const msg = historical
    ? 'Archive this player? They will be hidden from roster, tracking, and teams, but kept for old games and rating history.'
    : 'Delete this player? This cannot be undone.';
  if(!(await askConfirm(msg, historical?'Archive player':'Delete player'))) return;
  clearPlayerRuntimeState(editId);
  if(historical){ p.archived=true; p.active=false; }
  else players=players.filter(p=>p.id!==editId);
  await commit(); closeSheet(); toast(historical?'Archived':'Deleted'); render();
};
