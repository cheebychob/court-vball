<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Court">
<meta name="court-build" content="20260720.1">
<title>Court — Volleyball Ratings</title>
<style>
  :root{
    /* new palette */
    --bg:#070a12;
    --text:#f4f7fc;
    --muted:#a9b4c8;
    --soft:#74819a;
    --faint:#4d5a70;
    --gold:#f2c66d;
    --gold-deep:#d99e37;
    --mint:#5fe3ae;
    --cyan:#74d7ff;
    --coral:#ff7d72;
    --warn:#ffd36d;
    --line:#ffffff1c;
    --line-strong:#ffffff2e;
    --glass:linear-gradient(150deg,#ffffff12,#ffffff07);
    --glass-strong:linear-gradient(150deg,#1a2438ee,#111a2cee);
    --radius:19px;
    --shadow:0 18px 60px #00000073;
    /* legacy aliases — the engine, editor & sheets reference these */
    --surface:#131b2b;
    --surface2:#1b2539;
    --border:#ffffff1f;
    --sand:#f2c66d;
    --good:#5fe3ae;
    --bad:#ff7d72;
    --teamA:#6db4ff;
    --teamB:#ffb36e;
    --tap:#ffffff1e;
    /* responsive product shell */
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
    --space-5:24px; --space-6:32px; --space-7:48px;
    --radius-sm:11px; --radius-md:15px; --radius-lg:20px; --radius-xl:26px;
    --text-xs:11px; --text-sm:13px; --text-md:15px; --text-lg:20px; --text-xl:30px;
    --content-max:1480px; --sidebar-w:260px; --mobile-nav-h:78px;
    --safe-bottom:env(safe-area-inset-bottom); --ease:cubic-bezier(.2,.8,.2,1);
    --fast:140ms; --normal:220ms;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--bg)}
  html,body{margin:0;padding:0;color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{
    min-height:100vh;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 16% -6%, #29507c5c 0, transparent 32rem),
      radial-gradient(circle at 98% 2%, #7c58305c 0, transparent 24rem),
      linear-gradient(172deg,#060810 0%,#0a0f1b 44%,#0e1424 100%);
    padding-bottom:calc(92px + env(safe-area-inset-bottom));
  }
  /* ambient court lines, fading toward the bottom */
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      linear-gradient(90deg, transparent 0 14%, #ffffff08 14% 14.3%, transparent 14.3% 85.7%, #ffffff08 85.7% 86%, transparent 86%),
      linear-gradient(0deg, transparent 0 47.5%, #ffffff07 47.5% 47.8%, transparent 47.8% 52.2%, #ffffff07 52.2% 52.5%, transparent 52.5%);
    mask-image:linear-gradient(to bottom,#000 0,#000 42%,transparent 96%);
    -webkit-mask-image:linear-gradient(to bottom,#000 0,#000 42%,transparent 96%);
    opacity:.5;
  }
  body::after{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:linear-gradient(180deg,transparent 40%,#070a12cc 100%);
  }

  button{font:inherit;color:inherit;cursor:pointer;border:0;background:transparent;padding:0}
  button:disabled{opacity:.45;cursor:not-allowed}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em}

  input,select,textarea{font-family:inherit;font-size:16px;color:var(--text);
    background:#ffffff0d;border:1px solid var(--line);border-radius:14px;
    padding:12px 13px;width:100%;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:0;border-color:transparent}
  ::placeholder{color:var(--faint)}
  textarea{resize:vertical}
  input[type="file"]{padding:10px;font-size:13px;color:var(--muted)}

  /* ---------- top bar & brand ---------- */
  .topbar{position:sticky;top:0;z-index:30;
    padding:calc(12px + env(safe-area-inset-top)) 16px 10px;
    background:linear-gradient(180deg,#070a12f4,#070a12c4 72%,transparent);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
  .topbar-inner{display:flex;align-items:center;gap:12px;max-width:var(--content-max);margin:0 auto}
  .brand-mark{width:38px;height:38px;flex:none;border-radius:13px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#ffffff21,#ffffff06),linear-gradient(145deg,#2a4a70,#1a1f31 58%,#54401f);
    border:1px solid #ffffff26;
    box-shadow:0 0 26px #6db4ff20, inset 0 1px 0 #ffffff2e;}
  .brand-mark::before,.brand-mark::after{content:"";position:absolute;left:50%;top:50%;
    border:1.5px solid #f2c66dcc;border-radius:50%;}
  .brand-mark::before{width:22px;height:22px;margin:-11px 0 0 -11px;transform:rotate(24deg)}
  .brand-mark::after{width:30px;height:11px;margin:-5.5px 0 0 -15px;
    border-left-color:transparent;border-right-color:transparent;transform:rotate(-18deg)}
  .brand-copy{min-width:0}
  .brand-copy h1{margin:0;font-size:17px;line-height:1;font-weight:850;letter-spacing:.1em;text-transform:uppercase}
  .brand-copy span{display:block;margin-top:4px;color:var(--soft);font-size:12px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .night-pill{margin-left:auto;min-height:34px;display:inline-flex;align-items:center;gap:8px;
    padding:7px 11px;border-radius:999px;background:#ffffff0e;border:1px solid var(--line);
    color:var(--muted);font-size:12px;font-weight:650;white-space:nowrap;}
  .pulse{width:8px;height:8px;border-radius:999px;background:var(--mint);box-shadow:0 0 16px var(--mint)}
  .pulse.idle{background:var(--soft);box-shadow:none}

  .more-trigger{width:44px;height:44px;display:grid;place-items:center;border-radius:14px;
    color:var(--muted);background:#ffffff0b;border:1px solid var(--line)}
  .more-trigger svg{width:20px;height:20px}
  .more-trigger.active{color:var(--gold);border-color:#f2c66d4d;background:#f2c66d12}

  main{position:relative;z-index:1;max-width:var(--content-max);margin:0 auto;padding:8px 16px 30px;
    animation:rise .24s ease-out;}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- screen headers ---------- */
  .screen-head{margin:6px 1px 14px}
  .eyebrow{color:var(--gold);font-size:11px;font-weight:850;letter-spacing:.15em;text-transform:uppercase}
  .screen-head h2{margin:7px 0 0;font-size:26px;line-height:1.05;letter-spacing:-.01em}
  .subcopy{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.45;max-width:560px}
  .section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:22px 1px 10px}
  .section-head h3{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:800}
  .section-head span{color:var(--soft);font-size:12px}

  /* ---------- hero (Home) ---------- */
  .hero{position:relative;overflow:hidden;border-radius:26px;padding:18px;
    background:linear-gradient(140deg,#182c48dd 0%,#111a2cde 48%,#2c2412de 100%);
    border:1px solid #ffffff24;
    box-shadow:var(--shadow), inset 0 1px 0 #ffffff22;}
  .hero::before{content:"";position:absolute;inset:11px;border:1px solid #ffffff16;border-radius:18px;
    background:
      linear-gradient(90deg,transparent 0 49%,#ffffff17 49% 49.4%,transparent 49.4%),
      linear-gradient(0deg,transparent 0 50%,#ffffff12 50% 50.5%,transparent 50.5%);
    pointer-events:none;}
  .hero::after{content:"";position:absolute;width:220px;height:220px;right:-88px;top:-92px;border-radius:50%;
    border:1px solid #f2c66d33;box-shadow:0 0 76px #f2c66d24, inset 0 0 46px #ffffff08;}
  .hero-content{position:relative;z-index:1}
  .hero h2{margin:9px 0 6px;font-size:27px;line-height:1.05;letter-spacing:-.01em}
  .hero .subcopy{margin:0}
  .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:15px}
  .mini-stat{min-width:0;padding:11px 10px;border-radius:15px;background:#ffffff10;border:1px solid #ffffff19;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
  .mini-stat b{display:block;font-size:19px;line-height:1}
  .mini-stat span{display:block;margin-top:5px;color:var(--muted);font-size:11px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---------- cards ---------- */
  .card{position:relative;border-radius:var(--radius);background:var(--glass);
    border:1px solid var(--line);box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;
    padding:14px;margin-bottom:11px;}
  .card.flat{box-shadow:none}
  .grid{display:grid;gap:11px}
  .grid.two{grid-template-columns:1fr}

  .pressable{transition:transform .12s ease,border-color .16s ease,background-color .16s ease}
  .pressable:active{transform:scale(.976)}
  @media (hover:hover){ .pressable:hover{border-color:var(--line-strong)} }

  /* ---------- quick action tiles ---------- */
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .action-tile{min-height:88px;display:flex;flex-direction:column;align-items:flex-start;
    justify-content:space-between;gap:10px;padding:13px;border-radius:var(--radius);text-align:left;
    background:var(--glass);border:1px solid var(--line);
    box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;}
  .action-tile b{font-size:15px}
  .action-tile span{color:var(--soft);font-size:12px;line-height:1.3}
  .tile-icon{width:32px;height:32px;border-radius:12px;display:grid;place-items:center;color:#0a1220;
    background:var(--gold);box-shadow:0 0 20px #f2c66d40;}
  .tile-icon svg{width:17px;height:17px}
  .t-cyan .tile-icon{background:var(--cyan);box-shadow:0 0 20px #74d7ff40}
  .t-mint .tile-icon{background:var(--mint);box-shadow:0 0 20px #5fe3ae40}
  .t-coral .tile-icon{background:var(--coral);box-shadow:0 0 20px #ff7d7240}

  /* ---------- buttons (legacy .btn, restyled) ---------- */
  .btn{min-height:46px;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 15px;border-radius:15px;border:1px solid #ffffff22;background:#ffffff10;
    color:var(--text);font-weight:750;font-size:14px;
    transition:transform .1s ease,background .16s ease,border-color .16s ease;}
  .btn:active{transform:scale(.97)}
  .btn svg{width:17px;height:17px}
  .btn.primary{background:linear-gradient(135deg,#f5d47b,var(--gold-deep));color:#191106;
    border-color:#f6d98c5f;box-shadow:0 10px 30px #d99e3740;}
  .btn.ghost{background:#ffffff08;color:var(--muted);border-color:#ffffff17}
  .btn.ghost.on{color:var(--gold);border-color:#f2c66d55;background:#f2c66d14}
  .btn.danger{color:var(--coral);border-color:#ff7d7238;background:#ff7d7210}
  .btn.block{width:100%}
  .btn.sm{min-height:35px;padding:7px 11px;font-size:12.5px;border-radius:11px}

  /* ---------- pills / status ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;min-height:24px;padding:4px 9px;border-radius:999px;
    font-size:11px;font-weight:700;background:#ffffff0c;border:1px solid var(--line);color:var(--muted);
    white-space:nowrap;}
  .pill.solo{color:var(--cyan);border-color:#74d7ff42;background:#74d7ff12}
  .pill.partial{color:var(--gold);border-color:#f2c66d42;background:#f2c66d12}
  .pill.good{color:var(--mint);border-color:#5fe3ae42;background:#5fe3ae12}
  .pill.bad{color:var(--coral);border-color:#ff7d7242;background:#ff7d7212}
  .pill.warn{color:var(--warn);border-color:#ffd36d42;background:#ffd36d12}

  .row{display:flex;align-items:center;gap:10px}
  .spread{justify-content:space-between}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .soft{color:var(--soft)}
  .small{font-size:12.5px} .tiny{font-size:11px}

  .rate{font-weight:850;font-size:22px;line-height:1;color:var(--gold)}
  .rate.big{font-size:34px}
  .bar{display:block;height:7px;border-radius:5px;background:#ffffff10;overflow:hidden;margin-top:10px;border:1px solid #ffffff0f}
  .bar > i{display:block;height:100%;border-radius:inherit;
    background:linear-gradient(90deg,#7a6027,var(--gold));box-shadow:0 0 16px #f2c66d55;}
  .meter{height:10px;border-radius:999px;background:#ffffff10;overflow:hidden;border:1px solid #ffffff12}
  .meter i{display:block;height:100%;border-radius:inherit;
    background:linear-gradient(90deg,var(--coral),var(--gold),var(--mint));box-shadow:0 0 20px #5fe3ae55}

  .avatar{width:40px;height:40px;flex:none;display:grid;place-items:center;border-radius:14px;
    background:linear-gradient(150deg,#274563,#151c2e);border:1px solid #ffffff22;
    color:var(--text);font-weight:850;font-size:14px;box-shadow:inset 0 1px 0 #ffffff1c;position:relative;overflow:hidden;}
  .avatar.sm{width:34px;height:34px;border-radius:12px;font-size:12px}
  .avatar.lg{width:72px;height:72px;border-radius:22px;font-size:20px}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .avatar img[hidden]{display:none}
  .avatar.photo-unavailable{border-style:dashed}
  .avatar .off-dot{position:absolute;right:-3px;top:-3px;width:11px;height:11px;border-radius:999px;
    background:var(--soft);border:2px solid var(--bg);z-index:2}
  .photo-editor{display:grid;grid-template-columns:auto minmax(0,1fr);gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:16px;background:#ffffff07}
  .photo-editor-actions{min-width:0}.photo-editor-actions .row{flex-wrap:wrap;gap:7px}
  .photo-unavailable-note{display:block;margin-top:5px;color:var(--soft);font-size:10.5px}
  .photo-public-line{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line)}
  .photo-public-copy{min-width:0}.photo-public-copy b{display:block;font-size:12.5px}.photo-public-copy span{display:block;margin-top:4px;color:var(--soft);font-size:10.5px;line-height:1.4}
  .photo-crop-wrap{width:min(100%,512px);margin:0 auto;touch-action:none;overflow:hidden;border-radius:18px;border:1px solid var(--line);background:#05070d}
  .photo-crop-wrap canvas{display:block;width:100%;height:auto;aspect-ratio:1}
  .photo-crop-controls{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:center;margin:14px 0}
  .photo-crop-controls input{min-width:0;padding:8px 0}
  .profile-photo-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}.profile-photo-head>div:last-child{min-width:0}.profile-photo-head b{display:block;font-size:18px}.profile-photo-head span{display:block;margin-top:3px;color:var(--soft);font-size:11px}

  /* ---------- segmented controls ---------- */
  .seg{display:flex;gap:7px;flex-wrap:wrap}
  .seg button{flex:1;min-height:42px;min-width:52px;padding:9px 8px;border-radius:13px;
    background:#ffffff0b;border:1px solid #ffffff17;color:var(--muted);font-weight:750;font-size:13.5px;
    transition:transform .1s ease,background .16s ease,border-color .16s ease,color .16s ease;}
  .seg button:active{transform:scale(.96)}
  .seg button.on{color:var(--gold);background:#f2c66d16;border-color:#f2c66d55;
    box-shadow:0 0 0 1px #f2c66d22, 0 8px 26px #f2c66d14;}
  .custom-num{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:end;margin-top:9px}
  .custom-num label{display:block;font-size:11px;color:var(--faint);font-weight:750;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
  .custom-num input{min-height:42px;padding:9px 11px;border-radius:13px}
  .custom-num .btn{min-height:42px;border-radius:13px;padding:9px 12px}

  /* ---------- chips (player pool / selection) ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;min-height:38px;padding:8px 12px;border-radius:999px;
    background:#ffffff0a;border:1px solid #ffffff19;color:var(--muted);font-weight:700;font-size:12.5px;
    transition:transform .1s ease,background .16s ease,border-color .16s ease,color .16s ease;}
  .chip:active{transform:scale(.95)}
  .chip .r{color:var(--soft);font-weight:800;font-size:11.5px}
  .chip.on{background:#5fe3ae16;border-color:#5fe3ae5c;color:var(--mint)}
  .chip.on .r{color:inherit;opacity:.85}

  /* ---------- player cards ---------- */
  .player-list{display:grid;gap:10px;margin-top:12px}
  .player-card{width:100%;text-align:left;padding:13px;border-radius:var(--radius);
    background:var(--glass);border:1px solid var(--line);
    box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;}
  .player-card.inactive{opacity:.62}
  .player-top{display:flex;align-items:flex-start;gap:11px}
  .player-meta{min-width:0;flex:1}
  .player-meta > b{display:block;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-sub{display:block;margin-top:4px;color:var(--muted);font-size:12px}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .rating-badge{text-align:right;flex:none}
  .rating-badge > b{display:block;font-size:25px;line-height:.95;font-weight:850;color:var(--gold)}
  .rating-badge .spark{display:block;margin-left:auto;margin-top:7px}
  .delta{display:inline-block;margin-top:5px;font-size:11px;font-weight:850}
  .delta.up{color:var(--mint)} .delta.down{color:var(--coral)}
  .spark{opacity:.95}

  .mover{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:14px;
    background:#ffffff08;border:1px solid #ffffff12;margin-top:8px}
  .mover .who{min-width:0;flex:1}
  .mover .who b{display:block;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mover .who span{display:block;margin-top:2px;color:var(--soft);font-size:11.5px}
  .delta-up{color:var(--mint);font-weight:850} .delta-down{color:var(--coral);font-weight:850}

  .empty{text-align:center;color:var(--soft);padding:44px 18px;font-size:14px;line-height:1.5}
  .empty b{display:block;color:var(--text);font-size:16px;margin-bottom:7px}

  /* ---------- dense data controls ---------- */
  .page-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 12px}
  .search-wrap{position:relative;min-width:0;flex:1 1 220px}
  .search-wrap input{min-height:46px;padding-left:40px;background:#0f1727;border-color:#ffffff18}
  .search-wrap svg{position:absolute;left:13px;top:50%;width:17px;height:17px;transform:translateY(-50%);color:var(--soft);pointer-events:none}
  .filter-row{display:flex;gap:6px;overflow-x:auto;padding:1px 1px 4px;scrollbar-width:none}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-row button{min-height:40px;padding:8px 12px;border-radius:12px;white-space:nowrap;
    color:var(--muted);background:#ffffff08;border:1px solid #ffffff14;font-size:12px;font-weight:750}
  .filter-row button.on{color:var(--gold);background:#f2c66d13;border-color:#f2c66d4a}
  .toolbar-meta{font-size:12px;color:var(--soft);margin-left:auto;white-space:nowrap}
  [hidden]{display:none!important}

  /* ---------- structured team selection ---------- */
  .track-setup-grid{display:grid;gap:10px;margin-bottom:11px}
  .selection-panel{min-width:0;padding:13px;border-radius:var(--radius-lg);background:#ffffff08;border:1px solid var(--line)}
  .selection-panel.A{border-color:#6db4ff38}.selection-panel.B{border-color:#ffb36e38}
  .selection-panel.available{background:#0d1524}
  .selection-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .selection-head b{font-size:12px;text-transform:uppercase;letter-spacing:.1em}
  .selection-panel.A .selection-head b{color:var(--teamA)}.selection-panel.B .selection-head b{color:var(--teamB)}
  .selection-list{display:grid;gap:6px;max-height:400px;overflow:auto;overscroll-behavior:contain}
  .selection-player{width:100%;min-height:42px;display:flex;align-items:center;gap:8px;text-align:left;padding:8px 9px;
    border-radius:12px;background:#ffffff08;border:1px solid #ffffff12;font-size:12.5px;font-weight:700}
  .selection-player span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .selection-player i{margin-left:auto;color:var(--soft);font-style:normal;font-size:11px}
  .available-list .chip{width:100%;border-radius:12px;justify-content:flex-start;text-align:left}
  .available-list .chip .r{margin-left:auto}
  .selection-empty{padding:14px 8px;color:var(--soft);font-size:12px;text-align:center}
  .setup-actions,.live-finish{position:sticky;z-index:24;bottom:calc(var(--mobile-nav-h) + var(--safe-bottom) + 8px);
    padding:8px;border-radius:19px;background:#090f1ae8;border:1px solid #ffffff20;box-shadow:0 14px 40px #0009;
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}

  /* ---------- live match workspace ---------- */
  .live-score{position:sticky;top:calc(72px + env(safe-area-inset-top));z-index:22}
  .live-workspace{display:grid;gap:11px}

  .perf::after{content:" perf";font-size:9px;font-weight:650;color:var(--soft);display:block;letter-spacing:.03em}

  /* ---------- event command center ---------- */
  :root{--event-sticky-offset:126px}
  .event-subnav{position:sticky;top:calc(66px + env(safe-area-inset-top));z-index:20;display:flex;gap:6px;
    overflow-x:auto;margin:0 -4px 12px;padding:6px 4px;background:linear-gradient(180deg,#090e19f8,#090e19dc 75%,transparent);scrollbar-width:none}
  .event-subnav::-webkit-scrollbar{display:none}
  .event-subnav button{min-height:40px;padding:8px 12px;border-radius:12px;white-space:nowrap;color:var(--muted);
    background:#121b2b;border:1px solid #ffffff16;font-size:12px;font-weight:750}
  .event-subnav button:focus-visible{color:var(--gold);border-color:#f2c66d55}
  [id^="event-"]{scroll-margin-top:calc(var(--event-sticky-offset) + env(safe-area-inset-top))}
  .selector-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:7px 2px 0}
  .selector-clear{border:0;background:none;color:var(--gold);font-size:12px;padding:4px 2px}
  .entry-table{overflow-x:auto}.entry-table .stand-row{min-width:570px;grid-template-columns:34px minmax(145px,1fr) 48px 70px 64px 76px 72px}
  .rotation-match{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:start;gap:10px;margin-top:8px}.rotation-match>div:last-child{text-align:right}.versus{align-self:center;color:var(--faint);font-size:11px}.rotation-side{display:grid;gap:6px;margin-top:5px}.rotation-side>div,.rotation-side>button{display:block;width:100%;text-align:inherit;padding:7px;border-radius:10px;background:#ffffff08;border:1px solid #ffffff10;color:inherit;font:inherit}.rotation-side>button:active{background:var(--tap);border-color:#f2c66d44}.rotation-side b,.rotation-side span{display:block;overflow-wrap:anywhere}.rotation-side span{margin-top:2px;color:var(--soft);font-size:10px;font-weight:500}
  .name-link{color:var(--text);font:inherit;font-weight:700;padding:2px 0;text-align:inherit}
  .name-link:active{color:var(--gold)}
  @media(max-width:420px){.rotation-match{grid-template-columns:1fr}.rotation-match>div:last-child{text-align:left}.rotation-match .versus{text-align:center}}
  main.event-detail{overflow-x:clip}
  main.event-detail::after{content:"";display:block;height:calc(100vh - var(--event-sticky-offset) + var(--mobile-nav-h))}
  @media(min-width:900px){:root{--event-sticky-offset:118px}}
  .event-overview{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
  .event-metric{padding:11px;border-radius:15px;background:#ffffff09;border:1px solid #ffffff14}
  .event-metric b{display:block;font-size:19px}.event-metric span{display:block;margin-top:4px;color:var(--soft);font-size:10.5px}

  .settings-section{scroll-margin-top:90px}
  .danger-zone{border-color:#ff7d7242;background:#ff7d7209}

  /* ---------- track: mode selector ---------- */
  .mode-row{display:grid;grid-template-columns:1fr;gap:9px;margin:2px 0 14px}
  .mode-btn{text-align:left;min-height:64px;display:flex;align-items:center;gap:12px;padding:12px;
    border-radius:18px;background:#ffffff0a;border:1px solid #ffffff16;}
  .mode-btn.active{background:linear-gradient(150deg,#1e334d,#141d31);border-color:#74d7ff5c;
    box-shadow:0 0 0 1px #74d7ff20, 0 12px 36px #74d7ff14;}
  .mode-icon{width:40px;height:40px;flex:none;border-radius:14px;display:grid;place-items:center;
    background:#ffffff0f;border:1px solid #ffffff1c;color:var(--cyan);}
  .mode-icon svg{width:19px;height:19px}
  .mode-copy{min-width:0}
  .mode-copy b{display:block;font-size:14px}
  .mode-copy span{display:block;margin-top:3px;color:var(--soft);font-size:12px;line-height:1.3}

  /* ---------- track: live score ---------- */
  .score-card{padding:13px;border-radius:23px;background:var(--glass-strong);
    border:1px solid #ffffff20;box-shadow:var(--shadow), inset 0 1px 0 #ffffff1c;margin-bottom:11px;}
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .score-box{padding:12px 10px;border-radius:18px;background:#ffffff0b;border:1px solid #ffffff16;text-align:center}
  .score-box.A{border-color:#6db4ff4d} .score-box.B{border-color:#ffb36e4d}
  .score-lbl{font-size:11px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}
  .score-box.A .score-lbl{color:var(--teamA)} .score-box.B .score-lbl{color:var(--teamB)}
  .score-num{font-size:46px;line-height:.95;font-weight:900;margin:8px 0 10px}
  .score-steps{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .score-steps button{min-height:44px;border-radius:14px;background:#ffffff10;border:1px solid #ffffff1c;
    font-size:22px;font-weight:850;transition:transform .1s ease,background .14s ease;}
  .score-steps button:active{transform:scale(.94);background:var(--tap)}
  .prob-line{text-align:center;color:var(--faint);font-size:11.5px;margin:9px 2px 0}

  .strip{display:flex;align-items:center;gap:8px;margin:0 0 12px}
  .strip .btn.sm{flex:none}

  .teamhdr{font-size:11px;letter-spacing:.13em;text-transform:uppercase;font-weight:850;margin:15px 1px 8px}
  .teamhdr.A{color:var(--teamA)} .teamhdr.B{color:var(--teamB)}
  .unktag{color:var(--faint);font-weight:600;text-transform:none;letter-spacing:0;font-size:11px}
  .unkline{color:var(--soft);font-size:12px;line-height:1.45;padding:10px 12px;border-radius:14px;
    background:#ffffff07;border:1px dashed #ffffff1f;margin-bottom:10px}

  /* ---------- tracked player card ---------- */
  .tcard{padding:12px;border-radius:18px;background:var(--glass);border:1px solid var(--line);
    box-shadow:0 8px 26px #00000024, inset 0 1px 0 #ffffff15;margin-bottom:9px}
  .thead{display:flex;align-items:center;gap:10px}
  .tname{min-width:0;flex:1}
  .tname b{display:block;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tname span{display:block;margin-top:2px;color:var(--soft);font-size:11.5px}
  .perf{flex:none;min-width:44px;text-align:right;font-weight:900;font-size:19px;color:var(--faint)}
  .perf.good{color:var(--mint)} .perf.bad{color:var(--coral)}

  .ev{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .evchip{flex:1 1 118px;min-width:118px;min-height:48px;position:relative;border-radius:12px;
    background:#ffffff0c;border:1px solid #ffffff17;color:var(--muted);overflow:visible}
  .evadd{width:100%;min-height:48px;padding:9px 44px;border-radius:11px;color:inherit;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;
    position:relative;transition:transform .1s ease,background .12s ease}
  .evadd:active{transform:scale(.96);background:var(--tap)}
  .evadd:focus-visible,.evminus:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .evchip.g{color:var(--mint);border-color:#5fe3ae2c}
  .evchip.b{color:var(--coral);border-color:#ff7d722c}
  .evlabel{min-width:0;white-space:nowrap}
  .ev .cnt{position:absolute;right:9px;top:50%;transform:translateY(-50%);min-width:28px;height:28px;
    padding:0 7px;border-radius:999px;display:grid;place-items:center;background:var(--text);color:var(--bg);
    box-shadow:0 0 0 1px #ffffff2e;font-size:15px;line-height:1;font-weight:950;font-variant-numeric:tabular-nums}
  .evminus{position:absolute;z-index:2;left:0;top:50%;transform:translateY(-50%);width:44px;height:44px;
    display:grid;place-items:center;color:var(--text);transition:opacity .12s ease,transform .1s ease}
  .evminus::before{content:"";position:absolute;width:27px;height:27px;border-radius:9px;
    background:#ffffff12;border:1px solid #ffffff29}
  .evminus span{position:relative;font-size:20px;line-height:1;font-weight:900}
  .evminus:active{transform:translateY(-50%) scale(.9)}
  @media(hover:hover) and (pointer:fine){
    .evminus{opacity:.62}
    .evchip:hover .evminus,.evminus:focus-visible{opacity:1}
  }
  .evrow{display:flex;align-items:center;gap:9px;margin-top:8px}
  .evrow .evlbl{flex:0 0 50px;font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-weight:800}
  .evrow .ev{flex:1;margin-top:0}
  .attempts-help{margin:6px 2px 0 59px;color:var(--faint);font-size:10.5px;line-height:1.35}
  .expand{display:inline-block;font-size:12px;color:var(--soft);margin-top:9px;padding:4px 2px;font-weight:650}

  @media(max-width:520px){
    .attempts-help{margin-left:2px}
  }

  /* ---------- teams ---------- */
  .team-results{display:grid;gap:11px;margin-top:4px}
  .team-card{padding:13px;border-radius:20px;background:var(--glass);border:1px solid var(--line);
    box-shadow:0 10px 34px #00000029, inset 0 1px 0 #ffffff17;}
  .team-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
  .team-title b{display:block;font-size:16px}
  .team-title span{display:block;margin-top:3px;color:var(--soft);font-size:12px}
  .team-avg{text-align:right;color:var(--gold);font-weight:900;font-size:23px;line-height:1}
  .team-avg span{display:block;margin-top:4px;color:var(--soft);font-size:10.5px;font-weight:650}
  .member{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:13px;
    background:#00000021;border:1px solid #ffffff0e;margin-top:7px}
  .member .nm{min-width:0;flex:1;font-size:13px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .member .mrate{color:var(--muted);font-weight:850;font-size:12px}
  .mv{flex:none;min-height:30px;padding:5px 9px;border-radius:9px;font-size:11px;font-weight:750;
    color:var(--cyan);background:#74d7ff12;border:1px solid #74d7ff33;}
  .warning-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .match-action{margin-top:11px;width:100%;min-height:46px;border-radius:14px;background:#74d7ff14;
    border:1px solid #74d7ff42;color:var(--cyan);font-weight:850;font-size:14px;
    transition:transform .1s ease;}
  .match-action:active{transform:scale(.97)}

  /* ---------- games history ---------- */
  .history-row{display:flex;gap:11px;align-items:center;width:100%;text-align:left;padding:12px;
    border-radius:18px;background:var(--glass);border:1px solid var(--line);margin-bottom:9px;
    box-shadow:0 8px 26px #00000022, inset 0 1px 0 #ffffff14;}
  .history-line{min-width:0;flex:1}
  .history-line .ln{display:block;font-size:13.5px;font-weight:650;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.45}
  .history-line .ln.win{color:var(--text);font-weight:750}
  .history-line .tags{margin-top:7px}
  .result-block{flex:none;text-align:right;min-width:64px}
  .result-block b{display:block;font-size:17px;font-weight:850}
  .result-block span{display:block;margin-top:4px;color:var(--faint);font-size:11px}

  /* ---------- more / settings ---------- */
  .toggle-line{display:flex;align-items:center;gap:12px}

  .explain-grid{display:grid;gap:10px}
  .explain-card{padding:12px;border-radius:16px;background:#ffffff08;border:1px solid #ffffff13}
  .explain-card b{display:block;font-size:13.5px;margin-bottom:5px}
  .explain-card p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.5}

  /* ---------- legacy editor / sheet internals ---------- */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:750;margin-bottom:7px;
    letter-spacing:.03em}
  .tiergrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .opt{padding:11px 10px;border-radius:14px;background:#ffffff0a;border:1px solid #ffffff17;
    font-weight:750;font-size:13.5px;text-align:left;color:var(--text);

    font-weight:800;font-size:13px;color:var(--faint);
    transition:background .12s ease,color .12s ease,border-color .12s ease;}
  .stars button.on{background:#f2c66d18;border-color:#f2c66d5c;color:var(--gold)}

  .stat-title{font-size:12px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);
    font-weight:800;margin-bottom:9px}
  .stat-card .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat-group{padding:10px;border-radius:13px;background:#00000022;border:1px solid #ffffff0d}
  .stat-group-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);
    font-weight:800;margin-bottom:6px}
  .stat-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 0}
  .stat-name{font-size:12px;color:var(--muted)}
  .stat-count{font-size:13px;font-weight:850}
  .stat-row.err .stat-name{color:#e0938c} .stat-row.err .stat-count{color:var(--coral)}
  .stat-empty{color:var(--faint);font-size:12.5px}

  /* ---------- sheets / modals ---------- */

    background:#000000a1;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding-top:56px;}
  .sheet{width:100%;max-width:620px;max-height:88vh;overflow:auto;overscroll-behavior:contain;
    border-radius:26px 26px 0 0;background:linear-gradient(150deg,#182236,#0f1626);
    border:1px solid #ffffff24;border-bottom:0;
    box-shadow:0 -18px 64px #000000a0, inset 0 1px 0 #ffffff1e;
    padding:10px 16px calc(20px + env(safe-area-inset-bottom));

    display:grid;place-items:center;border-radius:14px;background:#1b2639;border:1px solid #ffffff20;color:var(--muted);font-size:21px}

  /* Participant-facing schedule preview. The exported HTML document uses the
     same hierarchy, so the in-app review matches the one-file artifact. */
  .schedule-actions{display:grid;gap:8px;margin-top:10px}
  .schedule-settings-actions{margin-top:16px;padding-top:15px;border-top:1px solid #ffffff20}

  .download-options{width:min(100%,440px);padding:16px;border:1px solid #ffffff2a;border-radius:20px;background:linear-gradient(150deg,#1b263b,#101827);box-shadow:0 20px 70px #000c}
  .download-options h4{margin:0 0 5px;font-size:18px}.download-options p{margin:0 0 13px;color:var(--muted);font-size:12px;line-height:1.45}
  .download-options-actions{display:grid;gap:8px}
  .fairness-panel{margin-top:10px;padding:12px;border:1px solid #f2c66d45;border-radius:14px;background:#f2c66d0b}
  .fairness-panel.good{border-color:#5fe3ae42;background:#5fe3ae0a}
  .fairness-options{display:grid;gap:8px;margin-top:10px}

  .fairness-option input{flex:none;margin-top:3px;accent-color:var(--gold)}
  .fairness-option-copy{display:block;min-width:0}.fairness-option-copy>b{display:block;font-size:13px}.fairness-option-copy>span{display:block;margin-top:3px;color:var(--muted);font-size:11px;line-height:1.42}
  .fairness-math{margin-top:8px;color:var(--faint);font-size:11px;line-height:1.45}
  .makeup-label{display:inline-flex;align-items:center;padding:3px 7px;border-radius:999px;background:#f2c66d18;border:1px solid #f2c66d45;color:var(--gold);font-size:9px;font-weight:850;letter-spacing:.05em;text-transform:uppercase}
  .schedule-warning{margin-top:8px;padding:9px 10px;border-radius:11px;border:1px solid #ff8d7a55;background:#ff8d7a0d;color:#ffc1b7;font-size:11px;line-height:1.45}
  .schedule-preview{clear:both;color:#172033;background:#f7f9fd;border-radius:18px;padding:18px 14px;margin-top:4px}
  .schedule-preview-head{padding-bottom:14px;border-bottom:2px solid #dce3ef}
  .schedule-preview-kicker{font-size:10px;font-weight:850;letter-spacing:.14em;text-transform:uppercase;color:#9a6c16}
  .schedule-preview h1{font-size:24px;line-height:1.08;margin:6px 0 8px;color:#111827;overflow-wrap:anywhere}
  .schedule-preview-meta{display:flex;flex-wrap:wrap;gap:6px 12px;font-size:11px;color:#536078;font-weight:650}
  .schedule-timing-note{margin:8px 0 0;color:#66738a;font-size:10.5px;line-height:1.4}
  .schedule-round{margin-top:16px}
  .schedule-round-lead{break-after:avoid}
  .schedule-round-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding-bottom:6px;border-bottom:2px solid #24324b}
  .schedule-round-head b{font-size:15px;color:#152039}.schedule-round-head span{font-size:11px;color:#66738a;white-space:nowrap}
  .schedule-byes{margin-top:8px;padding:8px 10px;border-radius:10px;background:#fff4d8;color:#674a13;font-size:11px;line-height:1.4;overflow-wrap:anywhere}
  .schedule-match-list{display:grid;gap:8px;margin-top:8px}
  .schedule-match{margin-top:8px;padding:11px;border:1px solid #dce3ef;border-radius:12px;background:#fff;box-shadow:0 3px 12px #3341550b;break-inside:avoid}
  .schedule-match-list .schedule-match{margin-top:0}
  .schedule-match-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#68758c}
  .schedule-match-top .final{color:#187653}.schedule-match-top .pending{color:#8a6419}
  .schedule-fixed-sides{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:8px;color:#172033;font-size:13px;font-weight:800}
  .schedule-fixed-sides span{min-width:0;overflow-wrap:anywhere}.schedule-fixed-sides span:last-child{text-align:right}
  .schedule-vs{color:#9a6c16;font-size:10px;font-weight:900;letter-spacing:.08em}
  .schedule-rotation-sides{display:grid;gap:9px}
  .schedule-side{min-width:0;padding:9px;border-radius:10px;background:#f5f7fb}
  .schedule-side>strong{display:block;color:#526079;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}

/* ============================================================
   STORAGE  — persists across sessions via window.storage,
   with an in-memory fallback so it never hard-fails.
   ============================================================ */
const Store = (()=>{
  const mem = {};
  // Detect localStorage (works in a real browser / home-screen app)
  let lsOK = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); lsOK = true; }
  catch(e){ lsOK = false; }
  // Detect Claude's cloud storage (works inside the Claude app artifact)
  const wsOK = (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');

  async function get(k){
    if(lsOK){ try{ const v = localStorage.getItem(k); if(v!=null) return v; }catch(e){} }
    if(wsOK){ try{ const r = await window.storage.get(k); if(r && r.value!=null) return r.value; }catch(e){} }
    return mem[k] ?? null;
  }
  async function set(k,v){
    mem[k]=v;
    let saved=false;
    if(lsOK){ try{ localStorage.setItem(k,v); saved=true; }catch(e){} }
    if(wsOK){ try{ await window.storage.set(k,v,false); saved=true; }catch(e){} }
    return saved;
  }
  return { get, set, mode: lsOK?'device':(wsOK?'cloud':'memory') };
})();

const DEFAULT_SETTINGS = {

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function hash32(value){
  let h=2166136261;
  for(const ch of String(value)){ h^=ch.charCodeAt(0); h=Math.imul(h,16777619); }
  return h>>>0;
}
function seededRng(seed){
  let a=hash32(seed)||0x9e3779b9;
  return ()=>{ a=(a+0x6d2b79f5)>>>0;let t=a;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return ((t^(t>>>14))>>>0)/4294967296; };
}
function seededShuffle(list,seed){
  const out=list.slice(),rng=typeof seed==='function'?seed:seededRng(seed);
  for(let i=out.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  return out;
}
function newScheduleSeed(){
  try{const a=new Uint32Array(2);crypto.getRandomValues(a);return a[0].toString(36)+a[1].toString(36);}catch(_){return hash32(Date.now()+':'+performance.now()+':'+navigator.userAgent).toString(36);}
}
function scheduleState(value,fallback){return {seed:String(value?.seed||fallback),revision:Math.max(1,positiveInt(value?.revision,1))};}
function localDateString(value=Date.now()){
  const d=value instanceof Date?value:new Date(value);
  if(!Number.isFinite(d.getTime()))return null;
  const pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function todayLocalDate(now=Date.now()){return localDateString(now);}
function localDateParts(value){
  const match=typeof value==='string'&&value.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(!match)return null;
  const year=Number(match[1]),month=Number(match[2]),day=Number(match[3]);if(year<1000||month<1||month>12||day<1||day>31)return null;
  const d=new Date(year,month-1,day,12,0,0,0);
  return d.getFullYear()===year&&d.getMonth()===month-1&&d.getDate()===day?{year,month,day}:null;
}
function normalizeEventDate(value,fallback=null){
  if(localDateParts(value))return value;
  return localDateParts(fallback)?fallback:null;
}
function localDateFromTimestamp(value){
  if(value==null||value==='')return null;
  const n=Number(value);return Number.isFinite(n)?localDateString(n):null;
}
function eventLocalDate(ev){
  return normalizeEventDate(ev?.eventDate)||localDateFromTimestamp(ev?.created)||todayLocalDate();
}
function localTimeParts(value){
  const match=typeof value==='string'&&value.match(/^([01]\d|2[0-3]):([0-5]\d)$/);
  return match?{hour:Number(match[1]),minute:Number(match[2])}:null;
}
function combineLocalDateTime(eventDate,startTime,minuteOffset=0){
  const date=localDateParts(eventDate),time=localTimeParts(startTime),offset=Number(minuteOffset);
  if(!date||!time||!Number.isFinite(offset))return null;
  return new Date(date.year,date.month-1,date.day,time.hour,time.minute+offset,0,0).getTime();
}
function addLocalMinutes(timestamp,minutes){
  const d=new Date(timestamp),offset=Number(minutes);if(!Number.isFinite(d.getTime())||!Number.isFinite(offset))return null;
  return new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours(),d.getMinutes()+offset,0,0).getTime();
}
function eventScheduleTimestamp(ev,startTime,minuteOffset=0){
  return combineLocalDateTime(eventLocalDate(ev),startTime,minuteOffset);
}
function formatEventDate(value,options={month:'long',day:'numeric',year:'numeric'}){
  const parts=localDateParts(value);if(!parts)return null;
  return new Date(parts.year,parts.month-1,parts.day,12,0,0,0).toLocaleDateString([],options);
}
function zeroEvents(){ const o={}; EVENTS.forEach(e=>o[e.k]=0); return o; }
function makePlayer(name, seed){
  return { id:uid(), name:name.trim(), seedRating:seed,

const PLAYER_PHOTO_TOKEN_PATTERN=/^[A-Za-z0-9_-]{43}$/;
const PLAYER_PHOTO_REVISION_PATTERN=/^[A-Za-z0-9._~-]{1,128}$/;
const PLAYER_PHOTO_TYPES=new Set(['image/webp','image/jpeg']);
const PLAYER_PHOTO_MAX_BYTES=750*1024;
function normalizePlayerPhoto(value){
  if(!value||typeof value!=='object'||Array.isArray(value))return null;
  const token=typeof value.token==='string'?value.token:'',revision=typeof value.revision==='string'?value.revision:'',contentType=value.contentType;
  const width=Number(value.width),height=Number(value.height),bytes=Number(value.bytes),updatedAt=Number(value.updatedAt);
  if(!PLAYER_PHOTO_TOKEN_PATTERN.test(token)||!PLAYER_PHOTO_REVISION_PATTERN.test(revision)||!PLAYER_PHOTO_TYPES.has(contentType)
    ||!Number.isInteger(width)||width<1||width>1024||!Number.isInteger(height)||height<1||height>1024
    ||!Number.isInteger(bytes)||bytes<1||bytes>PLAYER_PHOTO_MAX_BYTES||typeof value.public!=='boolean'
    ||!Number.isInteger(updatedAt)||updatedAt<1)return null;
  return {token,revision,contentType,width,height,bytes,public:value.public,updatedAt};
}
function publicPlayerPhoto(player){
  const photo=normalizePlayerPhoto(player?.photo);
  return photo?.public?{name:String(player.name||'Player'),url:`/media/player-photos/${encodeURIComponent(photo.token)}?v=${encodeURIComponent(photo.revision)}`} : null;
}

/* ============================================================
   LOAD / SAVE
   ============================================================ */
async function load(){
  const p = await Store.get('vb:players'); if(p) players = JSON.parse(p);
  const g = await Store.get('vb:games');   if(g) games = JSON.parse(g);
  const s = await Store.get('vb:settings');if(s) settings = {...DEFAULT_SETTINGS, ...JSON.parse(s)};
  const e = await Store.get('vb:events');  if(e) evts = JSON.parse(e);
  migrateEvents();
  // migrate any missing fields
  migratePlayers();
}
function migrateEvents(){
  evts.forEach(ev=>{
    ev.eventDate=normalizeEventDate(ev.eventDate)||localDateFromTimestamp(ev.created)||todayLocalDate();
    if(ev.schedulePublications!=null&&(typeof ev.schedulePublications!=='object'||Array.isArray(ev.schedulePublications)))delete ev.schedulePublications;
    if(ev.rules!=null&&rulesModelSupported(ev.rules))ev.rules=normalizeRulesModel(ev.rules);
    if(ev.bracket){ ev.brackets=[{id:uid(), name:'Playoffs', created:ev.bracket.created, seeds:ev.bracket.seeds}]; delete ev.bracket; }
    if(!ev.brackets) ev.brackets=[];
    if(eventFormat(ev)==='rotatingGroups'){

function qualifyingGameLabel(n){ return `${n} game${n===1?'':'s'}`; }

  }

    if(a&&a.weakness) notes.push(`Watch: ${a.weakness}`);

/* ============================================================

const CARD_AXES=[

  {k:'passing', label:'Pass',    pos:[['goodPass',1],['pget',0.4]], neg:[['perr',1.5]]},
  {k:'setting', label:'Set',     pos:[['assist',1]],                neg:[]},
  {k:'hitting', label:'Attack',  pos:[['kill',2],['block',2]],      neg:[['kerr',1.5]]},

function axisSample(p,ax){ return ax.pos.concat(ax.neg).reduce((s,[k])=>s+evCount(p,k),0); }

function radarAxes(p, peerPool){

  const skillMean=skills? SKILL_DEFS.reduce((s,[k])=>s+(Number(skills[k])||3),0)/SKILL_DEFS.length : 3;

      const sd=Math.sqrt(vals.reduce((s,x)=>s+(x-m)*(x-m),0)/vals.length)||1e-6;

function drawPlayerCard(canvas, d){

  ctx.fillStyle='#9cc6ff'; ctx.font=F(800,40); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(d.initials, pad+56, 154);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#f4f7fc'; ctx.font=F(800,52); ctx.fillText(d.name, pad+140, 142);
  ctx.fillStyle='#a9b4c8'; ctx.font=F(500,30); ctx.fillText(d.subtitle, pad+140, 190);
  if(d.level){
    ctx.font=F(800,30);
    const tw=ctx.measureText(d.level).width;
    rrect(W-pad-tw-44, 96, tw+44, 56, 28);
    ctx.fillStyle='rgba(109,180,255,0.16)'; ctx.fill();

    ctx.fillText(d.level, W-pad-(tw+44)/2, 136);
  }
  ctx.textAlign='right'; ctx.fillStyle='#74819a'; ctx.font=F(500,27);

  const pt=(i,r)=>{ const a=-Math.PI/2 + i*2*Math.PI/N; return [cx+Math.cos(a)*r, cy+Math.sin(a)*r]; };

    ctx.closePath(); ctx.stroke();
  });

  ctx.beginPath();
  d.axes.forEach((ax,i)=>{ const [x,y]=pt(i,R*ax.value/100); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.closePath();
  ctx.fillStyle='rgba(109,180,255,0.17)'; ctx.fill();
  ctx.lineWidth=3.5; ctx.strokeStyle='#6db4ff'; ctx.stroke();
  d.axes.forEach((ax,i)=>{
    const [x,y]=pt(i,R*ax.value/100);
    ctx.globalAlpha=0.35+0.65*ax.w;
    ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fillStyle='#6db4ff'; ctx.fill();
    ctx.globalAlpha=1;
    const [lx,ly]=pt(i,R+46);

    ctx.textAlign = Math.abs(c)<0.3 ? 'center' : (c>0?'left':'right');

    ctx.font=F(600,30);
    ctx.fillText(ax.label, lx, ly);
  });

  ctx.beginPath(); ctx.moveTo(pad,862); ctx.lineTo(W-pad,862); ctx.stroke();
  ctx.font=F(600,30);
  ctx.fillStyle='#5fe3ae'; ctx.fillText('\u2197', pad, 930);
  ctx.fillStyle='#a9b4c8'; ctx.fillText('Strengths', pad+44, 930);
  ctx.fillStyle='#f2c66d'; ctx.fillText('\u25ce', pad, 990);
  ctx.fillStyle='#a9b4c8'; ctx.fillText('Work on', pad+44, 990);
  ctx.textAlign='right'; ctx.font=F(800,32);
  ctx.fillStyle=d.strengths?'#f4f7fc':'#4d5a70';
  ctx.fillText(d.strengths||'Log more events', W-pad, 930);
  ctx.fillStyle=d.workOn?'#f4f7fc':'#4d5a70';
  ctx.fillText(d.workOn||'Log more events', W-pad, 990);
  ctx.textAlign='left';
  // stat tiles
  const tw2=(W-pad*2-24)/2, th=118;

    const col=i%2, row=Math.floor(i/2);

    ctx.fillStyle='#131b2b'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle='rgba(255,255,255,0.09)'; ctx.stroke();
    ctx.fillStyle='#a9b4c8'; ctx.font=F(500,27); ctx.fillText(label, x+28, y+44);
    ctx.fillStyle=value===DASH?'#4d5a70':'#f4f7fc'; ctx.font=F(800,44);
    ctx.fillText(value, x+28, y+96);
  });

  ctx.fillStyle='#74819a'; ctx.font=F(500,27);
  ctx.fillText(d.footer, pad, H-38);
  ctx.textAlign='right'; ctx.fillStyle='#f2c66d'; ctx.font=F(800,30);
  ctx.fillText('Court', W-pad, H-38);
  ctx.textAlign='left';
}

const SIGNALS=[
  {k:'ace',label:'serving',dir:1},{k:'kill',label:'hitting',dir:1},
  {k:'dig',label:'defense',dir:1},{k:'block',label:'blocking',dir:1},
  {k:'assist',label:'setting',dir:1},{k:'goodPass',label:'passing',dir:1},
  {k:'serr',label:'serving',dir:-1},{k:'kerr',label:'hitting',dir:-1},{k:'perr',label:'passing',dir:-1},
];
function analyze(p){
  if(p.gamesPlayed<3) return null;
  const peers=players.filter(x=>x.gamesPlayed>=1);
  if(peers.length<3) return null;
  const rate=(pl,k)=>(pl.lifetime[k]||0)/Math.max(1,pl.gamesPlayed);
  function st(k){ const v=peers.map(x=>rate(x,k)); const m=v.reduce((s,x)=>s+x,0)/v.length;
    const sd=Math.sqrt(v.reduce((s,x)=>s+(x-m)*(x-m),0)/v.length)||1e-6; return {m,sd}; }
  let str=null,strZ=0.6, weak=null,weakZ=0.6;
  SIGNALS.forEach(sig=>{
    const {m,sd}=st(sig.k); const z=(rate(p,sig.k)-m)/sd;
    if(sig.dir===1){
      if(z>strZ){ strZ=z; str=sig.label; }
      if(-z>weakZ){ weakZ=-z; weak=sig.label; }
    } else {
      if(z>weakZ){ weakZ=z; weak=sig.label+' errors'; }
    }
  });
  if(!str && !weak) return null;
  return {strength:str, weakness:weak};
}
function trendChart(hist){
  if(!hist||hist.length<2) return '<div class="tiny faint" style="padding:8px 0">Play a few games to see a trend line.</div>';
  const w=300,h=80,padX=4,padY=10;
  const rs=hist.map(x=>x.r); const mn=Math.min(...rs),mx=Math.max(...rs),rng=(mx-mn)||1;
  const X=i=>padX+(i/(hist.length-1))*(w-2*padX);
  const Y=r=>h-padY-((r-mn)/rng)*(h-2*padY);
  const line=hist.map((x,i)=>`${X(i).toFixed(1)},${Y(x.r).toFixed(1)}`).join(' ');
  const up=rs[rs.length-1]>=rs[0]; const col=up?'var(--good)':'var(--bad)';
  const area=`${padX},${(h-padY).toFixed(1)} ${line} ${(w-padX).toFixed(1)},${(h-padY).toFixed(1)}`;
  return `<div class="row spread tiny faint" style="margin-bottom:2px"><span>high ${mx}</span><span>now ${rs[rs.length-1]}</span></div>
  <svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block;height:80px">
    <polygon points="${area}" fill="${col}" opacity="0.10"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

const PLAYER_REFERENCE_ARRAY_KEYS=new Set(['players','playerIds','roster','members','teamA','teamB']);
const PLAYER_REFERENCE_VALUE_KEYS=new Set(['playerId','winnerPlayerId','loserPlayerId']);
function playerReferenceTreeContains(value,id,key=''){
  if(Array.isArray(value)){
    if(PLAYER_REFERENCE_ARRAY_KEYS.has(key)&&value.includes(id))return true;
    return value.some(item=>item&&typeof item==='object'&&playerReferenceTreeContains(item,id,key));
  }
  if(value&&typeof value==='object')return Object.entries(value).some(([childKey,child])=>playerReferenceTreeContains(child,id,childKey));

function normalizedRatingVersion(value){ return Number(value)>=2?2:1; }

let replayRatingVersion=2;
function ratingVersionForCounts(counts){
  for(const g of games){
    if(Object.values(g.log||{}).some(saved=>saved===counts)){
      replayRatingVersion=gameRatingVersion(g);
      return replayRatingVersion;
    }
  }
  // applyGame's one-sided baseline is a lifetime object. The preceding
  // per-game rawPerf call establishes which saved rating policy is replaying.
  if(players.some(p=>p.lifetime===counts)) return replayRatingVersion;
  return normalizedRatingVersion(settings.ratingVersion);
}
function rawPerf(counts){
  const version=ratingVersionForCounts(counts);
  if(version===1){ let s=0; for(const k in counts) s += (EV_MAP[k]?.w||0)*counts[k]; return s; }
  let s=0; for(const k in counts) if(TERMINAL_EVENT_KEYS.includes(k)) s += (EV_MAP[k]?.w||0)*counts[k]; return s;
}
function hasLoggedEvents(log){
  if(ratingVersionForCounts(log)>=2) return TERMINAL_EVENT_KEYS.some(k=>(Number(log&&log[k])||0)>0);
  return Object.values(log||{}).some(v=>v>0);
}

function trackingEventFamilies(attemptsEnabled){
  const available=new Set(TERMINAL_EVENT_KEYS.concat(attemptsEnabled?NON_TERMINAL_EVENT_KEYS:[]));
  return Object.fromEntries(Object.entries(EVENT_FAMILY_KEYS).map(([family,keys])=>[family,keys.filter(k=>available.has(k))]).filter(([,keys])=>keys.length));

/* Untracked fill slots are stored as COUNTS on the game (g.unkA / g.unkB),
   never as roster players — so autofilled games can't pollute the roster,
   can't break replay, and old backups (which lack these fields) still load
   unchanged and replay as fully tracked games. */
function unkCount(g, side){ return Math.max(0, Math.round(Number(side==='A'?g.unkA:g.unkB))||0); }
function gameKind(g){
  if(g.solo) return 'solo';
  if(unkCount(g,'A')+unkCount(g,'B') > 0) return 'partial';
  return 'full';
}
function scoreOnly(g){
  const log=g.log||{};
  return !Object.keys(log).some(pid=>hasLoggedEvents(log[pid]));
}
// Group's typical per-game event output — the conservative comparison point
// used whenever a player's opponents/teammates are unknown.
function peerBaseline(exceptId){
  const peers = players.filter(x=>x.gamesPlayed>=1 && x.id!==exceptId);
  if(!peers.length) return 0;
  return peers.reduce((s,x)=> s + rawPerf(x.lifetime)/Math.max(1,x.gamesPlayed), 0)/peers.length;
}

function recomputeAll(){
  players.forEach(p=>{
    p.rating = p.seedRating; p.gamesPlayed=0; p.trackedGames=0; p.wins=0; p.losses=0;
    p.fullGames=0; p.partialGames=0; p.soloGames=0;
    p.lifetime = zeroEvents(); p.history = [{i:0, r:Math.round(p.seedRating)}];
  });
  const done = games.filter(g=>g.winner || g.solo).slice().sort((a,b)=>a.date-b.date);
  done.forEach(g=>applyGame(g));
  players.forEach(p=>p.rating = clamp(p.rating,0,100));
}

/* Rating policy by how much of the court is tracked (most → least information):
   • FULL (no untracked slots): Elo on team averages + event deltas vs the game
     average. Identical math to before — legacy games replay unchanged.
   • PARTIAL, tracked players on BOTH sides: same math, but the result (Elo)
     component is scaled by ctx = min(trackedA/sizeA, trackedB/sizeB), because
     the team averages only describe the players we can actually see. Events
     stay full strength — they're direct observations of tracked players.
     Partial games are excluded from the prediction record.
   • PARTIAL, only ONE side tracked: opponent strength is unknown, so no Elo at
     all. Win/loss still tallies. Each tracked player's rating moves only from
     their own logged events vs the roster baseline — the same conservative
     model as solo tracking. Score-only games like this record the result and
     move nothing.
   g.ctx / g.winProb / g.predCorrect / g.deltas are derived and rebuilt on
   every replay; they're stored for recap display only. */
function applyGame(g){
  if(g.solo){ applySolo(g); return; }
  const A = g.teamA.map(pById).filter(Boolean);
  const B = g.teamB.map(pById).filter(Boolean);
  g.deltas = {};
  if(!A.length && !B.length) return;
  const uA = unkCount(g,'A'), uB = unkCount(g,'B');
  const bothTracked = A.length>0 && B.length>0;
  const sizeA = A.length + uA, sizeB = B.length + uB;
  const ctx = bothTracked ? Math.min(A.length/sizeA, B.length/sizeB) : 0;
  g.ctx = ctx;

  let expA = null, actA = 0;
  if(bothTracked){
    const avgA = A.reduce((s,p)=>s+p.rating,0)/A.length;
    const avgB = B.reduce((s,p)=>s+p.rating,0)/B.length;
    expA = 1/(1+Math.pow(10,(avgB-avgA)/settings.eloD));
    // margin-aware actual score (capped so blowouts don't over-swing)
    if(g.scoreA+g.scoreB>0){ actA = clamp(g.scoreA/(g.scoreA+g.scoreB), 0.2, 0.8); }
    else actA = g.winner==='A'?1:0;
  }
  g.winProb = expA;                                  // pre-game chance for team A (tracked players only)
  g.predCorrect = (expA==null || ctx<1 || Math.abs(expA-0.5)<0.02) ? null : ((expA>0.5) === (g.winner==='A'));

  // per-game event raw perf, and the game average (self-normalises intensity)
  const all = [...A,...B];
  const perf = {};
  all.forEach(p=>{ perf[p.id] = rawPerf((g.log&&g.log[p.id]) || {}); });
  const anyEvents = Object.values(perf).some(v=>v!==0);
  const avgPerf = anyEvents ? Object.values(perf).reduce((s,v)=>s+v,0)/all.length : 0;
  const kind = gameKind(g);

  function upd(p, isA){
    const before = p.rating;
    const conf = Math.min(1, (p.trackedGames||0)/settings.confGames);
    const vol = 1.3 - conf;                       // new players move faster
    let eloD = 0, evD = 0;
    if(bothTracked){
      const act = isA ? actA : (1-actA);
      const exp = isA ? expA : (1-expA);
      eloD = clamp(settings.eloK*(act-exp)*vol*ctx, -settings.maxElo, settings.maxElo);
      evD  = anyEvents ? clamp((perf[p.id]-avgPerf)*settings.eventK*vol, -settings.maxEvent, settings.maxEvent) : 0;
    } else {
      // one-sided tracking: solo-style — own events vs roster baseline, gently,
      // and never punish a player just because nothing was logged for them.
      evD = hasLoggedEvents(g.log&&g.log[p.id])
        ? clamp((perf[p.id]-peerBaseline(p.id))*settings.eventK*vol*0.7, -settings.maxEvent, settings.maxEvent)
        : 0;
    }
    p.rating = clamp(p.rating + eloD + evD, 0, 100);
    p.gamesPlayed++;
    // Confidence only advances when the game actually informed this player's
    // rating: a both-sides-tracked result (Elo ran for them) OR their own logged
    // events. A player parked on a roster while others are tracked stays "new".
    if(bothTracked || hasLoggedEvents(g.log&&g.log[p.id])) p.trackedGames++;
    if(kind==='partial') p.partialGames++; else p.fullGames++;
    if((isA&&g.winner==='A')||(!isA&&g.winner==='B')) p.wins++; else p.losses++;
    const c = (g.log&&g.log[p.id])||{}; for(const k in c) p.lifetime[k]=(p.lifetime[k]||0)+c[k];
    p.history.push({i:p.gamesPlayed, r:Math.round(p.rating)});
    g.deltas[p.id] = {before:Math.round(before), after:Math.round(p.rating), elo:eloD, ev:evD};
  }
  A.forEach(p=>upd(p,true)); B.forEach(p=>upd(p,false));
}

// Solo (scout) game: one player, unknown opponent. Rating moves only from their
// own production vs the group's typical output, gently. Result is recorded for
// the W/L tally but never run through Elo.
function applySolo(g){
  g.deltas = {}; g.winProb = null; g.predCorrect = null; g.ctx = 0;
  const p = pById(g.teamA[0]); if(!p) return;
  const perf = rawPerf((g.log&&g.log[p.id]) || {});
  const baseline = peerBaseline(p.id);
  const before = p.rating;
  const conf = Math.min(1, (p.trackedGames||0)/settings.confGames);
  const vol = 1.3 - conf;
  // no events logged → no movement (don't punish a quiet scouting entry)
  const evD = hasLoggedEvents(g.log&&g.log[p.id])
    ? clamp((perf-baseline)*settings.eventK*vol*0.7, -settings.maxEvent, settings.maxEvent)
    : 0;
  p.rating = clamp(p.rating + evD, 0, 100);
  p.gamesPlayed++;
  // A bare scouting entry (no events, no opponent) teaches us nothing, so it
  // records the appearance but doesn't build confidence.
  if(hasLoggedEvents(g.log&&g.log[p.id])) p.trackedGames++;
  p.soloGames++;
  if(g.winner==='A') p.wins++; else if(g.winner==='B') p.losses++;
  const c = (g.log&&g.log[p.id])||{}; for(const k in c) p.lifetime[k]=(p.lifetime[k]||0)+c[k];
  p.history.push({i:p.gamesPlayed, r:Math.round(p.rating)});
  g.deltas[p.id] = {before:Math.round(before), after:Math.round(p.rating), elo:0, ev:evD};
}

/* ============================================================
   TEAM BALANCER
   ============================================================ */
function balance(pool, numTeams){
  const sorted = pool.slice().sort((a,b)=>b.rating-a.rating);
  const teams = Array.from({length:numTeams},()=>[]);
  // snake (serpentine) draft -> near-equal team SIZES and rough balance
  let i=0, d=1;
  sorted.forEach(p=>{
    teams[i].push(p);
    i+=d;
    if(i===numTeams){ i=numTeams-1; d=-1; }
    else if(i<0){ i=0; d=1; }
  });
  // size-preserving swaps to minimise the gap between team AVERAGES
  const avg = t => t.length ? t.reduce((s,p)=>s+p.rating,0)/t.length : 0;
  for(let pass=0; pass<80; pass++){
    let best=null, bestGain=0.05;
    for(let a=0;a<numTeams;a++) for(let b=a+1;b<numTeams;b++){
      const sumA=teams[a].reduce((s,p)=>s+p.rating,0), sumB=teams[b].reduce((s,p)=>s+p.rating,0);
      const cur=Math.abs(sumA/teams[a].length - sumB/teams[b].length);
      for(const pa of teams[a]) for(const pb of teams[b]){
        const na=(sumA-pa.rating+pb.rating)/teams[a].length;
        const nb=(sumB-pb.rating+pa.rating)/teams[b].length;
        const gain=cur-Math.abs(na-nb);
        if(gain>bestGain){ bestGain=gain; best={a,b,pa,pb}; }
      }
    }
    if(!best) break;
    teams[best.a]=teams[best.a].filter(p=>p!==best.pa).concat(best.pb);
    teams[best.b]=teams[best.b].filter(p=>p!==best.pb).concat(best.pa);
  }
  spreadRole(teams,'setter');
  spreadRole(teams,'passer');
  spreadRole(teams,'beginner');
  return teams;
}
// Even out how many players with a given role land on each team, swapping with
// the closest-rating player who lacks the role so the rating balance barely moves.
function spreadRole(teams, key){
  const n=teams.length;
  for(let guard=0; guard<50; guard++){
    const counts=teams.map(t=>t.filter(p=>p.roles[key]).length);
    let hi=0, lo=0;
    for(let i=1;i<n;i++){ if(counts[i]>counts[hi]) hi=i; if(counts[i]<counts[lo]) lo=i; }
    if(counts[hi]-counts[lo] <= 1) break;
    const give = teams[hi].filter(p=>p.roles[key]).sort((a,b)=>a.rating-b.rating)[0];
    const take = teams[lo].filter(p=>!p.roles[key]).sort((a,b)=>Math.abs(a.rating-give.rating)-Math.abs(b.rating-give.rating))[0];
    if(!give || !take) break;
    teams[hi]=teams[hi].filter(p=>p!==give).concat(take);
    teams[lo]=teams[lo].filter(p=>p!==take).concat(give);
  }
}

function isToday(ts){ const d=new Date(ts), n=new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate(); }
function ago(ts){
  const days=Math.floor((Date.now()-ts)/86400000);
  if(days<=0) return 'earlier today';
  if(days===1) return 'yesterday';
  if(days<30) return days+' days ago';
  const mo=Math.floor(days/30); return mo===1?'a month ago':mo+' months ago';
}
function initials(name){ return (name||'?').trim().split(/\s+/).map(x=>x[0]).join('').slice(0,2).toUpperCase(); }
function playerAvatarHtml(player,{size='',showInactive=false,unavailableNotice=false}={}){
  const photo=normalizePlayerPhoto(player?.photo),name=String(player?.name||'Player'),attrs=photo?` data-player-photo-token="${esc(photo.token)}" data-player-photo-revision="${esc(photo.revision)}"`:'';
  return `<span class="avatar${size?` ${size}`:''}"${attrs}><span class="avatar-initials">${initials(name)}</span>${photo?`<img alt="Photo of ${esc(name)}" loading="lazy" hidden>`:''}${showInactive&&player?.active===false?'<i class="off-dot"></i>':''}</span>${unavailableNotice&&photo?'<span class="photo-unavailable-note" data-photo-unavailable-note hidden>Photo unavailable · showing initials</span>':''}`;
}
function screenHead(eyebrow, title, sub){
  return `<div class="screen-head"><div class="eyebrow">${eyebrow}</div><h2>${title}</h2>${sub?`<p class="subcopy">${sub}</p>`:''}</div>`;
}

function sortPlayers(arr){
  return arr.slice().sort((a,b)=> settings.playerSort==='rating'
    ? (b.rating-a.rating || a.name.localeCompare(b.name))
    : a.name.localeCompare(b.name));
}
window.togglePlayerSort=async()=>{ settings.playerSort = settings.playerSort==='rating'?'az':'rating'; await saveSettings(); render(); };
function render(options={}){
  const policy=options.scroll||'preserve';
  const position=policy==='preserve'?captureRenderPosition(options.focusKey):null;
  renderNav();
  main.classList.remove('event-detail');
  const roster = players.filter(p=>!isArchived(p));
  const act = roster.filter(p=>p.active);
  const todayN = games.filter(g=>isToday(g.date)).length;
  $('#topSub').textContent = settings.hideRatings
    ? 'Ratings hidden'
    : (roster.length ? `${act.length} active · ${games.length} game${games.length===1?'':'s'}` : 'Volleyball ratings');
  $('#sessionPill').innerHTML = `<i class="pulse ${todayN?'':'idle'}"></i><span>${todayN?`${todayN} tonight`:'Ready'}</span>`;
  const sideStatus=$('#sideStatus');
  if(sideStatus) sideStatus.innerHTML=`<div class="row" style="gap:7px"><i class="pulse ${Store.mode==='memory'?'idle':''}"></i><b style="color:var(--text)">${Store.mode==='memory'?'Backup needed':'Saved on device'}</b></div><div style="margin-top:7px">${players.length} players · ${games.length} games<br>Backup and restore in Settings.</div>`;
  if(tab==='home') renderHome();
  else if(tab==='players') renderPlayers();
  else if(tab==='track') renderTrack();
  else if(tab==='teams') renderTeams();
  else if(tab==='games') renderGames();
  else if(tab==='events') renderEvents();
  else renderMore();
  window.PlayerPhotos?.hydrate(main);
  if(policy==='top') requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'auto'}));
  else if(policy==='anchor'&&options.anchorId) requestAnimationFrame(()=>scrollToEventSection(options.anchorId));
  else if(position) restoreRenderPosition(position);
}

/* ---------- HOME ---------- */

function renderHome(){

  const settling = roster.filter(p=>reliability(p).k==='settling').length;
  const fresh = roster.length - est - settling;
  const confAvg = roster.length ? roster.reduce((s,p)=>s+Math.min(1,(p.trackedGames||0)/settings.confGames),0)/roster.length : 0;
  const ac = accuracyStats();

  if(!roster.length) sug={t:'Add your first players', c:'Seed each person with a rough level \u2014 ratings self-correct as they play.', a:'openPlayer()', b:'Add player'};
  else if(act.length<2) sug={t:'Mark who\u2019s around', c:'You need at least two active players to track a match. Open the roster to flip people back to active.', a:"setTab('players')", b:'Open roster'};
  else if(!games.length) sug={t:'Track your first game', c:'Pick who\u2019s on each side and log just the score \u2014 or tap events for sharper numbers.', a:"setTab('track')", b:'Start tracking'};
  else if(!todayGames.length) sug={t:'Start tonight\u2019s first game', c:'Build balanced teams first, or go straight to tracking if the court\u2019s already set.', a:"setTab('teams')", b:'Build teams'};

    <div class="section-head"><h3>Up next</h3></div>

    html += recent.map(g=>historyRow(g)).join('');

/* ---------- PLAYERS ---------- */
function renderPlayers(){
  if(!window._playerFilter) window._playerFilter='all';
  if(window._playerQuery===undefined) window._playerQuery='';
  const roster = players.filter(p=>!isArchived(p));
  const archived = players.filter(isArchived);
  const source = window._playerFilter==='archived' ? archived : roster.filter(p=>
    window._playerFilter==='active' ? p.active : window._playerFilter==='away' ? !p.active : true);
  const q=window._playerQuery.trim().toLowerCase();
  const sorted = sortPlayers(source).filter(p=>!q||p.name.toLowerCase().includes(q));
  let html = screenHead('Roster', roster.length?`${roster.length} current player${roster.length===1?'':'s'}`:'Build your roster','Search, sort, and scan status without opening every profile.');
  html += `<div class="page-toolbar">
    <div class="search-wrap">${icons.search||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="6"/><path d="m16 16 4 4"/></svg>'}<input type="search" aria-label="Search players" placeholder="Search players" value="${esc(window._playerQuery)}" oninput="filterPlayerRows(this.value)"></div>
    <button class="btn primary" onclick="openPlayer()">${icons.plus} Add player</button>
    ${roster.length?`<button class="btn ghost" onclick="togglePlayerSort()">${settings.playerSort==='rating'?'Rating ↓':'A–Z'}</button>`:''}
  </div>
  <div class="filter-row" aria-label="Player status filter">
    ${[['all','All',roster.length],['active','Active',roster.filter(p=>p.active).length],['away','Away',roster.filter(p=>!p.active).length],['archived','Archived',archived.length]].map(([id,label,n])=>`<button class="${window._playerFilter===id?'on':''}" aria-pressed="${window._playerFilter===id}" onclick="setPlayerFilter('${id}')">${label} · ${n}</button>`).join('')}
  </div>`;
  if(!roster.length && window._playerFilter!=='archived'){
    html += `<div class="empty"><b>No players yet</b>Add everyone in your group, then track games or build balanced teams. Seed each person with a rough level \u2014 the ratings self-correct as they play.</div>`;
  } else {
    if(!settings.hideRatings){
      const movers = window._playerFilter==='all' ? roster.filter(p=>p.gamesPlayed>=3).map(p=>({p,d:recentDelta(p)})).filter(x=>x.d>=2).sort((a,b)=>b.d-a.d) : [];
      if(movers.length){
        html += `<div class="card" style="margin-top:12px;border-color:#5fe3ae33">
          <div class="small" style="font-weight:800;color:var(--mint)">▲ Most improved</div>
          ${movers.slice(0,3).map(m=>`<div class="row spread" style="margin-top:7px"><span class="small">${esc(m.p.name)}</span><span class="num small" style="color:var(--mint);font-weight:800">+${m.d} over last 5</span></div>`).join('')}
        </div>`;
      }
    }
    html += sorted.length
      ? `<div class="player-list" id="playerList">${sorted.map(playerCard).join('')}</div>`
      : `<div class="empty"><b>No matching players</b>Try another search or status filter.</div>`;
  }
  main.innerHTML = html;
}
window.setPlayerFilter=(f)=>{ window._playerFilter=f; renderPlayers(); };
window.filterPlayerRows=(value)=>{
  window._playerQuery=value;
  const q=value.trim().toLowerCase();
  document.querySelectorAll('#playerList .player-card').forEach(row=>{ row.hidden=!!q && !(row.dataset.name||'').includes(q); });
};
function playerCard(p){
  const rel = reliability(p);
  const rd = recentDelta(p);
  const level = volleyballLevelOf(p.rating).label;
  const roles = ROLE_DEFS.filter(([k])=>p.roles&&p.roles[k]).map(([k,l])=>`<span class="pill">${l}</span>`).join('');
  const levelPart = settings.hideRatings ? '' : `${esc(level)} · `;
  const sub = p.gamesPlayed
    ? `${levelPart}${p.wins}-${p.losses} · <span style="color:${rel.c}">${rel.k}</span>`
    : `${levelPart}<span style="color:${rel.c}">new</span>`;
  const arrow = (p.gamesPlayed>=2 && Math.abs(rd)>=1 && !settings.hideRatings)
    ? `<span class="delta ${rd>0?'up':'down'} num">${rd>0?'▲':'▼'}${Math.abs(rd)}</span>` : '';
  const status = isArchived(p)?'archived':p.active?'active':'away';
  return `<button class="player-card pressable ${p.active&&!isArchived(p)?'':'inactive'}" data-name="${esc(p.name.toLowerCase())}" data-status="${status}" onclick="openPlayer('${p.id}')">
    <span class="player-top">
      ${playerAvatarHtml(p,{showInactive:true})}
      <span class="player-meta">
        <b>${esc(p.name)}</b>
        <span class="player-sub">${sub}${isArchived(p)?' · archived':p.active?'':' · away'}</span>
        ${roles?`<span class="tags">${roles}</span>`:''}
      </span>
      <span class="rating-badge"><b class="num">${showRate(p.rating)}</b>${arrow}${settings.hideRatings?'':sparkline(p.history)}</span>
    </span>
    ${settings.hideRatings?'':`<span class="bar"><i style="width:${clamp(p.rating,0,100)}%"></i></span>`}
  </button>`;
}

/* ---------- TRACK ---------- */
function trackCard(p){
  const v = Math.round(rawPerf(live.log[p.id]||{})*10)/10;
  const cls = v>0?'good':(v<0?'bad':'');
  const exp = live.expanded[p.id];
  const btn = k=>{ const e=EV_MAP[k]; const c=(live.log[p.id]||{})[k]||0;
    return `<div class="evchip ${e.c}" data-event-key="${k}" data-count="${c}">
      ${c?`<button type="button" class="evminus" aria-label="Decrease ${e.l}" onclick="adjustTrackedEvent(event,'${p.id}','${k}',-1)"><span aria-hidden="true">−</span></button>`:''}
      <button type="button" class="evadd" aria-label="${e.l}" onclick="adjustTrackedEvent(event,'${p.id}','${k}',1)"><span class="evlabel">${e.l}</span>${c?`<span class="cnt" aria-hidden="true">${c}</span>`:''}</button>
    </div>`; };
  const terminalKeys=exp?TERMINAL_EVENT_KEYS:COLLAPSED_EVENT_KEYS;
  const attempts=exp&&settings.detailed?`<div class="evrow"><span class="evlbl">Attempts</span><div class="ev">${NON_TERMINAL_EVENT_KEYS.map(btn).join('')}</div></div><div class="attempts-help">Attempts don't affect rating — they're the denominators for serve % and passer rating.</div>`:'';
  const evHtml=`<div class="ev">${terminalKeys.map(btn).join('')}</div>${attempts}${exp?`<div class="tiny faint" style="margin-top:6px">Block = a point-ending block. Do not log a touch that stays in play.</div>`:''}`;
  const meta = `${settings.hideRatings?'':esc(volleyballLevelOf(p.rating).label)}${p.gamesPlayed?`${settings.hideRatings?'':' · '}${p.wins}-${p.losses}`:''}`;
  return `<div class="tcard">
    <div class="thead">
      <div class="avatar sm">${initials(p.name)}</div>
      <div class="tname"><b>${esc(p.name)}</b>${meta?`<span>${meta}</span>`:''}</div>
      <div class="perf ${cls} num">${v>0?'+':''}${v}</div>
    </div>
    ${live.quick?'':evHtml+`<button class="expand" onclick="toggleExpand('${p.id}')">${exp?'− fewer':'+ more events'}</button>`}
  </div>`;
}

function applyLiveEventDelta(pid,k,delta){
  if(!live||!live.log||!EV_MAP[k]) return 0;

  }

}
